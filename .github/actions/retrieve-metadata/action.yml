name: "Retrieve metadata"
description: "Retrieve instance metadata"
inputs:
  os_cloud:
    description:
      "Name of the OpenStack cloud allocation to select openstack auth settings
      defined in '.config/openstack/clouds.yaml'"
    required: false
  os_application_credential_id:
    description: "OpenStack application credential ID (alternative to os_cloud)"
  os_application_credential_secret:
    description:
      "OpenStack application credential secret (alternative to os_cloud)"
  os_auth_url:
    description:
      "OpenStack identity endpoint URL (required when using app credentials)"
  os_identity_api_version:
    description: "OpenStack identity API version"
    default: "3"
  os_auth_type:
    description: "OpenStack auth type"
    default: "v3applicationcredential"
  instance_name:
    description: "Name of the instance to retrieve metadata from"
    required: true
outputs:
  instance_ip:
    description: "Public IP associated with the instance"
    value: ${{ steps.instance_metadata.outputs.instance_ip }}
  instance_pwd:
    description: "Passphrase associated with the instance"
    value: ${{ steps.instance_metadata.outputs.instance_pwd }}
runs:
  using: "composite"
  steps:
    - name: Retrieve metadata
      id: instance_metadata
      shell: bash
      run: |
        source ~/venv/bin/activate

        echo Retrieving instance "$INSTANCE_NAME" metadata

        # Get instance floating IP, with a retry budget. After a /unshelve the
        # VM returns to ACTIVE a few seconds before OpenStack reassociates its
        # floating IP, so a single read can see 'null' (or only the fixed IP)
        # and a credential email would fail spuriously. Retry until the
        # floating IP is attached, mirroring the password retry below.
        ip_max_wait=120
        ip_interval=10
        ip_start=$SECONDS
        instance_ip=""
        while (( SECONDS - ip_start < ip_max_wait )); do
          instance_ip=$(
            openstack server show $INSTANCE_NAME -c addresses -f json | \
            jq -r '.addresses.auto_allocated_network[1] // empty'
          )
          if [[ -n "$instance_ip" && "$instance_ip" != "null" ]]; then
            echo "instance_ip [$instance_ip] (after $((SECONDS - ip_start))s)"
            break
          fi
          echo "floating IP not attached yet (waited $((SECONDS - ip_start))s of ${ip_max_wait}s); retrying in ${ip_interval}s..."
          sleep "$ip_interval"
        done
        if [[ -z "$instance_ip" || "$instance_ip" == "null" ]]; then
          echo "::error ::Failed to retrieve $INSTANCE_NAME IP within ${ip_max_wait}s (floating IP never reassociated?)"
          exit 1
        fi
        echo "instance_ip=$instance_ip" >> $GITHUB_OUTPUT

        # Get instance password from tags
        instance_pwd=$(
          openstack server show $INSTANCE_NAME -c tags -f json | \
          jq -r '.tags[] | select(startswith("exoPw")) | sub("^exoPw:"; "")'
        )

        # Retry logic for SSH-based password retrieval
        if [[ -z "$instance_pwd" ]]; then
          # The 'exoPw' tag may not be set yet — e.g. right after a cold
          # /unshelve, while the instance is still booting and sshd isn't
          # accepting connections (ssh fails with "connection refused"). Pull the
          # password from the instance metadata service over SSH, retrying on a
          # real-elapsed-time budget until sshd comes up.
          echo "Password not found in tags, attempting to retrieve via SSH..."
          max_wait=300   # up to 5 min — a cold unshelve can be slow to boot
          interval=15
          start=$SECONDS
          while (( SECONDS - start < max_wait )); do
            instance_pwd=$(ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              -o ConnectTimeout=10 \
              exouser@"$instance_ip" \
              'curl --silent --retry 3 --retry-delay 5 --retry-all-errors http://169.254.169.254/openstack/latest/password' 2>/dev/null || true)
            if [[ -n "$instance_pwd" ]]; then
              echo "Retrieved password after $((SECONDS - start))s."
              break
            fi
            echo "sshd/password not ready yet (waited $((SECONDS - start))s of ${max_wait}s); retrying in ${interval}s..."
            sleep "$interval"
          done
        fi
        if [[ -z "$instance_pwd" ]]; then
          echo "::error ::Failed to retrieve $INSTANCE_NAME password within ${max_wait}s (sshd never accepted connections?)"
          exit 1
        fi
        echo "::add-mask::$instance_pwd"
        echo "instance_pwd=$instance_pwd" >> $GITHUB_OUTPUT
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        OS_APPLICATION_CREDENTIAL_ID: ${{ inputs.os_application_credential_id }}
        OS_APPLICATION_CREDENTIAL_SECRET:
          ${{ inputs.os_application_credential_secret }}
        OS_AUTH_URL: ${{ inputs.os_auth_url }}
        OS_IDENTITY_API_VERSION: ${{ inputs.os_identity_api_version }}
        OS_AUTH_TYPE: ${{ inputs.os_auth_type }}
        INSTANCE_NAME: ${{ inputs.instance_name }}
