name: "Check instance exists"
description: "Check instance exists"
inputs:
  os_cloud:
    description:
      "Name of the OpenStack cloud allocation to select openstack auth settings
      defined in '.config/openstack/clouds.yaml'"
    required: true
  instance_name:
    description: "Name of the instance"
    required: true
outputs:
  exists:
    description: "Set to 'true' or 'false'"
    value: ${{ steps.check_instance.outputs.exists }}
runs:
  using: "composite"
  steps:
    - name: Check instance exists
      id: check_instance
      shell: bash
      run: |
        source ~/venv/bin/activate

        # Filter server-side: '--name' is a Nova regex match, so anchor it.
        # An unfiltered listing is the heaviest Nova query and 504'd during a
        # transient JS2 API brownout (Instances#168); the exact-match jq below
        # stays as the authoritative check.
        instance=$(openstack server list --name "^${INSTANCE_NAME}$" -f json | \
          jq \
            --arg instance_name "$INSTANCE_NAME" \
            -c '.[] | select(.Name == $instance_name)' | \
          jq -r '.Name' | tail -1)

        [[ $instance == "$INSTANCE_NAME" ]] && exists="true" || exists="false"

        echo "exists [$exists]"
        echo "exists=$exists" >> $GITHUB_OUTPUT
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ inputs.instance_name }}
