name: "Create Instance"
description: "Create Instance"
inputs:
  os_cloud:
    description:
      "Name of the OpenStack cloud allocation to select openstack auth settings
      defined in '.config/openstack/clouds.yaml'"
    required: true
  issue_number:
    description: "Issue number"
    required: true
  instance_name_prefix:
    description: "Instance name prefix"
    required: true
  volume_name_suffix:
    description: "Volume name suffix"
    required: true
  volume_size_gb:
    description: "Volume size in GB"
    required: false
    default: "100"
  token:
    description: "GITHUB_TOKEN or repo scoped PAT"
    required: true
outputs:
  instance_name:
    description: "Name of the provisioned instance"
    value: ${{ steps.define.outputs.instance_name }}
  volume_name:
    description: "Name of the data volume (for the setup phase)"
    value: ${{ steps.define_volume_name.outputs.volume_name }}
  progress_comment_id:
    description: "GitHub comment ID for the progress tracking comment"
    value: ${{ steps.couc_progress.outputs.comment-id }}
  floating_ip_address:
    description:
      "Floating IP associated with the instance (for the setup phase)"
    value: ${{ steps.ip_create.outputs.floating_ip_address }}
runs:
  using: "composite"
  steps:
    - name: Define instance name
      id: define
      uses: ./.github/actions/define-instance-name
      with:
        prefix: ${{ inputs.instance_name_prefix }}
        issue_number: ${{ inputs.issue_number }}

    - name: Add request:approved label and remove stale labels
      shell: bash
      run: |
        gh issue edit "$ISSUE_NUMBER" --add-label "request:approved"

        # Remove stale volume:* and status:* labels left from a previous delete cycle
        stale_labels=$(gh issue view "$ISSUE_NUMBER" --json labels \
          --jq '[.labels[].name | select(test("^(volume:|status:)"))] | join(",")')
        if [[ -n "$stale_labels" ]]; then
          echo "Removing stale labels: $stale_labels"
          gh issue edit "$ISSUE_NUMBER" --remove-label "$stale_labels"
        fi
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        GH_TOKEN: ${{ inputs.token }}
        GH_REPO: ${{ github.repository }}

    - name: comment (progress)
      id: couc_progress
      uses: ./.github/actions/comment-progress
      with:
        issue-number: ${{ inputs.issue_number }}
        create_ip: ⏳
        create_volume: ""
        create_instance: ""
        associate_ip: ""
        setup_instance: ""
        attach_volume: ""
        send_email: ""

    - name: Extract labels
      id: labels
      shell: bash
      run: |
        # If there are multiple "flavor:" labels, select the first one
        instance_flavor=$(
          gh issue view $ISSUE_NUMBER \
            --json labels \
            --jq '[.labels[].name | select(. | startswith("flavor:")) | split(":")[1]][0]'
        )
        echo "instance_flavor=$instance_flavor" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ inputs.token }}
        GH_REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}

    - name: Check instance exists
      id: check_instance
      uses: ./.github/actions/check-instance-exists
      with:
        os_cloud: ${{ inputs.os_cloud }}
        instance_name: ${{ steps.define.outputs.instance_name }}

    - name: comment (Instance already created)
      if: ${{ fromJSON(steps.check_instance.outputs.exists) }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Instance Creation Results ❌

          Instance **${{ steps.define.outputs.instance_name }}** already created.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: instance already exists (failure)
      if: ${{ fromJSON(steps.check_instance.outputs.exists) }}
      shell: bash
      run: |
        echo "::error ::Instance $INSTANCE_NAME already created"
        exit 1
      env:
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: Retrieve or create floating IP
      id: ip_create
      uses: ./.github/actions/create-ip
      with:
        os_cloud: ${{ inputs.os_cloud }}

    - name: comment (floating IP creation failed)
      if: ${{ steps.ip_create.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Instance Creation Results ❌

          Failed to create floating IP for **${{ steps.define.outputs.instance_name }}** instance.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: comment (progress)
      uses: ./.github/actions/comment-progress
      with:
        comment-id: ${{ steps.couc_progress.outputs.comment-id }}
        create_ip: ✅
        create_volume: ⏳
        create_instance: ""
        associate_ip: ""
        setup_instance: ""
        attach_volume: ""
        send_email: ""

    - name: Define volume name
      id: define_volume_name
      uses: ./.github/actions/define-volume-name
      with:
        issue_number: ${{ inputs.issue_number }}
        suffix: ${{ inputs.volume_name_suffix }}

    - name: Check volume exists
      id: check_volume
      uses: ./.github/actions/check-volume-exists
      with:
        os_cloud: ${{ inputs.os_cloud }}
        volume_name: ${{ steps.define_volume_name.outputs.volume_name }}

    - name: comment (volume already exists)
      if: ${{ fromJSON(steps.check_volume.outputs.exists) }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Instance Creation Results ⚠️

          Volume **${{ steps.define_volume_name.outputs.volume_name }}** already exists.

    - name: Create Volume
      if: ${{ ! fromJSON(steps.check_volume.outputs.exists) }}
      id: create_volume
      shell: bash
      run: |
        source ~/venv/bin/activate

        openstack volume create --size "${VOLUME_SIZE_GB}" "${VOLUME_NAME}"
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        VOLUME_NAME: ${{ steps.define_volume_name.outputs.volume_name }}
        VOLUME_SIZE_GB: ${{ inputs.volume_size_gb }}

    - name: comment (failed to create volume)
      if: ${{ steps.create_volume.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Instance Creation Results ❌

          Failed to create volume.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: comment (progress)
      uses: ./.github/actions/comment-progress
      with:
        comment-id: ${{ steps.couc_progress.outputs.comment-id }}
        create_ip: ✅
        create_volume: ✅
        create_instance: ⏳
        associate_ip: ""
        setup_instance: ""
        attach_volume: ""
        send_email: ""

    - name: Create instance
      id: create_instance
      shell: bash
      run: |
        source ~/venv/bin/activate

        echo Creating instance "$INSTANCE_NAME"

        # The "Exosphere client UUID" is unique to each authenticated connection and is
        # stored in the browser's local storage. It can be inspected at:
        #   https://jetstream2.exosphere.app/exosphere/helpabout
        # The associated code is located in the Exosphere project at:
        #   src/LocalStorage/LocalStorage.elm
        #
        # The MorphCloud workflow uses a unique UUID generated with:
        #   python3 -c "import uuid; print(uuid.uuid4())"
        exoClientUuid=b7b75870-ecb5-4aca-ae73-49474a7f531e

        # See "currentExoServerVersion" in exosphere/src/Types/Server.elm
        exoServerVersion=6

        # Inject the runner's SSH public key into cloud-config so the instance
        # authorizes this runner. Fail fast if it's missing — otherwise the
        # placeholder gets replaced with an empty string, the instance boots
        # without the runner's key, and it only surfaces ~8 min later as a
        # "Permission denied (publickey)" at the MyData-rename SSH step.
        RUNNER_PUBKEY=~/.ssh/id_ed25519.pub
        if [[ ! -s "$RUNNER_PUBKEY" ]]; then
          echo "::error ::Runner SSH public key not found at $RUNNER_PUBKEY. Generate it on the runner: ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_ed25519"
          exit 1
        fi
        sed -i "s|{runner-ssh-public-key}|$(cat "$RUNNER_PUBKEY")|g" ./cloud-config


        openstack server create "$INSTANCE_NAME" \
          --nic net-id="auto_allocated_network" \
          --security-group "exosphere" \
          --flavor "$INSTANCE_FLAVOR" \
          --image "Featured-Ubuntu24" \
          --key-name "murat-key" \
          --property "exoGuac={\"v\":1,\"ssh\":true,\"vnc\":true}" \
          --property "exoClientUuid=$exoClientUuid" \
          --property "exoServerVersion=$exoServerVersion" \
          --property "exoCreatorUsername=jfillionrobin@access-ci.org" \
          --property "exoFloatingIpOption=useFloatingIp" \
          --property "exoFloatingIpReuseOption=$FLOATING_IP_UUID" \
          --property "exoSetup={\"status\":\"waiting\",\"epoch\":null}" \
          --user-data ./cloud-config \
          --column created \
          --column flavor \
          --column image \
          --column name \
          --column status

      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}
        INSTANCE_FLAVOR: ${{ steps.labels.outputs.instance_flavor }}
        FLOATING_IP_UUID: ${{ steps.ip_create.outputs.floating_ip_uuid }}

    - name: Wait for instance to reach stable state
      id: wait_instance_state
      shell: bash
      run: |
        source ~/venv/bin/activate

        echo "Waiting for instance to reach stable state..."

        max_wait_time=300  # Wait up to 5 min — full-A100-passthrough flavors (g3.xl) spawn slower than the smaller ones (loop still breaks early on ACTIVE/ERROR)
        wait_interval=3
        total_wait_time=0

        while [ $total_wait_time -lt $max_wait_time ]; do
            instance_json=$(openstack server show "$INSTANCE_NAME" -f json)
            status=$(echo "$instance_json" | jq -r '.status')

            echo "Current status: $status (waited ${total_wait_time}s)"

            # Check if reached a stable state (ACTIVE or ERROR)
            if [[ "$status" == "ACTIVE" || "$status" == "ERROR" ]]; then
                echo "Instance reached stable state: $status"
                break
            fi

            sleep $wait_interval
            total_wait_time=$((total_wait_time + wait_interval))
        done

        echo "final_status=$status" >> $GITHUB_OUTPUT
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: Check for capacity error
      if: ${{ steps.wait_instance_state.outputs.final_status == 'ERROR' }}
      id: check_capacity_error
      shell: bash
      run: |
        source ~/venv/bin/activate

        # Get instance details
        instance_json=$(openstack server show "$INSTANCE_NAME" -f json)

        status=$(echo "$instance_json" | jq -r '.status')
        host=$(echo "$instance_json" | jq -r '.["OS-EXT-SRV-ATTR:host"]')
        host_id=$(echo "$instance_json" | jq -r '.hostId')
        addresses=$(echo "$instance_json" | jq -r '.addresses')

        echo "status: $status"
        echo "host: $host"
        echo "hostId: $host_id"
        echo "addresses: $addresses"

        # Check if this is a capacity error
        # host can be null, "null", or "None" - all indicate no host assigned
        # addresses can be {} or "" when empty
        if [[ "$status" == "ERROR" && ( "$host" == "null" || "$host" == "None" || "$host" == "" ) && "$host_id" == "" && ( "$addresses" == "{}" || "$addresses" == "" ) ]]; then
          echo "capacity_error=true" >> $GITHUB_OUTPUT
          echo "Detected capacity error - no instance available"
        else
          echo "capacity_error=false" >> $GITHUB_OUTPUT
        fi
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (no capacity available)
      if: ${{ steps.check_capacity_error.outputs.capacity_error == 'true' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Instance Creation Results ❌

          No instance of type **${{ steps.labels.outputs.instance_flavor }}** is available on JS2 at the moment.

          See currently available resources at https://grafana.jetstream-cloud.org/public-dashboards/b39f9f91452949389a4d333c3f451eac

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Clean up failed instance (no capacity)
      if: ${{ steps.check_capacity_error.outputs.capacity_error == 'true' }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        echo "Deleting failed instance due to capacity error"
        openstack server delete "$INSTANCE_NAME" || echo "Failed to delete instance, it may not exist"
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: Exit on capacity error
      if: ${{ steps.check_capacity_error.outputs.capacity_error == 'true' }}
      shell: bash
      run: |
        echo "::error ::No capacity available for flavor $INSTANCE_FLAVOR"
        exit 1
      env:
        INSTANCE_FLAVOR: ${{ steps.labels.outputs.instance_flavor }}

    - name: Ensure instance is ACTIVE before continuing
      if:
        ${{ steps.check_capacity_error.outputs.capacity_error != 'true' &&
        steps.wait_instance_state.outputs.final_status != 'ACTIVE' }}
      shell: bash
      run: |
        source ~/venv/bin/activate
        # The VM did not reach ACTIVE within the wait window and this is not a
        # capacity ERROR (e.g. still in BUILD). Delete the partial instance so it
        # cannot linger as a bare, half-provisioned VM that later flips to ACTIVE —
        # which would mislead the status-label cron (status:active) and make the
        # workshop backfill treat the slot as filled, never recreating it.
        echo "Instance did not reach ACTIVE in time (status: $CURRENT_STATUS); deleting the partial instance."
        openstack server delete "$INSTANCE_NAME" --wait || echo "Delete failed or instance not found."
        echo "::error ::Instance failed to reach ACTIVE state. Current status: $CURRENT_STATUS"
        exit 1
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}
        CURRENT_STATUS: ${{ steps.wait_instance_state.outputs.final_status }}

    - name: comment (instance creation failed)
      if:
        ${{ (steps.create_instance.outcome == 'failure' ||
        steps.wait_instance_state.outcome == 'failure' ||
        steps.check_capacity_error.outputs.capacity_error != 'true') &&
        failure() && steps.check_capacity_error.outputs.capacity_error != 'true'
        }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Instance Creation Results ❌

          Failed to create instance **${{ steps.define.outputs.instance_name }}**.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: comment (progress)
      if: ${{ steps.check_capacity_error.outputs.capacity_error != 'true' }}
      uses: ./.github/actions/comment-progress
      with:
        comment-id: ${{ steps.couc_progress.outputs.comment-id }}
        create_ip: ✅
        create_volume: ✅
        create_instance: ✅
        associate_ip: ⏳
        setup_instance: ""
        attach_volume: ""
        send_email: ""

    - name: Associate floating IP with created instance
      if: ${{ steps.check_capacity_error.outputs.capacity_error != 'true' }}
      id: associated_ip
      shell: bash
      run: |
        source ~/venv/bin/activate

        # Verify the association against the Neutron floating-IP object (its
        # port binding), NOT Nova's 'server show -c addresses'. After
        # 'add floating ip', the FIP is bound at the Neutron level immediately,
        # but Nova's cached server-addresses view can lag well past 120s — which
        # previously made this step time out even though the IP *was* associated
        # (the instance came up reachable). 'floating ip show' reflects the
        # binding right away.
        has_ip() {
          local pid
          pid=$(openstack floating ip show "$FLOATING_IP_UUID" -c port_id -f value 2>/dev/null) \
            || return 1
          [[ -n "$pid" && "$pid" != "None" && "$pid" != "null" ]]
        }

        if has_ip; then
          echo "Floating IP already associated."
        else
          # JS2's Neutron API sometimes returns HTTP 500 from 'add floating ip'
          # even though the association actually applied. So attempt it, then
          # VERIFY via the floating-IP port binding — tolerating that spurious
          # 500 — and retry briefly before treating it as a real failure.
          max_wait=120
          interval=10
          start=$SECONDS
          associated=false
          while :; do
            openstack server add floating ip "$INSTANCE_NAME" "$FLOATING_IP_ADDRESS" \
              || echo "add floating ip returned non-zero (possible spurious JS2 500); verifying..."
            sleep 5
            if has_ip; then associated=true; break; fi
            if (( SECONDS - start >= max_wait )); then break; fi
            echo "IP not associated yet (waited $((SECONDS - start))s of ${max_wait}s); retrying in ${interval}s..."
            sleep "$interval"
          done
          if [[ "$associated" != "true" ]]; then
            echo "::error ::Failed to associate $FLOATING_IP_ADDRESS with $INSTANCE_NAME after ${max_wait}s"
            exit 1
          fi
          echo "Floating IP associated."
        fi
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        FLOATING_IP_ADDRESS: ${{ steps.ip_create.outputs.floating_ip_address }}
        FLOATING_IP_UUID: ${{ steps.ip_create.outputs.floating_ip_uuid }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (failed to associate IP with instance)
      if: ${{ steps.associated_ip.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Instance Creation Results ❌

          Failed to associate IP with instance **${{ steps.define.outputs.instance_name }}**.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: comment (progress)
      uses: ./.github/actions/comment-progress
      with:
        comment-id: ${{ steps.couc_progress.outputs.comment-id }}
        create_ip: ✅
        create_volume: ✅
        create_instance: ✅
        associate_ip: ✅
        setup_instance: ⏳
        attach_volume: ""
        send_email: ""
