name: "Control Instance"
description: "Control Instance"
inputs:
  os_cloud:
    description:
      "Name of the OpenStack cloud allocation to select openstack auth settings
      defined in '.config/openstack/clouds.yaml'"
    required: true
  issue_number:
    description: "Issue number"
    required: true
  command_name:
    description:
      "Name of the command to execute: create, delete, shelve, unshelve"
    required: true
  unapprove_after_delete:
    description: "Whether to unapprove after deleting the instance"
    default: "false"
  instance_name_prefix:
    description: "Instance name prefix"
    required: true
  token:
    description: "GITHUB_TOKEN or repo scoped PAT"
    required: true
  mail_server_username:
    description: "mail server username"
    required: true
  mail_server_password:
    description: "mail server password"
    required: true
  email_lookup_url:
    description: "URL of the Apps Script web app for email lookup"
    required: true
  email_lookup_api_key:
    description:
      "Optional API key for the lookup endpoint (required when lookup_url points
      at the morphocloud-intake app)"
    required: false
    default: ""
  email_lookup_secret:
    description:
      "Shared secret for the Apps Script web app (ENROLLMENT_WEBHOOK_SECRET) —
      required when the course roster lookup is used"
    required: false
    default: ""
  issue_creator:
    description:
      "GitHub username of the issue creator (used for email lookup on unshelve)"
    required: false
    default: ""
  course_team_slug:
    description:
      "Course team slug (course repos only; leave blank for individual repos)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Validate command
      shell: bash
      run: |
        if [[ ! $COMMAND_NAME =~ ^(create|delete|shelve|unshelve)$ ]]; then
          echo "::error ::Unknown command name '$COMMAND_NAME'. Valid commands are 'create', 'delete', 'shelve' or 'unshelve'."
          exit 1
        fi
        if [[ ! $UNAPPROVE_AFTER_DELETE =~ ^(false|true)$ ]]; then
          echo "::error ::Invalid unapprove_after_delete value '$UNAPPROVE_AFTER_DELETE'. Supported values are 'true' or 'false'"
          exit 1
        fi
      env:
        COMMAND_NAME: ${{ inputs.command_name }}
        UNAPPROVE_AFTER_DELETE: ${{ fromJSON(inputs.unapprove_after_delete) }}

    - name: Set command expected status
      id: expected_status
      shell: bash
      run: |
        if [[ $COMMAND_NAME == "shelve" ]]; then
          expected_status="SHELVED_OFFLOADED"
        elif [[ $COMMAND_NAME == "unshelve" ]]; then
          expected_status="ACTIVE"
        elif [[ $COMMAND_NAME == "create" ]]; then
          expected_status="ACTIVE"
        elif [[ $COMMAND_NAME == "delete" ]]; then
          expected_status=""
        fi
        echo "expected_status [$expected_status]"
        echo "value=$expected_status" >> $GITHUB_OUTPUT
      env:
        COMMAND_NAME: ${{ inputs.command_name }}

    - name: Define instance name
      id: define
      uses: ./.github/actions/define-instance-name
      with:
        prefix: ${{ inputs.instance_name_prefix }}
        issue_number: ${{ inputs.issue_number }}

    - name: Check instance management approval
      id: check_approval
      uses: ./.github/actions/check-approval
      with:
        token: ${{ inputs.token }}
        issue_number: ${{ inputs.issue_number }}

    - name: command results comment (Instance management not approved)
      id: comment_not_approved
      if: ${{ ! fromJSON(steps.check_approval.outputs.is_approved) }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed because management of **${{ steps.define.outputs.instance_name }}** has not been approved yet.

    - name: instance management not approved (failure)
      if: ${{ ! fromJSON(steps.check_approval.outputs.is_approved) }}
      shell: bash
      run: |
        echo "::error ::Instance $INSTANCE_NAME management not approved"
        exit 1
      env:
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: Check instance exists
      id: check_instance
      uses: ./.github/actions/check-instance-exists
      with:
        os_cloud: ${{ inputs.os_cloud }}
        instance_name: ${{ steps.define.outputs.instance_name }}

    # Without this, an OpenStack API error in the existence check (e.g. the
    # 504 during the JS2 brownout diagnosed in Instances#168) fails the job
    # with no comment at all — the user sees only the command reaction.
    - name: comment (failed to check instance exists)
      id: comment_check_instance_failed
      if: ${{ steps.check_instance.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed to be applied to **${{ steps.define.outputs.instance_name }}** instance.
          Failed to check if the instance exists (OpenStack API error — possibly a transient Jetstream2 issue; retrying the command may succeed).

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: command results comment (Instance does not exist)
      id: comment_not_exist
      if: ${{ steps.check_instance.outputs.exists == 'false' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed because **${{ steps.define.outputs.instance_name }}** instance does not exist.

    - name: instance does not exist (failure)
      if: ${{ steps.check_instance.outputs.exists == 'false' }}
      shell: bash
      run: |
        # Fail fast: without this, later unguarded steps run 'openstack server
        # show' against the missing instance and fail with misleading errors
        # (e.g. a spurious "server action already in progress" comment).
        echo "::error ::Instance $INSTANCE_NAME does not exist"
        exit 1
      env:
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: Wait for in-flight server action to settle
      id: check_task_state
      if: ${{ steps.check_instance.outputs.exists == 'true' }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        # A non-null task_state means another actor (an Exosphere session, a
        # prior command, a JS2-side retry) has an action in flight. Failing
        # immediately here surfaced a useless "action already in progress"
        # message that told the user nothing actionable (Instances#168).
        # Instead, wait for the action to settle: the steps below then see
        # the settled state — already in the requested state → the noop
        # ensure-and-report path posts a truthful success; otherwise a
        # normal attempt proceeds, and for unshelve the in-flight failure
        # is counted by the failure-history step.
        max_wait=600
        waited=0
        while :; do
          task_state=$(openstack server show $INSTANCE_NAME -f json | \
            jq -r '.["OS-EXT-STS:task_state"]')
          echo "task_state [$task_state] waited [${waited}s]"
          if [[ "$task_state" == "null" ]]; then
            break
          fi
          if [ $waited -ge $max_wait ]; then
            echo "task_state=$task_state" >> $GITHUB_OUTPUT
            echo "::error ::Server action still in progress after ${max_wait}s (task_state '$task_state')."
            exit 1
          fi
          sleep 20
          waited=$((waited + 20))
        done
        echo "task_state=null" >> $GITHUB_OUTPUT
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (server action already in progress)
      id: comment_task_state
      if: ${{ steps.check_task_state.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          Another operation on **${{ steps.define.outputs.instance_name }}** has been running on Jetstream2's side for over 10 minutes and appears stuck (task state `${{ steps.check_task_state.outputs.task_state }}`), so the `${{ inputs.command_name }}` command could not run. **There is nothing you need to do.** @MorphoCloud/morphocloud-admins have been notified and will investigate, escalating to Jetstream2 support if needed. Your instance and data remain safely stored.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Check if instance is already in the requested state
      id: check_noop
      if:
        ${{ steps.check_instance.outputs.exists == 'true' &&
        (inputs.command_name == 'unshelve' || inputs.command_name == 'shelve')
        }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        # A redundant command (double /unshelve, /shelve of an already-shelved
        # instance) must not re-run the state transition: acting on an
        # already-transitioned instance mutates network state from stale
        # snapshots (see Instances#166 postmortem, where a duplicate /unshelve
        # released the floating IP of a running instance and left it
        # unreachable). Record the no-op so the execute/poll steps below are
        # skipped. The floating-IP repair, email, and post-condition steps
        # still run, so a redundant command degrades to a harmless
        # "ensure and report" operation.
        status=$(openstack server show "$INSTANCE_NAME" -c status -f value)
        echo "status [$status] expected [$EXPECTED_STATUS]"
        if [[ "$status" == "$EXPECTED_STATUS" ]]; then
          noop=true
        else
          noop=false
        fi
        echo "noop [$noop]"
        echo "noop=$noop" >> $GITHUB_OUTPUT
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}
        EXPECTED_STATUS: ${{ steps.expected_status.outputs.value }}

    - name: Detect corrupt shelved state (unshelve)
      id: check_corrupt_shelved
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && inputs.command_name
        == 'unshelve' && steps.check_noop.outputs.noop != 'true' }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        # A failed shelve can leave an instance as vm_state=shelved with NO host
        # (status SHELVED, host null). 'unshelve' is then accepted by Nova but
        # never transitions to ACTIVE, so without this check the poll below just
        # times out opaquely (and a floating IP gets churned for nothing). Detect
        # it up front and fail fast with an actionable message. A normally
        # shelved-but-not-yet-offloaded instance still has a host, so
        # SHELVED + host=null is an unambiguous corruption signal.
        j=$(openstack server show "$INSTANCE_NAME" -f json)
        status=$(echo "$j" | jq -r '.status')
        host=$(echo "$j" | jq -r '."OS-EXT-SRV-ATTR:host" // "null"')
        echo "status [$status] host [$host]"
        if [[ "$status" == "SHELVED" && ( "$host" == "null" || "$host" == "None" || -z "$host" ) ]]; then
          echo "::error ::$INSTANCE_NAME is in a corrupt shelved state (SHELVED with no host); unshelve cannot recover it."
          exit 1
        fi
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (corrupt shelved state)
      id: comment_corrupt_shelved
      if: ${{ steps.check_corrupt_shelved.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          Instance **${{ steps.define.outputs.instance_name }}** is in a **corrupt shelved state** (shelved, but with no host) — typically the result of a failed shelve. `/unshelve` cannot recover it.

          @MorphoCloud/morphocloud-admins — this instance needs an admin `shelveOffload` (push it to `SHELVED_OFFLOADED`, then unshelve) or a delete + rebuild from the data volume. The data volume is preserved either way.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Collect unshelve failure history
      id: unshelve_history
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && inputs.command_name
        == 'unshelve' && steps.check_noop.outputs.noop != 'true' }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        # The poll step's auto-retry only makes sense when a failure would
        # be the first one — if the action log already shows a recent failed
        # unshelve, this command IS the retry, and a second automatic
        # attempt would only delay telling the user and admins the truth.
        cutoff=$(date -u -d "60 minutes ago" +%Y-%m-%dT%H:%M:%S)
        events=$(openstack server event list "$INSTANCE_NAME" --long -f json)
        recent_failures=$(echo "$events" | jq -r --arg cutoff "$cutoff" \
          '[.[] | select(.Action == "unshelve" and .Message == "Error" and ."Start Time" > $cutoff)] | length')
        baseline_reqs=$(echo "$events" | jq -r \
          '[.[] | select(.Action == "unshelve" and .Message == "Error") | ."Request ID"] | join(",")')
        echo "recent_failures [$recent_failures]"
        echo "recent_failures=$recent_failures" >> $GITHUB_OUTPUT
        echo "baseline_error_reqs=$baseline_reqs" >> $GITHUB_OUTPUT
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: Check if instance has a floating IP
      if:
        ${{ steps.check_instance.outputs.exists == 'true' &&
        (inputs.command_name == 'unshelve' || inputs.command_name == 'shelve')
        }}
      id: check_instance_has_ip
      shell: bash
      run: |
        source ~/venv/bin/activate

        # Get instance floating IP
        instance_ip=$(
          openstack server show $INSTANCE_NAME -c addresses -f json | \
          jq -r '.addresses.auto_allocated_network | if length > 1 then .[1] else "" end'
        )
        echo "instance_ip [$instance_ip]"

        # Get instance internal IP (also called fixed IP)
        instance_internal_ip=$(
          openstack server show $INSTANCE_NAME -c addresses -f json | \
          jq -r '.addresses.auto_allocated_network | if length > 0 then .[0] else "" end'
        )
        echo "instance_internal_ip [$instance_internal_ip]"

        # Display internal IP metadata
        echo "instance_internal_ip [$instance_internal_ip] metadata:"
        openstack floating ip list -f json | jq \
          --arg fixed_ip "$instance_internal_ip" \
          'map(select(."Fixed IP Address" == $fixed_ip))'

        # Determine if instance already has a floating IP assigned
        if [[ -n "$instance_ip" ]]; then
          has_ip="true"
        else
          has_ip="false"
        fi
        echo "has_ip [$has_ip]"
        echo "has_ip=$has_ip" >> $GITHUB_OUTPUT

        # Check if an assigned floating IP matches instance IP
        has_ip_assigned="false"
        if [[ "$has_ip" == "true" ]]; then
          json_output=$(openstack floating ip list -f json | jq \
            --arg fixed_ip "$instance_internal_ip" \
            --arg ip "$instance_ip" \
            'map(select(.Port != null and ."Fixed IP Address" == $fixed_ip and ."Floating IP Address" == $ip))')
          floating_ip_address=$(echo "$json_output" | jq -r 'if length > 0 then .[0]["Floating IP Address"] else "" end')

          if [[ -n "$floating_ip_address" ]]; then
            has_ip_assigned="true"
          fi
        fi

        # If previously assigned IP (`instance_ip`) is not available anymore, discard it.
        if [[ "$has_ip" == "true" && "$has_ip_assigned" == "false" ]]; then
          json_output=$(openstack floating ip list -f json | jq \
            --arg fixed_ip "$instance_internal_ip" \
            --arg ip "$instance_ip" \
            'map(select(.Port != null and ."Fixed IP Address" != $fixed_ip and ."Floating IP Address" == $ip))')
          has_ip_reassigned=$(echo "$json_output" | jq -r 'if length > 0 then "true" else "false" end')
          echo "has_ip_reassigned [$has_ip_reassigned]"

          if [[ $has_ip_reassigned == "true" ]]; then
            instance_ip=""
          fi
        fi

        echo "instance_ip [$instance_ip]"
        echo "instance_ip=$instance_ip" >> $GITHUB_OUTPUT

        echo "has_ip_assigned [$has_ip_assigned]"
        echo "has_ip_assigned=$has_ip_assigned" >> $GITHUB_OUTPUT
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (failed to check instance IP)
      id: comment_ip_check_failed
      if: ${{ steps.check_instance_has_ip.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed to be applied to **${{ steps.define.outputs.instance_name }}** instance.
          Failed to check if instance is associated with a floating IP.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Release stuck floating IP from port before unshelve
      # Only when the IP check above found NO healthy assignment: a floating IP
      # bound to the port while the instance shows no address is stuck (e.g.
      # left behind by a failed unshelve) and would make 'associate_ip' fail.
      # When has_ip_assigned is true the binding is healthy — releasing it
      # would strand a running instance without connectivity, because the
      # re-associate steps below are skipped in that case (Instances#166).
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && inputs.command_name
        == 'unshelve' && steps.check_instance_has_ip.outputs.has_ip_assigned ==
        'false' }}
      id: release_stuck_ip
      shell: bash
      run: |
        source ~/venv/bin/activate

        # SHELVED_OFFLOADED instances have empty addresses in 'openstack server show',
        # but their Neutron port persists. A previously failed unshelve can leave a
        # floating IP stuck on that port, causing the subsequent 'associate_ip' step
        # to fail. Release any such stuck IP before proceeding.

        port_id=$(openstack port list --server "$INSTANCE_NAME" -f json | jq -r '.[0].ID // ""')
        echo "port_id [$port_id]"

        if [[ -z "$port_id" ]]; then
          echo "No port found for instance, skipping."
          exit 0
        fi

        floating_ip_uuid=$(
          openstack floating ip list -f json | \
          jq -r --arg port "$port_id" \
          'map(select(.Port == $port)) | if length > 0 then .[0].ID else "" end'
        )
        echo "floating_ip_uuid [$floating_ip_uuid]"

        if [[ -z "$floating_ip_uuid" ]]; then
          echo "No floating IP attached to port, nothing to release."
          exit 0
        fi

        echo "Releasing stuck floating IP $floating_ip_uuid from port $port_id"
        openstack floating ip unset --port "$floating_ip_uuid"
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: Retrieve or create a floating IP
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && inputs.command_name
        == 'unshelve' && steps.check_instance_has_ip.outputs.has_ip_assigned ==
        'false' }}
      id: ip_create
      uses: ./.github/actions/create-ip
      with:
        os_cloud: ${{ inputs.os_cloud }}
        preferred_ip_address:
          ${{ steps.check_instance_has_ip.outputs.instance_ip }}

    - name: comment (failed to retrieve or create floating IP)
      id: comment_ip_create_failed
      if: ${{ steps.ip_create.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed to be applied to **${{ steps.define.outputs.instance_name }}** instance.
          Failed to retrieve or create a floating IP.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Associate floating IP with unshelved instance
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && inputs.command_name
        == 'unshelve' && steps.check_instance_has_ip.outputs.has_ip_assigned ==
        'false' }}
      id: associate_ip
      shell: bash
      run: |
        source ~/venv/bin/activate

        # Mirror the create path: JS2's Neutron API sometimes returns HTTP 500
        # from 'add floating ip' even though the association actually applied,
        # and Nova's cached 'server show -c addresses' view lags the real
        # binding. Verify against the Neutron floating-IP object (its port
        # binding), tolerate the spurious 500, and retry before failing — so an
        # /unshelve doesn't fall over on the same transient that /create handles.
        has_ip() {
          local pid
          pid=$(openstack floating ip show "$FLOATING_IP_UUID" -c port_id -f value 2>/dev/null) \
            || return 1
          [[ -n "$pid" && "$pid" != "None" && "$pid" != "null" ]]
        }

        if has_ip; then
          echo "Floating IP already associated."
        else
          max_wait=300   # JS2 floating-IP association can lag under load
          interval=10
          start=$SECONDS
          associated=false
          while :; do
            openstack server add floating ip "$INSTANCE_NAME" "$FLOATING_IP_ADDRESS" \
              || echo "add floating ip returned non-zero (possible spurious JS2 500); verifying..."
            sleep 5
            if has_ip; then associated=true; break; fi
            if (( SECONDS - start >= max_wait )); then break; fi
            echo "IP not associated yet (waited $((SECONDS - start))s of ${max_wait}s); retrying in ${interval}s..."
            sleep "$interval"
          done
          if [[ "$associated" != "true" ]]; then
            echo "::error ::Failed to associate $FLOATING_IP_ADDRESS with $INSTANCE_NAME after ${max_wait}s"
            exit 1
          fi
          echo "Floating IP associated."
        fi
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        FLOATING_IP_ADDRESS: ${{ steps.ip_create.outputs.floating_ip_address }}
        FLOATING_IP_UUID: ${{ steps.ip_create.outputs.floating_ip_uuid }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (failed to associate floating IP with unshelved instance)
      id: comment_associate_ip_failed
      if: ${{ steps.associate_ip.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed to be applied to **${{ steps.define.outputs.instance_name }}** instance.
          Failed to associate floating IP with unshelved instance.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Execute command
      id: execute_command
      # noop is only set for shelve/unshelve; for delete it is empty and the
      # command always executes.
      if:
        ${{ steps.check_instance.outputs.exists == 'true' &&
        steps.check_noop.outputs.noop != 'true' }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        openstack server $COMMAND_NAME "$INSTANCE_NAME"
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}
        COMMAND_NAME: ${{ inputs.command_name }}

    - name: command results comment (failure)
      id: comment_execute_failed
      if: ${{ steps.execute_command.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed to be applied to **${{ steps.define.outputs.instance_name }}** instance.

          @MorphoCloud/morphocloud-admins — the OpenStack `${{ inputs.command_name }}` action failed; the instance may need attention.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Poll instance status
      id: instance_poll
      if:
        ${{ steps.expected_status.outputs.value != '' &&
        steps.check_noop.outputs.noop != 'true' }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        max_wait_time=600  # default (e.g. /create build+boot) — JS2 can be slow under load
        if [[ "$EXPECTED_STATUS" == "SHELVED_OFFLOADED" ]]; then
          max_wait_time=900  # 15 min — offload to object storage is the slowest transition
        elif [[ "$COMMAND_NAME" == "unshelve" ]]; then
          max_wait_time=300  # 5 min — a healthy unshelve from offloaded is quick; fail fast
                             # so a stuck/corrupt instance surfaces in 5 min, not 10
        fi

        # unshelve gets one automatic retry, but only when the action log
        # showed no recent failure before this run — with prior failures the
        # user's command already IS the retry, and a second automatic attempt
        # would only delay the terminal report (see unshelve_history step).
        attempt=1
        max_attempts=1
        if [[ "$COMMAND_NAME" == "unshelve" && "${RECENT_FAILURES:-0}" -eq 0 ]]; then
          max_attempts=2
        fi
        known_error_reqs=",${BASELINE_ERROR_REQS},"

        # Prints the request id of an unshelve action that ended in Error and
        # is not in the pre-attempt baseline; empty otherwise.
        check_new_unshelve_error() {
          openstack server event list "$INSTANCE_NAME" --long -f json 2>/dev/null | \
            jq -r --arg known "$known_error_reqs" \
              '[.[] | select(.Action == "unshelve" and .Message == "Error")
                   | ."Request ID" | select(($known | contains("," + . + ",")) | not)][0] // ""'
        }

        echo "Polling '$INSTANCE_NAME' status [max_wait_time=${max_wait_time}s per attempt, max_attempts=${max_attempts}]"

        wait_interval=5    # Interval between status checks in seconds
        total_wait_time=0
        capacity_error=false
        failure_mode=""

        while [ $total_wait_time -lt $max_wait_time ]; do

            instance_json=$(openstack server show $INSTANCE_NAME -f json)
            status=$(echo "$instance_json" | jq -r '.status // "PENDING"')

            echo -n "status [$status]. "

            # Check for capacity error (only for unshelve command)
            if [[ "$status" == "ERROR" && "$COMMAND_NAME" == "unshelve" ]]; then
                host=$(echo "$instance_json" | jq -r '.["OS-EXT-SRV-ATTR:host"]')
                host_id=$(echo "$instance_json" | jq -r '.hostId')
                addresses=$(echo "$instance_json" | jq -r '.addresses')

                echo ""
                echo "Detected ERROR status. Checking capacity error conditions..."
                echo "host: $host"
                echo "hostId: $host_id"
                echo "addresses: $addresses"

                # host can be null, "null", or "None" - all indicate no host assigned
                # addresses can be {} or "" when empty
                if [[ ( "$host" == "null" || "$host" == "None" || "$host" == "" ) && "$host_id" == "" && ( "$addresses" == "{}" || "$addresses" == "" ) ]]; then
                    echo "Capacity error detected - no instance available"
                    capacity_error=true
                    break
                fi
            fi

            if [[ "$status" == "$EXPECTED_STATUS" ]]; then
                echo "Exiting loop."
                break
            fi

            # A host-side unshelve failure reverts the instance to
            # SHELVED_OFFLOADED (never ERROR), which plain status polling
            # cannot distinguish from "not started yet" — it used to burn
            # the full poll budget and die as a generic timeout. The action
            # log can distinguish: a new unshelve action with Message=Error
            # means this attempt is dead (Instances#168, #111, #114).
            if [[ "$COMMAND_NAME" == "unshelve" && $((total_wait_time % 30)) -eq 0 ]]; then
                failed_req=$(check_new_unshelve_error)
                if [[ -n "$failed_req" ]]; then
                    echo ""
                    echo "Attempt $attempt failed on the compute host (request $failed_req)."
                    known_error_reqs="${known_error_reqs}${failed_req},"
                    if [ $attempt -lt $max_attempts ]; then
                        attempt=$((attempt + 1))
                        gh issue comment "$ISSUE_NUMBER" --body "⏳ The first unshelve attempt failed on Jetstream2's side — retrying automatically. A final result will be posted here in a few minutes."
                        openstack server unshelve "$INSTANCE_NAME"
                        total_wait_time=0
                        continue
                    fi
                    failure_mode="host_error"
                    break
                fi
            fi

            echo "Waiting for completion..."
            sleep $wait_interval
            total_wait_time=$((total_wait_time + wait_interval))
        done

        echo "status=$status" >> $GITHUB_OUTPUT
        echo "capacity_error=$capacity_error" >> $GITHUB_OUTPUT
        echo "failure_mode=$failure_mode" >> $GITHUB_OUTPUT

        if [[ "$failure_mode" == "host_error" ]]; then
            total_failures=$(( ${RECENT_FAILURES:-0} + attempt ))
            events=$(openstack server event list "$INSTANCE_NAME" --long -f json)
            first_failure=$(echo "$events" | jq -r \
              '[.[] | select(.Action == "unshelve" and .Message == "Error") | ."Start Time"] | sort | .[0][0:16] // "unknown"')
            {
              printf '%s\n\n' '### Command Results ❌'
              printf '%s\n\n' "Unshelving **${INSTANCE_NAME}** is failing on Jetstream2's side — ${total_failures} attempt(s) since ${first_failure} UTC failed on the compute host. **There is nothing you need to do.** @MorphoCloud/morphocloud-admins have been notified and will investigate, escalating to Jetstream2 support if needed. Your instance and data remain safely stored."
              printf '%s\n\n' '<details><summary>Diagnostics for admins</summary>'
              printf '%s\n' 'Failed unshelve requests (openstack server event list):'
              printf '%s\n' '```'
              echo "$events" | jq -r '.[] | select(.Action == "unshelve" and .Message == "Error") | "\(."Start Time")  \(."Request ID")"'
              printf '%s\n\n' '```'
              printf '%s\n\n' "Run: https://github.com/${GH_REPO}/actions/runs/${RUN_ID}"
              printf '%s\n' '</details>'
            } > /tmp/unshelve_failure_body.md
            echo "::error ::unshelve failed on the compute host after $attempt attempt(s) this run ($total_failures recent failures total)."
            exit 1
        fi

        if [ $total_wait_time -ge $max_wait_time ]; then
            echo "::error ::Maximum wait time ($max_wait_time seconds) exceeded."
            exit 1
        fi
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}
        EXPECTED_STATUS: ${{ steps.expected_status.outputs.value }}
        COMMAND_NAME: ${{ inputs.command_name }}
        RECENT_FAILURES: ${{ steps.unshelve_history.outputs.recent_failures }}
        BASELINE_ERROR_REQS:
          ${{ steps.unshelve_history.outputs.baseline_error_reqs }}
        GH_TOKEN: ${{ inputs.token }}
        GH_REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        RUN_ID: ${{ github.run_id }}

    - name: comment (unshelve failed on Jetstream2 host)
      id: comment_unshelve_host_failure
      if:
        ${{ steps.instance_poll.outcome == 'failure' && failure() &&
        steps.instance_poll.outputs.failure_mode == 'host_error' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body-path: /tmp/unshelve_failure_body.md

    - name: comment (maximum wait time exceeded)
      id: comment_max_wait
      if:
        ${{ steps.instance_poll.outcome == 'failure' && failure() &&
        steps.instance_poll.outputs.capacity_error != 'true' &&
        steps.instance_poll.outputs.failure_mode != 'host_error' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          The `${{ inputs.command_name }}` command for **${{ steps.define.outputs.instance_name }}** did not complete within the expected time — it may be stuck on Jetstream2's side. **There is nothing you need to do.** @MorphoCloud/morphocloud-admins have been notified and will investigate, escalating to Jetstream2 support if needed. Your instance and data remain safely stored.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Extract flavor on capacity error
      if: ${{ steps.instance_poll.outputs.capacity_error == 'true' }}
      id: extract_flavor
      shell: bash
      run: |
        source ~/venv/bin/activate

        # Try to get flavor from instance
        flavor=$(openstack server show "$INSTANCE_NAME" -f json | jq -r '.flavor' 2>/dev/null || echo "")

        # If not available from instance, try to get from issue labels
        if [[ -z "$flavor" || "$flavor" == "null" ]]; then
          flavor=$(
            gh issue view $ISSUE_NUMBER \
              --json labels \
              --jq '[.labels[].name | select(. | startswith("flavor:")) | split(":")[1]][0]'
          )
        fi

        echo "flavor=$flavor" >> $GITHUB_OUTPUT
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}
        GH_TOKEN: ${{ inputs.token }}
        GH_REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}

    - name: comment (no capacity available)
      id: comment_no_capacity
      if: ${{ steps.instance_poll.outputs.capacity_error == 'true' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          No instance of type **${{ steps.extract_flavor.outputs.flavor }}** is available on JS2 at the moment.

          See currently available resources at https://grafana.jetstream-cloud.org/public-dashboards/b39f9f91452949389a4d333c3f451eac

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Clean up failed instance (no capacity)
      if: ${{ steps.instance_poll.outputs.capacity_error == 'true' }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        echo "Deleting failed instance due to capacity error"
        openstack server delete "$INSTANCE_NAME" || echo "Failed to delete instance, it may not exist"
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: Exit on capacity error
      if: ${{ steps.instance_poll.outputs.capacity_error == 'true' }}
      shell: bash
      run: |
        echo "::error ::No capacity available for flavor $FLAVOR"
        exit 1
      env:
        FLAVOR: ${{ steps.extract_flavor.outputs.flavor }}

    - name: Disassociate floating IP from shelved instance
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && inputs.command_name
        == 'shelve' && steps.check_instance_has_ip.outputs.has_ip == 'true' &&
        steps.check_instance_has_ip.outputs.has_ip_assigned == 'true' }}
      id: disassociate_ip
      shell: bash
      run: |
        source ~/venv/bin/activate

        openstack server remove floating ip "$INSTANCE_NAME" "$FLOATING_IP_ADDRESS"
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        FLOATING_IP_ADDRESS:
          ${{ steps.check_instance_has_ip.outputs.instance_ip }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (failed to disassociate floating IP from unshelved instance)
      id: comment_disassociate_failed
      if: ${{ steps.disassociate_ip.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed to be applied to **${{ steps.define.outputs.instance_name }}** instance.
          Failed to disassociate floating IP from unshelved instance.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Set instance properties
      id: set_instance_properties
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && success() &&
        inputs.command_name == 'unshelve'}}
      shell: bash
      run: |
        source ~/venv/bin/activate
        # If unshelving an instance created before the MorphCloud workflow was
        # associated with a unique UUID, the following ensures the instance is
        # properly linked to the UUID specific to the MorphCloud workflow.
        #
        # The UUID below matches the one hardcoded in the "create-instance.yml"
        # workflow.
        exoClientUuid=b7b75870-ecb5-4aca-ae73-49474a7f531e
        openstack server set --property "exoClientUuid=$exoClientUuid" $INSTANCE_NAME
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (failed to set instance properties)
      id: comment_set_properties_failed
      if: ${{ steps.set_instance_properties.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          Failed to set instance properties while unshelving.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    # Post-condition check: a green run must mean a working instance. Verify
    # the end state against Nova and Neutron before reporting success (or
    # sending a connection email that could never work). This turns a bug like
    # the Instances#166 floating-IP release into a loud failure instead of a
    # silent multi-hour outage on a billing instance.
    - name: Verify instance end state
      id: verify_end_state
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && success() &&
        (inputs.command_name == 'unshelve' || inputs.command_name == 'shelve')
        }}
      shell: bash
      run: |
        source ~/venv/bin/activate

        status=$(openstack server show "$INSTANCE_NAME" -c status -f value)
        port_id=$(openstack port list --server "$INSTANCE_NAME" -f json | jq -r '.[0].ID // ""')
        fip_count=0
        if [[ -n "$port_id" ]]; then
          fip_count=$(openstack floating ip list -f json | jq --arg port "$port_id" '[.[] | select(.Port == $port)] | length')
        fi
        echo "status [$status] port [$port_id] floating IPs bound [$fip_count]"

        if [[ "$COMMAND_NAME" == "unshelve" ]]; then
          if [[ "$status" != "ACTIVE" || "$fip_count" -lt 1 ]]; then
            echo "::error ::Post-condition failed after unshelve: status=$status, floating IPs bound to port=$fip_count (expected ACTIVE with a floating IP)."
            exit 1
          fi
        else
          if [[ "$status" != "SHELVED_OFFLOADED" || "$fip_count" -ne 0 ]]; then
            echo "::error ::Post-condition failed after shelve: status=$status, floating IPs bound to port=$fip_count (expected SHELVED_OFFLOADED with no floating IP)."
            exit 1
          fi
        fi
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}
        COMMAND_NAME: ${{ inputs.command_name }}

    - name: comment (post-condition failed)
      id: comment_postcondition_failed
      if: ${{ steps.verify_end_state.outcome == 'failure' && failure() }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` completed, but **${{ steps.define.outputs.instance_name }}** did not end up in a working state.

          @MorphoCloud/morphocloud-admins — the post-condition check failed (see log); the instance likely needs attention.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Send email (individual)
      id: send_email_individual
      # Failure is handled gracefully below ("Triage email failure"): an
      # unshelve whose connection email could not be sent must NOT mask the
      # fact that the instance itself is up and running (and billing).
      continue-on-error: true
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && success() &&
        inputs.command_name == 'unshelve' && inputs.course_team_slug == '' }}
      uses: ./.github/actions/send-email
      with:
        os_cloud: ${{ inputs.os_cloud }}
        token: ${{ inputs.token }}
        email_lookup_url: ${{ inputs.email_lookup_url }}
        email_lookup_api_key: ${{ inputs.email_lookup_api_key }}
        issue_creator: ${{ inputs.issue_creator }}
        mail_server_username: ${{ inputs.mail_server_username }}
        mail_server_password: ${{ inputs.mail_server_password }}
        instance_name: ${{ steps.define.outputs.instance_name }}
        instance_issue_number: ${{ inputs.issue_number }}

    - name: Send email (course)
      id: send_email_course
      # See note on "Send email (individual)" above.
      continue-on-error: true
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && success() &&
        inputs.command_name == 'unshelve' && inputs.course_team_slug != '' }}
      uses: ./.github/actions/course-send-email
      with:
        os_cloud: ${{ inputs.os_cloud }}
        token: ${{ inputs.token }}
        email_lookup_url: ${{ inputs.email_lookup_url }}
        email_lookup_secret: ${{ inputs.email_lookup_secret }}
        issue_creator: ${{ inputs.issue_creator }}
        course_team_slug: ${{ inputs.course_team_slug }}
        mail_server_username: ${{ inputs.mail_server_username }}
        mail_server_password: ${{ inputs.mail_server_password }}
        instance_name: ${{ steps.define.outputs.instance_name }}
        instance_issue_number: ${{ inputs.issue_number }}

    # When the email send fails, decide whether this is a benign timing issue
    # (the instance is ACTIVE -- the email just raced a slow boot and could not
    # read the passphrase in time) or a genuine failure. Only the latter should
    # surface as a red command result; the former leaves the user with a running
    # instance and a clear next step.
    - name: Triage email failure
      id: email_followup
      if:
        ${{ steps.send_email_individual.outcome == 'failure' ||
        steps.send_email_course.outcome == 'failure' }}
      shell: bash
      run: |
        # '|| true' so a broken venv can't abort this step with no output set:
        # openstack would then be missing, the show below falls to UNKNOWN, and
        # we surface a visible "failed" result rather than a silent green job.
        source ~/venv/bin/activate || true
        status=$(openstack server show "$INSTANCE_NAME" -c status -f value 2>/dev/null || echo UNKNOWN)
        echo "Instance $INSTANCE_NAME status after failed email: $status"
        if [[ "$status" == "ACTIVE" ]]; then
          echo "mode=pending" >> "$GITHUB_OUTPUT"
        else
          echo "mode=failed" >> "$GITHUB_OUTPUT"
        fi
      env:
        OS_CLOUD: ${{ inputs.os_cloud }}
        INSTANCE_NAME: ${{ steps.define.outputs.instance_name }}

    - name: comment (instance up, email pending)
      id: comment_email_pending
      if: ${{ steps.email_followup.outputs.mode == 'pending' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          Instance **${{ steps.define.outputs.instance_name }}** is unshelved and running ✅

          We couldn't generate your connection email automatically (the instance was still finishing boot). Run `/email` in a couple of minutes to get your connection link.

    - name: comment (failed to send email)
      id: comment_email_failed
      if: ${{ steps.email_followup.outputs.mode == 'failed' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          Failed to send connection email for instance **${{ steps.define.outputs.instance_name }}**. ${{ steps.send_email_individual.outputs.error_message || steps.send_email_course.outputs.error_message }}

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Fail job on unrecoverable email error
      if: ${{ steps.email_followup.outputs.mode == 'failed' }}
      shell: bash
      run: exit 1

    - name: command results comment (success)
      if:
        ${{ steps.check_instance.outputs.exists == 'true' && success() &&
        steps.email_followup.outputs.mode != 'pending' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          Instance **${{ steps.define.outputs.instance_name }}** successfully ${{ inputs.command_name }}d ✅

    - name: Unapprove instance
      if:
        ${{ inputs.command_name == 'delete' &&
        fromJSON(inputs.unapprove_after_delete) }}
      uses: ./.github/actions/update-approval
      with:
        issue_number: ${{ inputs.issue_number }}
        command_name: "unapprove"
        instance_name_prefix: ${{ inputs.instance_name_prefix }}
        token: ${{ inputs.token }}

    - name: Update Request Status Label
      uses: ./.github/actions/update-request-status-label
      with:
        os_cloud: ${{ inputs.os_cloud }}
        token: ${{ inputs.token }}
        issue_number: ${{ inputs.issue_number }}
        instance_name: ${{ steps.define.outputs.instance_name }}
        instance_status:
          ${{ inputs.command_name == 'delete' && 'DELETED' || '' }}

    # Safety net: every failure MUST surface on the issue. Steps without a
    # dedicated failure comment (e.g. release_stuck_ip hanging on a wedged
    # nova-api backend, Instances#168 2026-07-20) previously failed the job in
    # complete silence — the user saw only the command-accepted reaction and
    # reasonably assumed success. Fires only when no dedicated FAILURE comment
    # above was posted; keep the outcome list in sync when adding comment
    # steps, but never add success-flavored comments (e.g.
    # comment_email_pending) — those would suppress the safety net after a
    # later-step failure.
    - name: comment (unhandled failure)
      if:
        ${{ failure() && steps.comment_not_approved.outcome != 'success' &&
        steps.comment_check_instance_failed.outcome != 'success' &&
        steps.comment_not_exist.outcome != 'success' &&
        steps.comment_task_state.outcome != 'success' &&
        steps.comment_corrupt_shelved.outcome != 'success' &&
        steps.comment_ip_check_failed.outcome != 'success' &&
        steps.comment_ip_create_failed.outcome != 'success' &&
        steps.comment_associate_ip_failed.outcome != 'success' &&
        steps.comment_execute_failed.outcome != 'success' &&
        steps.comment_unshelve_host_failure.outcome != 'success' &&
        steps.comment_max_wait.outcome != 'success' &&
        steps.comment_no_capacity.outcome != 'success' &&
        steps.comment_disassociate_failed.outcome != 'success' &&
        steps.comment_set_properties_failed.outcome != 'success' &&
        steps.comment_postcondition_failed.outcome != 'success' &&
        steps.comment_email_failed.outcome != 'success' }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        issue-number: ${{ inputs.issue_number }}
        body: |
          ### Command Results ❌

          `${{ inputs.command_name }}` command failed unexpectedly for instance **${{ steps.define.outputs.instance_name || 'unknown' }}** — the instance may not be in the requested state. If the failure happened after the state change, the command itself may have completed — check the run log before retrying.

          This is often a transient OpenStack API error on Jetstream2 — retrying the command may succeed.

          @MorphoCloud/morphocloud-admins — unhandled failure, please check the run log.

          See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
