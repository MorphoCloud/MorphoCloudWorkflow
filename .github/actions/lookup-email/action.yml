name: "Lookup email"
description:
  "Look up a user's email address from the Google Sheet via the Apps Script web
  app endpoint (or the morphocloud-intake API), using the GitHub username as the
  key."
inputs:
  lookup_url:
    description:
      "Base URL of the lookup endpoint (Apps Script web app or
      morphocloud-intake)"
    required: true
  github_username:
    description: "GitHub username to look up"
    required: true
  roster_sheet_id:
    description:
      "Google Sheet ID of the instructor-owned course roster (when set, uses
      lookup_course_roster instead of lookup)"
  api_key:
    description:
      "Optional API key sent as X-Api-Key header. Required when lookup_url
      points at the morphocloud-intake app; ignored by Apps Script endpoints."
    required: false
    default: ""
outputs:
  email:
    description: "The verified email address for the user"
    value: ${{ steps.lookup.outputs.email }}
runs:
  using: "composite"
  steps:
    - name: Look up email via Apps Script
      id: lookup
      shell: bash
      run: |
        echo "Looking up email for GitHub user '$GITHUB_USERNAME'"

        ENCODED_USERNAME=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['GITHUB_USERNAME']))")

        # Extract sheet ID if a full Google Sheets URL was pasted instead of just the ID
        if [[ "$ROSTER_SHEET_ID" =~ /spreadsheets/d/([a-zA-Z0-9_-]+) ]]; then
          ROSTER_SHEET_ID="${BASH_REMATCH[1]}"
          echo "Extracted sheet ID from URL: ${ROSTER_SHEET_ID}"
        fi

        CURL_ARGS=(-sL)
        if [[ -n "$API_KEY" ]]; then
          CURL_ARGS+=(-H "X-Api-Key: $API_KEY")
        fi

        if [[ -n "$ROSTER_SHEET_ID" ]]; then
          ENCODED_SHEET_ID=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['ROSTER_SHEET_ID']))")
          RESPONSE=$(curl "${CURL_ARGS[@]}" "${LOOKUP_URL}?action=lookup_course_roster&sheet_id=${ENCODED_SHEET_ID}&github_username=${ENCODED_USERNAME}")
        else
          RESPONSE=$(curl "${CURL_ARGS[@]}" "${LOOKUP_URL}?action=lookup&github_username=${ENCODED_USERNAME}")
        fi

        EMAIL=$(echo "$RESPONSE" | jq -r '.email // empty')
        ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')

        if [[ -n "$EMAIL" ]]; then
          echo "::add-mask::$EMAIL"
          echo "email=$EMAIL" >> $GITHUB_OUTPUT
          echo "Successfully resolved email for '$GITHUB_USERNAME'"
        else
          echo "::error ::Failed to look up email for '$GITHUB_USERNAME': ${ERROR:-unknown error}"
          exit 1
        fi
      env:
        LOOKUP_URL: ${{ inputs.lookup_url }}
        GITHUB_USERNAME: ${{ inputs.github_username }}
        ROSTER_SHEET_ID: ${{ inputs.roster_sheet_id }}
        API_KEY: ${{ inputs.api_key }}
