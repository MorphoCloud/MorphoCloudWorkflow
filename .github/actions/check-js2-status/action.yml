name: "Check Jetstream2 Status"
description: >
  Check for active Jetstream2 outages via the ACCESS Operations API.
  If an outage is found, posts a warning comment on the issue and sets
  the outage_detected output to 'true'. Fails gracefully if the API is
  unreachable (does not block the operation).
inputs:
  token:
    description: "GitHub token for posting issue comments"
    required: true
  issue_number:
    description: "Issue number to post the warning comment on"
    required: true
outputs:
  outage_detected:
    description: "'true' if an active Jetstream2 outage was detected, 'false' otherwise"
    value: ${{ steps.check.outputs.outage_detected }}
runs:
  using: "composite"
  steps:
    - name: Check Jetstream2 status
      id: check
      shell: bash
      run: |
        RESPONSE=$(curl -sf --max-time 10 \
          "https://operations-api.access-ci.org/wh2/news/v1/affiliation/access-ci.org/current_outages/") || {
          echo "ACCESS status API unreachable — skipping outage check"
          echo "outage_detected=false" >> $GITHUB_OUTPUT
          exit 0
        }

        JS2_OUTAGES=$(echo "$RESPONSE" | python3 -c "
import json, sys
data = json.load(sys.stdin)
outages = []
for item in data.get('results', []):
    for res in item.get('AffectedResources', []):
        rid = str(res.get('ResourceID', ''))
        if 'jetstream2' in rid.lower():
            outages.append({
                'subject': item.get('Subject', '(no title)'),
                'type': item.get('OutageType', ''),
                'end': item.get('OutageEnd') or '',
            })
            break
print(json.dumps(outages))
")

        COUNT=$(echo "$JS2_OUTAGES" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")

        if [[ "$COUNT" -gt 0 ]]; then
          echo "outage_detected=true" >> $GITHUB_OUTPUT

          OUTAGE_LINES=$(echo "$JS2_OUTAGES" | python3 -c "
import json, sys
outages = json.load(sys.stdin)
lines = []
for o in outages:
    end_str = f\" — expected end: {o['end']} UTC\" if o['end'] else ''
    lines.append(f\"- **{o['subject']}** ({o['type']} outage){end_str}\")
print('\n'.join(lines))
")

          gh issue comment "$ISSUE_NUMBER" --body "### ⚠️ Jetstream2 Outage Detected

An active Jetstream2 outage has been reported by [ACCESS-CI System Status](https://operations.access-ci.org/news). Your operation may fail or be delayed.

${OUTAGE_LINES}

The operation will proceed — you may need to retry once the outage is resolved. Contact @MorphoCloud/morphocloud-admins if you need assistance."
        else
          echo "outage_detected=false" >> $GITHUB_OUTPUT
        fi
      env:
        GH_TOKEN: ${{ inputs.token }}
        GH_REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
