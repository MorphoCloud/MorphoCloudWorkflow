name: "Resolve workshop schedule"
description:
  "Parse a workshop start date + time + timezone into a UTC epoch and
  human-readable local labels (DST-aware via IANA zoneinfo). Tolerant of common
  separator variants; always year-first and range-validated, so it never
  silently misparses. Also computes the earliest allowed /create time (start -
  lead_hours)."

inputs:
  start_date:
    description: "Start date as entered (year-first, e.g. 2026-06-08)"
    required: true
  start_time:
    description: "Start time as entered (24-hour, e.g. 09:00)"
    required: true
  timezone:
    description: "Timezone option text (IANA name in parentheses, or 'UTC')"
    required: true
  lead_hours:
    description: "Hours before start that /create becomes allowed"
    required: false
    default: "12"

outputs:
  valid:
    description: "'true' if the date + time + timezone parsed successfully"
    value: ${{ steps.resolve.outputs.valid }}
  error:
    description: "Human-readable reason when valid != 'true'"
    value: ${{ steps.resolve.outputs.error }}
  in_past:
    description: "'true' if the start time is already in the past"
    value: ${{ steps.resolve.outputs.in_past }}
  start_epoch:
    description: "Workshop start as a UTC epoch (seconds)"
    value: ${{ steps.resolve.outputs.start_epoch }}
  tz_name:
    description: "Resolved IANA timezone name"
    value: ${{ steps.resolve.outputs.tz_name }}
  start_label:
    description: "Start formatted in the organizer's local time"
    value: ${{ steps.resolve.outputs.start_label }}
  window_open_epoch:
    description:
      "Earliest allowed /create time (start - lead_hours) as a UTC epoch"
    value: ${{ steps.resolve.outputs.window_open_epoch }}
  window_open_label:
    description:
      "Earliest allowed /create time formatted in the organizer's local time"
    value: ${{ steps.resolve.outputs.window_open_label }}

runs:
  using: "composite"
  steps:
    - name: Resolve schedule
      id: resolve
      shell: bash
      env:
        START_DATE: ${{ inputs.start_date }}
        START_TIME: ${{ inputs.start_time }}
        TZ_TEXT: ${{ inputs.timezone }}
        LEAD_HOURS: ${{ inputs.lead_hours }}
      run: |
        python3 - <<'PY'
        import os, re, sys, time
        from datetime import datetime, timedelta
        from zoneinfo import ZoneInfo

        date_raw = os.environ.get("START_DATE", "").strip()
        time_raw = os.environ.get("START_TIME", "").strip()
        tz_text = os.environ.get("TZ_TEXT", "").strip()
        try:
            lead = int(os.environ.get("LEAD_HOURS", "12") or "12")
        except ValueError:
            lead = 12

        gh_out = os.environ["GITHUB_OUTPUT"]

        def fail(msg):
            with open(gh_out, "a") as f:
                f.write("valid=false\n")
                f.write(f"error={msg}\n")
            sys.exit(0)

        # --- timezone: IANA name is inside parentheses, bare "UTC" has none ---
        m = re.search(r"\(([^)]+)\)", tz_text)
        tz_name = (m.group(1) if m else tz_text).strip()
        try:
            tz = ZoneInfo(tz_name)
        except Exception:
            fail(f"Unrecognized timezone '{tz_text}'.")

        # --- date: year-first, any non-digit separators (-, /, ., _, space) ---
        dm = re.match(r"^(\d{4})\D+(\d{1,2})\D+(\d{1,2})$", date_raw)
        if not dm:
            fail(f"Could not read start date '{date_raw}'. "
                 f"Use year-first YYYY-MM-DD, e.g. 2026-06-08.")
        year, month, day = (int(dm.group(1)), int(dm.group(2)), int(dm.group(3)))

        # --- time: optional am/pm; HH:MM / HH.MM / HH MM / HHMM / H ---
        t = time_raw.lower()
        ampm = None
        ap = re.search(r"\s*([ap])\.?m\.?$", t)
        if ap:
            ampm = ap.group(1)
            t = t[: ap.start()].strip()
        tm = re.match(r"^(\d{1,2})[\s:.h]+(\d{2})$", t) or re.match(r"^(\d{2})(\d{2})$", t)
        if tm:
            hour, minute = int(tm.group(1)), int(tm.group(2))
        elif re.match(r"^\d{1,2}$", t):
            hour, minute = int(t), 0
        else:
            fail(f"Could not read start time '{time_raw}'. "
                 f"Use 24-hour HH:MM, e.g. 09:00 (or 9:00 AM).")
        if ampm:
            if not (1 <= hour <= 12):
                fail(f"Could not read start time '{time_raw}' with AM/PM. "
                     f"Use e.g. 9:00 AM or 14:00.")
            if ampm == "p" and hour != 12:
                hour += 12
            if ampm == "a" and hour == 12:
                hour = 0

        # --- range-validate by constructing the datetime ---
        try:
            naive = datetime(year, month, day, hour, minute)
        except ValueError as exc:
            fail(f"Invalid start date/time ({date_raw} {time_raw}): {exc}.")

        start = naive.replace(tzinfo=tz)
        start_epoch = int(start.timestamp())
        window_open = start - timedelta(hours=lead)
        LBL = "%a %b %d %Y, %H:%M %Z"

        with open(gh_out, "a") as f:
            f.write("valid=true\n")
            f.write(f"in_past={'true' if start_epoch < int(time.time()) else 'false'}\n")
            f.write(f"start_epoch={start_epoch}\n")
            f.write(f"tz_name={tz_name}\n")
            f.write(f"start_label={start.strftime(LBL)}\n")
            f.write(f"window_open_epoch={int(window_open.timestamp())}\n")
            f.write(f"window_open_label={window_open.strftime(LBL)}\n")
        PY
