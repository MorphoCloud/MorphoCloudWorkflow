name: "Send email"
description: "Send email with instance connection details"
inputs:
  os_cloud:
    description:
      "Name of the OpenStack cloud allocation to select openstack auth settings
      defined in '.config/openstack/clouds.yaml'"
    required: true
  token:
    description: "GITHUB_TOKEN or repo scoped PAT"
    required: true
  email_lookup_url:
    description: "URL of the Apps Script web app for email lookup"
    required: true
  email_lookup_api_key:
    description:
      "Optional API key for the lookup endpoint (required when lookup_url points
      at the morphocloud-intake app)"
    required: false
    default: ""
  issue_creator:
    description: "GitHub username of the issue creator"
    required: true
  mail_server_username:
    description: "mail server username"
    required: true
  mail_server_password:
    description: "mail server password"
    required: true
  instance_name:
    description: "Name of the instance to connect to"
    required: true
  instance_issue_number:
    description: "Reference of the GitHub issue associated with the instance"
    required: true
outputs:
  error_message:
    description: "Error message describing which steps failed"
    value: ${{ steps.set_error_message.outputs.error_message }}
runs:
  using: "composite"
  steps:
    - name: Look up email via Apps Script
      id: lookup_email
      uses: ./.github/actions/lookup-email
      with:
        lookup_url: ${{ inputs.email_lookup_url }}
        github_username: ${{ inputs.issue_creator }}
        api_key: ${{ inputs.email_lookup_api_key }}

    - name: Retrieve metadata
      id: instance_metadata
      uses: ./.github/actions/retrieve-metadata
      with:
        os_cloud: ${{ inputs.os_cloud }}
        instance_name: ${{ inputs.instance_name }}

    - name: Generate Guacamole Connection URL
      id: guacamole
      uses: ./.github/actions/generate-connection-url
      with:
        instance_ip: ${{ steps.instance_metadata.outputs.instance_ip }}

    # Email copy lives in MorphoCloudPortalContent (instance-credentials.json),
    # fetched at send time — copy edits go live on the next /create or /email
    # with no vendorize. render.py substitutes the placeholders (plain string
    # replace, safe for URLs and passphrases).
    - name: Fetch and render email template
      id: render
      shell: bash
      run: |
        curl -sfL --retry 3 --retry-delay 5 --retry-all-errors \
          -o /tmp/instance-credentials.json "$TEMPLATE_URL"
        python3 "$GITHUB_ACTION_PATH/render.py" /tmp/instance-credentials.json
      env:
        TEMPLATE_URL: https://raw.githubusercontent.com/MorphoCloud/MorphoCloudPortalContent/main/templates/instance-credentials.json
        REPO_NAME: ${{ github.event.repository.name }}
        REPOSITORY: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.instance_issue_number }}
        INSTANCE_NAME: ${{ inputs.instance_name }}
        INSTANCE_IP: ${{ steps.instance_metadata.outputs.instance_ip }}
        CONNECTION_URL: ${{ steps.guacamole.outputs.connection_url }}
        PASSPHRASE: ${{ steps.instance_metadata.outputs.instance_pwd }}

    - name: Send mail
      uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
      with:
        server_address: webhost.dynadot.com
        server_port: 587
        secure: false
        username: ${{ inputs.mail_server_username }}
        password: ${{ inputs.mail_server_password }}
        from: MorphoCloudPortal <no-reply@morphocloud.org>
        to: ${{ steps.lookup_email.outputs.email }}
        subject: ${{ steps.render.outputs.subject }}
        convert_markdown: true
        html_body: ${{ steps.render.outputs.body }}
    - name: Set error message
      id: set_error_message
      if: ${{ failure() }}
      shell: bash
      run: |
        if [[ $INSTANCE_METADATA_OUTCOME == "failure" ]]; then
          error_message="Failed to retrieve metadata"
        elif [[ $GUACAMOLE_OUTCOME == "failure" ]]; then
          error_message="Failed to generate connection URL"
        elif [[ $RENDER_OUTCOME == "failure" ]]; then
          error_message="Failed to fetch or render the email template"
        fi
        echo "error_message=$error_message" >> $GITHUB_OUTPUT
      env:
        # Step outcome
        INSTANCE_METADATA_OUTCOME: ${{ steps.instance_metadata.outcome }}
        GUACAMOLE_OUTCOME: ${{ steps.guacamole.outcome }}
        RENDER_OUTCOME: ${{ steps.render.outcome }}
