name: "Check team membership"
description: "Check if a GitHub user is a member of an organization team"
inputs:
  token:
    description: "GitHub token with read:org scope (e.g., GitHub App token)"
    required: true
  org:
    description: "GitHub organization name"
    required: true
  team_slug:
    description: "Team slug to check membership against"
    required: true
  username:
    description: "GitHub username to check"
    required: true
outputs:
  is_member:
    description: "Set to 'true' if the user is an active member, 'false' otherwise"
    value: ${{ steps.check.outputs.is_member }}
runs:
  using: "composite"
  steps:
    - name: Check team membership
      id: check
      shell: bash
      run: |
        echo "Checking if '$USERNAME' is a member of '$ORG/teams/$TEAM_SLUG'"

        HTTP_CODE=$(curl -s -o /tmp/membership_response.json -w "%{http_code}" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/orgs/$ORG/teams/$TEAM_SLUG/memberships/$USERNAME")

        if [[ "$HTTP_CODE" == "200" ]]; then
          STATE=$(jq -r '.state' /tmp/membership_response.json)
          if [[ "$STATE" == "active" ]]; then
            echo "is_member=true" >> $GITHUB_OUTPUT
            echo "User '$USERNAME' is an active member of '$ORG/teams/$TEAM_SLUG'"
          else
            echo "is_member=false" >> $GITHUB_OUTPUT
            echo "User '$USERNAME' has state '$STATE' in '$ORG/teams/$TEAM_SLUG' (not active)"
          fi
        else
          echo "is_member=false" >> $GITHUB_OUTPUT
          echo "User '$USERNAME' is not a member of '$ORG/teams/$TEAM_SLUG' (HTTP $HTTP_CODE)"
        fi

        rm -f /tmp/membership_response.json
      env:
        TOKEN: ${{ inputs.token }}
        ORG: ${{ inputs.org }}
        TEAM_SLUG: ${{ inputs.team_slug }}
        USERNAME: ${{ inputs.username }}
