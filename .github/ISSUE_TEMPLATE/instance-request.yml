name: Instance Request
description: Issue template to request an individual cloud instance.
title: "Instance: "
labels:
  - request-type:instance
  - request-creator:user

body:
  - type: markdown
    attributes:
      value: |
        _Please enter a short description of your project in the title bar above this text, followed by your Full Name. E.g.,: "Instance: 3D analysis of bryozoans; Jane Doe"_

  - type: dropdown
    attributes:
      label: Cloud Computing Instance Flavor
      description: Select the type of cloud-computing instance to create.
      options:
        - g3.large - GPU instance (16 CPUs, 60 GB RAM and 50% of A100 GPU)
        - g4.xl - GPU instance (32 CPUs, 125 GB RAM and L40S GPU)
        - m3.xl - General-purpose instance (32 CPUs, 125 GB RAM)
        - r3.large - Large Memory instance (64 CPUs, 500 GB RAM)
        - r3.xl - Large Memory instance (128 CPUs, 1000 GB RAM)
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description:
        Briefly describe what your project is, your usage needs and how you will
        be using the instance. E.g., "I am PhD candidate in XYZ University
        working on 3D morphometrics of fossil bryozoans. I have microCT scans
        of 100s specimens, and would like to use SlicerMorph to segment and
        extract models"._
    validations:
      required: true
