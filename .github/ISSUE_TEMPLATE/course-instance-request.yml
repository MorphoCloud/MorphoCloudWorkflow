name: Course Instance Request
description: Issue template to request a cloud instance for a MorphoCloud course or class.
title: "Course Instance: "
labels:
  - request-type:course-instance
  - request-creator:user
  - instance-request

body:
  - type: markdown
    attributes:
      value: |
        _Enter your full name in the title bar above (e.g., "Course Instance: Jane Doe")._

  - type: input
    id: course-team-slug
    attributes:
      label: Course Team Slug
      description: >
        The GitHub team slug for your course (provided by your instructor, e.g., `morpho-course-spring-2025`).
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Cloud Computing Instance Flavor
      description: Select the type of cloud-computing instance to create (your instructor may have specified which to use).
      options:
        - g3.large - GPU instance (16 CPUs, 60 GB RAM and 50% of A100 GPU)
        - g4.xl - GPU instance (32 CPUs, 125 GB RAM and L40S GPU)
        - m3.xl - General-purpose instance (32 CPUs, 125 GB RAM)
        - r3.large - Large Memory instance (64 CPUs, 500 GB RAM)
        - r3.xl - Large Memory instance (128 CPUs, 1000 GB RAM)
    validations:
      required: true

