name: Course Instance Request
description:
  Issue template to request a cloud instance for a MorphoCloud course or class.
title: "Course Instance Request"
labels:
  - request-type:course-instance
  - request-creator:user
  - instance-request

body:
  - type: markdown
    attributes:
      value: |
        _The title will be automatically replaced with a standard identifier when your request is processed. Avoid including personal information in the title._

  - type: checkboxes
    attributes:
      label: Confirmation
      options:
        - label:
            I am enrolled in this course and I am requesting a cloud computing
            instance.
          required: true

  - type: markdown
    attributes:
      value: |
        > **Note:** the **Create** button below only opens your request — your instance is not built yet.
        > On the page that opens, type `/create` in the comment box and press the green **Comment** button to build it.
