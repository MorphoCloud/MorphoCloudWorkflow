name: Individual Instance Request
description: Issue template to request an individual cloud instance.
title: "Individual Instance Request"
labels:
  - request-type:instance
  - request-creator:user
  - instance-request

body:
  - type: markdown
    attributes:
      value: |
        _The title will be automatically replaced with a standard identifier when your request is processed. Avoid including personal information in the title._

  - type: dropdown
    attributes:
      label: Cloud Computing Instance Flavor
      description: Select the type of cloud-computing instance to create.
      options:
        - g3.large - GPU instance (16 CPUs, 60 GB RAM and 50% of A100 GPU)
        - g3.xl - GPU instance (32 CPUs, 120 GB RAM and a full A100 GPU)
        - g4.xl - GPU instance (12 CPUs, 120 GB RAM and L40S GPU)
        - m3.xl - General-purpose instance (32 CPUs, 125 GB RAM)
        - r3.large - Large Memory instance (64 CPUs, 500 GB RAM)
        - r3.xl - Large Memory instance (128 CPUs, 1000 GB RAM)
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > **Note:** the **Create** button below only opens your request — your instance is not built yet.
        > On the page that opens, type `/create` in the comment box and press the green **Comment** button to build it.
