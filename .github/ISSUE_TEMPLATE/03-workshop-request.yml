name: Workshop Request
description: Issue template to request bulk creation of workshop instances.
title: "Workshop: "
labels:
  - request-type:workshop
  - request-creator:user

body:
  - type: markdown
    attributes:
      value: |
        _Please enter a short descriptive title for the workshop in the title bar above this text"_

  - type: dropdown
    attributes:
      label: Cloud Computing Instance Flavor
      description:
        Select the type of cloud-computing instance to create for workshop
        participants.
      options:
        - g3.large - GPU instance (16 CPUs, 60 GB RAM and 50% of A100 GPU)
        - g4.xl - GPU instance (32 CPUs, 125 GB RAM and A100 GPU)
        - m3.xl - General-purpose instance (32 CPUs, 125 GB RAM)
        - r3.large - Large Memory instance (64 CPUs, 500 GB RAM)
        - r3.xl - Large Memory instance (128 CPUs, 1000 GB RAM)
    validations:
      required: true

  - type: input
    attributes:
      label: Duration (days)
      description: Number of days the workshop instances should remain active.
      placeholder: "3"
    validations:
      required: true

  - type: input
    attributes:
      label: Number of Instances
      description: Total number of instances needed for the workshop.
      placeholder: "15"
    validations:
      required: true

  - type: input
    attributes:
      label: Workshop start
      description: >
        When the workshop begins, in the timezone you select below. Use 24-hour
        format YYYY-MM-DD HH:MM (e.g. 2026-06-08 09:00).
      placeholder: "2026-06-08 09:00"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Timezone
      description:
        Your local timezone, used to schedule instance creation and cleanup.
      options:
        - US/Canada Pacific (America/Los_Angeles)
        - US/Canada Mountain (America/Denver)
        - US Arizona, no DST (America/Phoenix)
        - US/Canada Central (America/Chicago)
        - US/Canada Eastern (America/New_York)
        - Canada Atlantic (America/Halifax)
        - US Alaska (America/Anchorage)
        - US Hawaii (Pacific/Honolulu)
        - Mexico Central (America/Mexico_City)
        - Brazil Brasilia (America/Sao_Paulo)
        - UK/Ireland/Portugal (Europe/London)
        - Western/Central Europe (Europe/Paris)
        - Eastern Europe (Europe/Athens)
        - UTC
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: >
        Provide details about your workshop. Approval is contingent upon a valid
        use case in the domain of 3D digital morphology.
      value: |
        **Workshop name:**

        **Target audience:**

        **Workshop content / goals:**

        **Software / data to be used:**
    validations:
      required: true
