name: Create Instance from Workflow

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
        type: number
      skip_preamble:
        description:
          "Skip validation comment and initial commands (for workshop
          sub-issues)"
        required: false
        default: "false"
        type: string
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
        type: string
      skip_preamble:
        description:
          "Skip validation comment and initial commands (for workshop
          sub-issues)"
        required: false
        default: "false"
        type: string

concurrency:
  # One create per sub-issue at a time. Under runner saturation a dispatched
  # create can sit queued for many minutes; without this, every backfill pass
  # that still sees the instance "missing" dispatches another, piling up
  # duplicates (workshop #9: 19 runs for 6 instances). Queue, never cancel —
  # aborting a half-run create would orphan a partial instance.
  group: create-instance-${{ inputs.issue_number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  checks: read

jobs:
  call-validate-request:
    if: ${{ inputs.skip_preamble != 'true' }}
    uses: ./.github/workflows/validate-request.yml
    with:
      issue_number: "${{ inputs.issue_number }}"
    secrets: inherit

  call-request-labeler:
    if: ${{ inputs.skip_preamble != 'true' }}
    uses: ./.github/workflows/request-labeler.yml
    with:
      issue_number: "${{ inputs.issue_number }}"
    secrets: inherit

  call-request-initial-comments:
    if: ${{ inputs.skip_preamble != 'true' }}
    uses: ./.github/workflows/request-initial-comments.yml
    with:
      issue_number: "${{ inputs.issue_number }}"
    secrets: inherit

  # Job A — acquire lane (FIP allocation + server-create + associate). Serial on
  # the acquire runner; short, so it frees the scarce runner quickly. Hands the
  # instance facts to the setup job via outputs (the baton is just these values).
  acquire:
    runs-on: ${{ vars.MORPHOCLOUD_ACQUIRE_RUNNER || 'self-hosted' }}
    needs:
      - call-validate-request
      - call-request-labeler
      - call-request-initial-comments
    if: ${{ !failure() && !cancelled() }}
    outputs:
      instance_name: ${{ steps.provision.outputs.instance_name }}
      volume_name: ${{ steps.provision.outputs.volume_name }}
      instance_ip: ${{ steps.provision.outputs.floating_ip_address }}
      progress_comment_id: ${{ steps.provision.outputs.progress_comment_id }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Check authorization
        id: check_auth
        shell: bash
        run: |
          LABELS_JSON=$(gh issue view "$ISSUE_NUMBER" --json labels 2>/dev/null)
          is_approved=$(echo "$LABELS_JSON" | jq -e '[.labels[].name] | index("request:approved")' > /dev/null && echo "true" || echo "false")
          if [[ "$is_approved" != "true" ]]; then
            echo "::error ::Issue #$ISSUE_NUMBER does not have request:approved label"
            exit 1
          fi
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Check JS2 status
        id: js2_status
        uses: ./.github/actions/check-js2-status
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ inputs.issue_number }}

      - name: Create instance (acquire)
        id: provision
        uses: ./.github/actions/create-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ inputs.issue_number }}
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          volume_name_suffix: ${{ vars.VOLUME_NAME_PREFIX }}
          volume_size_gb: ${{ vars.VOLUME_SIZE_GB || '100' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # Job B — setup lane (cloud-init wait, volume mount, reboot, email). Runs on the
  # control runner so the long setup tail does not pin the scarce acquire runner;
  # reconstructs all instance facts from the acquire job's outputs.
  setup:
    runs-on: ${{ vars.MORPHOCLOUD_CONTROL_RUNNER || 'self-hosted' }}
    needs:
      - acquire
    if: ${{ !failure() && !cancelled() }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Setup instance
        id: setup
        uses: ./.github/actions/setup-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ inputs.issue_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          instance_name: ${{ needs.acquire.outputs.instance_name }}
          volume_name: ${{ needs.acquire.outputs.volume_name }}
          instance_ip: ${{ needs.acquire.outputs.instance_ip }}
          progress_comment_id: ${{ needs.acquire.outputs.progress_comment_id }}

      - name: Get workshop organizer
        id: workshop_org
        if: ${{ steps.setup.outputs.setup_status == 'complete' }}
        shell: bash
        run: |
          ASSIGNEE=$(gh issue view "$ISSUE_NUMBER" --json assignees --jq '.assignees[0].login')
          echo "username=$ASSIGNEE" >> $GITHUB_OUTPUT
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Check if credentials already emailed
        id: email_check
        if: ${{ steps.setup.outputs.setup_status == 'complete' }}
        shell: bash
        run: |
          # email-sent guard: a re-run of this setup job (e.g. by the watchdog)
          # must not email the organizer twice.
          already=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name] | index("email-sent") != null')
          echo "already_sent=$already" >> $GITHUB_OUTPUT
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Send workshop email
        id: send_email
        if:
          ${{ steps.setup.outputs.setup_status == 'complete' &&
          steps.email_check.outputs.already_sent != 'true' }}
        uses: ./.github/actions/workshop-send-email
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          token: ${{ secrets.GITHUB_TOKEN }}
          email_lookup_url: ${{ vars.MORPHOCLOUD_WORKSHOP_EMAIL_LOOKUP_URL }}
          email_lookup_api_key: ${{ secrets.MORPHOCLOUD_LOOKUP_API_KEY }}
          github_username: ${{ steps.workshop_org.outputs.username }}
          mail_server_username: ${{ secrets.MAIL_USERNAME }}
          mail_server_password: ${{ secrets.MAIL_PASSWORD }}
          instance_name: ${{ needs.acquire.outputs.instance_name }}
          instance_issue_number: ${{ inputs.issue_number }}

      - name: Mark credentials emailed
        if: ${{ steps.send_email.outcome == 'success' }}
        shell: bash
        run: |
          gh label create "email-sent" --color "0E8A16" \
            --description "Credentials email sent to the organizer/user" --force >/dev/null 2>&1 || true
          gh issue edit "$ISSUE_NUMBER" --add-label "email-sent" >/dev/null 2>&1 || true
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: comment (failed to send email)
        if: ${{ steps.send_email.outcome == 'failure' && failure() }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ inputs.issue_number }}
          body: |
            ### Instance Creation Results ❌

            Failed to send connection email for instance **${{ needs.acquire.outputs.instance_name }}**. ${{ steps.send_email.outputs.error_message }}

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: comment (progress)
        if:
          ${{ steps.send_email.outcome == 'success' ||
          steps.email_check.outputs.already_sent == 'true' }}
        uses: ./.github/actions/comment-progress
        with:
          comment-id: ${{ needs.acquire.outputs.progress_comment_id }}
          create_ip: ✅
          create_volume: ✅
          create_instance: ✅
          associate_ip: ✅
          setup_instance: ✅
          attach_volume: ✅
          send_email: ✅
