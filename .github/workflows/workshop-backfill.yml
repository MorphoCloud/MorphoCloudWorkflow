name: Workshop Backfill

# Tops off approved workshops toward their target instance count by re-dispatching
# provisioning for sub-issues whose instance isn't live yet. This is the validated
# "periodic attempt-create" model: OpenStack is the arbiter of free capacity, so we
# simply re-attempt and capture slots as they free. create-instance is safe to
# re-dispatch (it skips/fails if the instance already exists, reuses an existing
# volume, and cleans up + exits on a capacity error).
#
# Runs on the self-hosted runner because it queries OpenStack to detect live
# instances. Stops topping off a workshop once it is full, its parent is
# closed/unapproved, or its workshop-end has passed.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  # Singleton: don't let backfill runs pile up behind a busy runner and execute
  # in bursts, each re-dispatching the same missing sub-issues. Queue (don't
  # cancel) so a run mid-dispatch isn't aborted with its work half-done.
  group: workshop-backfill
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  backfill:
    runs-on: ${{ vars.MORPHOCLOUD_CONTROL_RUNNER || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Top off under-target workshops
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          OS_CLOUD: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          PREFIX: ${{ vars.INSTANCE_NAME_PREFIX }}
          MAX_TOTAL: ${{ vars.MORPHOCLOUD_MAX_TOTAL_INSTANCES }}
          WORKSHOP_BUILD_BATCH: ${{ vars.MORPHOCLOUD_WORKSHOP_BUILD_BATCH }}
        run: |
          set -u
          set +e # GitHub runs steps with -e; disable it (this watcher handles errors explicitly)
          OS="$HOME/venv/bin/openstack"
          now=$(date +%s)
          max_total="${MAX_TOTAL:-0}"
          # Instance name prefix, matching define-instance-name: "<PREFIX>_" only if PREFIX is set.
          pref="${PREFIX:+${PREFIX}_}"

          # System-wide headroom: our instances currently up or building.
          sys_running=$("$OS" server list -f value -c Name -c Status 2>/dev/null \
            | awk -v p="^${pref}instance-[0-9]+$" '$1 ~ p && ($2=="ACTIVE"||$2=="BUILD"){c++} END{print c+0}')
          echo "System: ${sys_running} ${PREFIX} instance(s) up (cap ${max_total})"

          # Trickle cap: keep at most BATCH workshop builds in flight so the shared
          # acquire lane stays free for individual-user commands. In-flight = queued +
          # in-progress create-instance-from-workflow runs (workshop builds only;
          # individual /create uses a different workflow and is intentionally not throttled).
          batch="${WORKSHOP_BUILD_BATCH:-3}"
          inflight=$(gh run list --repo "$GH_REPO" --workflow create-instance-from-workflow.yml --status in_progress --json databaseId --jq 'length' 2>/dev/null || echo 0)
          q=$(gh run list --repo "$GH_REPO" --workflow create-instance-from-workflow.yml --status queued --json databaseId --jq 'length' 2>/dev/null || echo 0)
          inflight=$(( inflight + q ))
          slots=$(( batch - inflight ))
          (( slots < 0 )) && slots=0
          echo "Workshop trickle: batch=${batch} in-flight=${inflight} free-slots=${slots}"

          gh issue list --repo "$GH_REPO" --state open \
            --label "request-type:workshop" --label "request:approved" \
            --json number,labels --limit 100 \
          | jq -c '.[]' | while read -r parent; do
            num=$(jq -r '.number' <<<"$parent")
            names=$(jq -r '[.labels[].name] | join(",")' <<<"$parent")

            case ",$names," in
              *,workflow:creating-instances,*) echo "#$num: locked (creating), skip"; continue ;;
            esac

            target=$(grep -oE 'workshop-target:[0-9]+' <<<"$names" | head -1 | cut -d: -f2)
            wend=$(grep -oE 'workshop-end:[0-9]+' <<<"$names" | head -1 | cut -d: -f2)
            [ -z "$target" ] && { echo "#$num: no workshop-target label, skip"; continue; }
            if [ -n "$wend" ] && (( now >= wend )); then echo "#$num: past workshop-end, skip"; continue; fi

            subs_json=$(gh api "/repos/$GH_REPO/issues/$num/sub_issues" 2>/dev/null || echo '[]')
            subs=$(jq -r '.[].number' <<<"$subs_json")
            [ -z "$subs" ] && { echo "#$num: no sub-issues, skip"; continue; }

            live=0; missing=""
            for s in $subs; do
              # Skip sub-issues intentionally torn down (e.g. /delete_all sets status:deleted)
              # so the topper does not recreate an instance the organizer removed on purpose.
              s_labels=$(jq -r --argjson s "$s" '.[] | select(.number==$s) | [.labels[].name] | join(",")' <<<"$subs_json")
              case ",$s_labels," in *,status:deleted,*) echo "#$num/#$s: status:deleted, skip"; continue ;; esac
              st=$("$OS" server show "${pref}instance-${s}" -f value -c status 2>/dev/null || echo ABSENT)
              if [[ "$st" == "ACTIVE" || "$st" == "BUILD" ]]; then
                live=$((live + 1))
              else
                missing="$missing $s"
              fi
            done
            shortfall=$(( target - live ))
            echo "#$num: target=$target live=$live shortfall=$shortfall missing=[${missing# }]"

            # Backfill no longer comments on the issue: an "instances are up" comment
            # based on the ACTIVE/BUILD count is premature (a VM is ACTIVE ~20 min before
            # cloud-init/setup finishes), and per-cycle "topping off" comments are noise.
            # `update-workshop` is the single source of the readiness announcement — it
            # comments + emails the credentials only when every instance is truly ready
            # (the exoPw/setup-complete check via list-instance-credentials.sh).

            (( shortfall <= 0 )) && continue

            headroom=$(( max_total - sys_running ))
            (( headroom < 0 )) && headroom=0
            to_make=$shortfall
            (( to_make > headroom )) && to_make=$headroom
            (( to_make > slots )) && to_make=$slots   # trickle: respect free workshop-build slots
            if (( to_make <= 0 )); then echo "#$num: no free build slots (in-flight=${inflight}/${batch}) or system at cap (${sys_running}/${max_total})"; continue; fi

            n=0
            for s in $missing; do
              (( n >= to_make )) && break
              echo "#$num: re-dispatch create for sub-issue #$s"
              if gh workflow run create-instance-from-workflow.yml -f issue_number="$s" -f skip_preamble=true >/dev/null 2>&1; then
                n=$((n + 1)); sys_running=$((sys_running + 1)); slots=$((slots - 1))
              else
                echo "  dispatch failed for #$s"
              fi
            done
            echo "#$num: dispatched $n re-provision attempt(s)"
          done
