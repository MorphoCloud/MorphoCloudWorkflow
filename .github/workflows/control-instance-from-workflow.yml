name: Control Instance from Workflow

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
        type: number
      command_name:
        description:
          "Name of the command to execute: create, delete, shelve, unshelve"
        required: true
        type: string
      unapprove_after_delete:
        description: "Whether to unapprove after deleting the instance"
        type: boolean
        default: false
      issue_creator:
        description: "GitHub username of the issue creator (for unshelve email)"
        required: false
        type: string
        default: ""
      roster_sheet_id:
        description:
          "Google Sheet ID of the course roster (leave blank for individual
          repos)"
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
        type: string
      command_name:
        description:
          "Name of the command to execute: create, delete, shelve, unshelve"
        required: true
        type: string
      unapprove_after_delete:
        description: "Whether to unapprove after deleting the instance"
        type: boolean
        default: false
      issue_creator:
        description: "GitHub username of the issue creator (for unshelve email)"
        required: false
        type: string
        default: ""
      roster_sheet_id:
        description:
          "Google Sheet ID of the course roster (leave blank for individual
          repos)"
        required: false
        type: string
        default: ""
permissions:
  issues: write
  contents: read
  checks: read

jobs:
  control:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Control instance
        uses: ./.github/actions/control-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ inputs.issue_number }}
          command_name: ${{ inputs.command_name }}
          unapprove_after_delete: ${{ inputs.unapprove_after_delete }}
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          token: ${{ secrets.GITHUB_TOKEN }}
          email_lookup_url: ${{ vars.MORPHOCLOUD_EMAIL_LOOKUP_URL }}
          issue_creator: ${{ inputs.issue_creator }}
          roster_sheet_id: ${{ inputs.roster_sheet_id }}
          mail_server_username: ${{secrets.MAIL_USERNAME}}
          mail_server_password: ${{secrets.MAIL_PASSWORD}}
