name: Update Request Status Label
on:
  schedule:
    # Run every 5 mins
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ vars.MORPHOCLOUD_OS_CLOUD }}
  cancel-in-progress: false # queue a starved cycle, don't drop it

permissions:
  issues: write
  contents: read

jobs:
  update-request-status-label:
    runs-on: ${{ vars.MORPHOCLOUD_CONTROL_RUNNER || 'self-hosted' }}
    steps:
      - uses: actions/checkout@v6

      - name: Update issues
        run: |
          source ~/venv/bin/activate

          instance_prefix=${PREFIX:+${PREFIX}_}
          instance_basename="${instance_prefix}instance"

          openstack server list --name "^${instance_basename}-\d+" --long -f json | \
          jq -r '.[] | [.Name, .Status, ((.Properties.exoSetup // "") | tostring)] | @tsv' | \
            while IFS=$'\t' read -r instance_name status exosetup; do
              issue_number=${instance_name##*-}
              status_lowercase=${status,,}

              add_label="status:$status_lowercase"

              # An OpenStack-ACTIVE server is still installing until the
              # exoSetup marker reports complete — labeling it "active" misled
              # users into thinking the instance was ready (tester feedback).
              if [[ "$status" == "ACTIVE" && "$exosetup" != *complete* ]]; then
                add_label="status:building"
              fi

              remove_labels=$(gh issue view $issue_number --json labels | \
                jq \
                  -r \
                  --arg add_label "$add_label" \
                  -c '[.labels[].name | select(test("^status:")?) | select(. != $add_label)] | join(",")')

              echo "Updating issue $issue_number adding label [$add_label] and removing labels [$remove_labels]"

              gh issue edit ${issue_number} --add-label "${add_label}" --remove-label "${remove_labels}"
            done
        env:
          OS_CLOUD: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PREFIX: ${{ vars.INSTANCE_NAME_PREFIX }}
