name: Create Instance

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  checks: read
  contents: read

# Two-job split (security review M3): authorization runs first on a
# GitHub-hosted runner; the acquire runner is only occupied — and nothing is
# checked out or provisioned — once /create is authorized. The job-level gate
# on the execute job also closes a latent hole: a comment that merely
# mentioned "/create" mid-sentence used to fall through to provisioning
# because github/command's strict prefix match returned continue=false
# without failing the job.
jobs:
  authorize:
    runs-on: ubuntu-latest
    if:
      ${{ !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'request-type:instance') && (
      contains(github.event.comment.body, '/create') ) }}
    outputs:
      continue: ${{ steps.create_command.outputs.continue }}
      admins: ${{ steps.admins.outputs.members }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: admin-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Resolve admins from morphocloud-admins team
        id: admins
        uses: ./.github/actions/resolve-team-members
        with:
          token: ${{ steps.admin-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: morphocloud-admins

      - name: create command
        id: create_command
        uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        with:
          command: "/create"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ steps.admins.outputs.members }},${{
            github.event.issue.user.login }},${{
            join(github.event.issue.assignees.*.login, ',') }}"

  create:
    runs-on: ${{ vars.MORPHOCLOUD_ACQUIRE_RUNNER || 'self-hosted' }}
    needs: authorize
    if: ${{ needs.authorize.outputs.continue == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Check authorization
        id: check_auth
        shell: bash
        run: |
          # Determine whose MorphoCloudUsers membership to verify:
          #  - individual issue: the issue creator IS the requester
          #  - workshop sub-issue: bot-created and assigned to the organizer, so
          #    verify the assignee (the organizer), never the bot creator. The
          #    'request-creator:workshop' label (set in create-workshop.yml)
          #    distinguishes the two.
          if [[ "$IS_WORKSHOP" == "true" ]]; then
            SUBJECT=$(echo "$ASSIGNEES" | cut -d',' -f1)
          else
            SUBJECT="$ISSUE_CREATOR"
          fi

          # An admin running the command is always authorized.
          if echo ",$ADMINS," | grep -q ",$COMMENT_AUTHOR,"; then
            echo "Admin $COMMENT_AUTHOR — authorized."
            exit 0
          fi

          if [[ -z "$SUBJECT" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          \`/create\` could not determine the requesting user for this issue. Please tag @MorphoCloud/morphocloud-admins."
            echo "::error ::Could not determine the subject user to authorize"
            exit 1
          fi

          ENCODED_SUBJECT=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$SUBJECT")
          HTTP_CODE=$(curl -s --retry 3 --retry-delay 5 --retry-all-errors -o /tmp/membership_response.json -w "%{http_code}" \
            -H "Authorization: Bearer $APP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/$ORG/teams/$USERS_TEAM_SLUG/memberships/$ENCODED_SUBJECT") || true

          authorized="false"
          if [[ "$HTTP_CODE" == "200" ]]; then
            STATE=$(jq -r '.state' /tmp/membership_response.json)
            if [[ "$STATE" == "active" ]]; then
              authorized="true"
            fi
          fi
          rm -f /tmp/membership_response.json

          if [[ "$authorized" != "true" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          @${SUBJECT} is not a registered MorphoCloud user, so \`/create\` cannot proceed.

          You have to onboard yourself with MorphoCloud as a regular user first. Please go to [join.morphocloud.org](https://join.morphocloud.org), submit your intake form, and accept the GitHub organization invitation. Then comment \`/create\` again."
            echo "::error ::User $SUBJECT is not an active member of $USERS_TEAM_SLUG"
            exit 1
          fi
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          USERS_TEAM_SLUG: ${{ vars.MORPHOCLOUD_USERS_TEAM_SLUG }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          IS_WORKSHOP:
            ${{ contains(github.event.issue.labels.*.name,
            'request-creator:workshop') }}
          ASSIGNEES: ${{ join(github.event.issue.assignees.*.login, ',') }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ADMINS: ${{ needs.authorize.outputs.admins }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Check instance quota
        id: check_quota
        shell: bash
        run: |
          MAX_PER_USER="${MAX_PER_USER:-2}"
          MAX_TOTAL="${MAX_TOTAL:-90}"
          # Admin bypass — keyed on whoever ran /create (an admin acting on a
          # user's issue overrides the quota), not the issue creator
          if echo ",$ADMINS," | grep -q ",$COMMENT_AUTHOR,"; then
            echo "Admin $COMMENT_AUTHOR — skipping quota check."
            exit 0
          fi

          source ~/venv/bin/activate

          # Fetch all OpenStack instances in one call
          SERVERS_JSON=$(openstack server list -f json)
          TOTAL_COUNT=$(echo "$SERVERS_JSON" | jq 'length')
          OS_NAMES=$(echo "$SERVERS_JSON" | jq -r '.[].Name')

          echo "Total instances in OpenStack: $TOTAL_COUNT (system limit: $MAX_TOTAL)"

          # Global capacity check
          if [[ "$TOTAL_COUNT" -ge "$MAX_TOTAL" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          The system has reached its capacity limit of **${MAX_TOTAL}** instances. No new instances can be provisioned at this time.

          Please try again later or contact @MorphoCloud/morphocloud-admins for assistance.

          > @MorphoCloud/morphocloud-admins — ⚠️ System capacity limit reached ($TOTAL_COUNT/$MAX_TOTAL). @${ISSUE_CREATOR} is waiting."
            gh issue edit "$ISSUE_NUMBER" --add-label "error:system-capacity"
            echo "::error ::System capacity: $TOTAL_COUNT/$MAX_TOTAL"
            exit 1
          fi

          # Workshop sub-issues are bounded by the workshop's approved instance
          # count, not the per-user limit — and they are bot-authored, so the
          # per-user tally below (keyed on the issue creator) would mis-attribute
          # every workshop instance to the bot. Global capacity is already
          # checked above; skip the per-user quota for these.
          if [[ "$IS_WORKSHOP" == "true" ]]; then
            echo "Workshop sub-issue — per-user quota does not apply (governed by workshop approval)."
            exit 0
          fi

          # Per-user check: count user's issue numbers (individual + course, open AND closed)
          # that have a live OpenStack instance or volume — catches manually-closed issues with orphaned resources.
          INSTANCE_PREFIX="${INSTANCE_NAME_PREFIX:+${INSTANCE_NAME_PREFIX}_}"
          OS_VOLUME_NAMES=$(openstack volume list -f json | jq -r '.[].Name')
          INDIV_NUMS=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:instance" \
            --state all \
            --limit 200 \
            --json number \
            --jq '.[].number' | grep -v "^${ISSUE_NUMBER}$" || true)
          COURSE_NUMS=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:course-instance" \
            --state all \
            --limit 200 \
            --json number \
            --jq '.[].number' | grep -v "^${ISSUE_NUMBER}$" || true)
          ISSUE_NUMBERS=$(printf "%s\n%s" "$INDIV_NUMS" "$COURSE_NUMS" | grep -v '^$' || true)

          USER_COUNT=0
          OCCUPIED_ISSUES=""
          while IFS= read -r NUM; do
            [[ -z "$NUM" ]] && continue
            INSTANCE_NAME="${INSTANCE_PREFIX}instance-${NUM}"
            VOLUME_NAME="My-Data-${NUM}"
            if echo "$OS_NAMES" | grep -qx "$INSTANCE_NAME" || \
               echo "$OS_VOLUME_NAMES" | grep -qE "^${VOLUME_NAME}(-.*)?$"; then
              (( ++USER_COUNT ))
              OCCUPIED_ISSUES="${OCCUPIED_ISSUES} #${NUM}"
            fi
          done <<< "$ISSUE_NUMBERS"
          OCCUPIED_ISSUES=$(echo "$OCCUPIED_ISSUES" | xargs | tr ' ' ', ')

          echo "User $ISSUE_CREATOR has $USER_COUNT active OpenStack instance(s) across all types (limit: $MAX_PER_USER)"

          if [[ "$USER_COUNT" -ge "$MAX_PER_USER" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          @${ISSUE_CREATOR} already has **${USER_COUNT}** active instance(s), which is at the per-user limit of **${MAX_PER_USER}**.

          Existing instance(s) found in OpenStack: ${OCCUPIED_ISSUES}

          Go to one of those issues and type \`/delete_all\` to free your quota before creating a new one.

          > @MorphoCloud/morphocloud-admins — FYI, @${ISSUE_CREATOR} has reached the per-user instance limit ($USER_COUNT/$MAX_PER_USER)."
            echo "::error ::User $ISSUE_CREATOR has $USER_COUNT/$MAX_PER_USER instances"
            exit 1
          fi
        env:
          OS_CLOUD: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          INSTANCE_NAME_PREFIX: ${{ vars.INSTANCE_NAME_PREFIX }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          IS_WORKSHOP:
            ${{ contains(github.event.issue.labels.*.name,
            'request-creator:workshop') }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ADMINS: ${{ needs.authorize.outputs.admins }}
          MAX_PER_USER: ${{ vars.MORPHOCLOUD_MAX_INSTANCES_PER_USER }}
          MAX_TOTAL: ${{ vars.MORPHOCLOUD_MAX_TOTAL_INSTANCES }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Check JS2 status
        id: js2_status
        uses: ./.github/actions/check-js2-status
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}

      - name: Create instance (acquire)
        id: provision
        uses: ./.github/actions/create-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ github.event.issue.number }}
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          volume_name_suffix: ${{ vars.VOLUME_NAME_SUFFIX }}
          volume_size_gb: ${{ vars.VOLUME_SIZE_GB || '100' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Individual creates stay one job (acquire + setup back-to-back on the
      # acquire runner) — same behaviour as before the split; only the workshop
      # path fans setup out to the control runner.
      - name: Setup instance
        id: setup
        uses: ./.github/actions/setup-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ github.event.issue.number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          instance_name: ${{ steps.provision.outputs.instance_name }}
          volume_name: ${{ steps.provision.outputs.volume_name }}
          instance_ip: ${{ steps.provision.outputs.floating_ip_address }}
          progress_comment_id:
            ${{ steps.provision.outputs.progress_comment_id }}

      - name: Send email
        id: send_email
        if: ${{ steps.setup.outputs.setup_status == 'complete' }}
        uses: ./.github/actions/send-email
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          token: ${{ secrets.GITHUB_TOKEN }}
          email_lookup_url: ${{ vars.MORPHOCLOUD_EMAIL_LOOKUP_URL }}
          email_lookup_api_key: ${{ secrets.MORPHOCLOUD_LOOKUP_API_KEY }}
          issue_creator: ${{ github.event.issue.user.login }}
          mail_server_username: ${{ secrets.MAIL_USERNAME }}
          mail_server_password: ${{ secrets.MAIL_PASSWORD }}
          instance_name: ${{ steps.provision.outputs.instance_name }}
          instance_issue_number: ${{ github.event.issue.number }}

      - name: comment (failed to send email)
        if: ${{ steps.send_email.outcome == 'failure' && failure() }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### Instance Creation Results ❌

            Failed to send connection email for instance **${{ steps.provision.outputs.instance_name }}**. ${{ steps.send_email.outputs.error_message }}

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: comment (progress)
        if: ${{ steps.send_email.outcome == 'success' }}
        uses: ./.github/actions/comment-progress
        with:
          comment-id: ${{ steps.provision.outputs.progress_comment_id }}
          create_ip: ✅
          create_volume: ✅
          create_instance: ✅
          associate_ip: ✅
          setup_instance: ✅
          attach_volume: ✅
          send_email: ✅

      - name: comment (retry guidance on provisioning failure)
        if: ${{ failure() && steps.provision.outcome == 'failure' }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            #### ⚠️ What to do next

            Instance creation did not complete. This is sometimes caused by a transient cloud error. To retry from a clean state, comment the following on this issue, one at a time:

            1. `/delete_all` — removes the partially-created instance, volume, and floating IP
            2. `/create` — provisions again from scratch

            If it fails again after retrying, please tag `@MorphoCloud/morphocloud-admins` for help.
