name: "Course Request Handler"
on:
  issues:
    types:
      - opened

permissions:
  issues: write
  contents: read
  checks: read

jobs:
  check-course-team-membership:
    runs-on: ubuntu-latest
    if:
      ${{ contains(github.event.issue.labels.*.name,
      'request-type:course-instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    steps:
      - name: Set course expiration and flavor labels
        shell: bash
        run: |
          if [[ -n "$COURSE_DURATION_DAYS" ]]; then
            expiration_label="expiration:${COURSE_DURATION_DAYS}d"
            gh label create "$expiration_label" \
              --color "892368" \
              --description "Instance expires in ${COURSE_DURATION_DAYS}d (24h grace after shelving)" \
              --force >/dev/null 2>&1 || true
            gh issue edit "$ISSUE_NUMBER" --add-label "$expiration_label"
            echo "Set expiration label: $expiration_label"
          else
            echo "::warning ::No COURSE_DURATION_DAYS variable set; skipping expiration label"
          fi

          if [[ -n "$COURSE_FLAVOR" ]]; then
            gh issue edit "$ISSUE_NUMBER" --add-label "flavor:$COURSE_FLAVOR"
            echo "Set flavor label: flavor:$COURSE_FLAVOR"
          else
            echo "::warning ::No COURSE_FLAVOR variable set; skipping flavor label"
          fi
        env:
          COURSE_DURATION_DAYS: ${{ vars.COURSE_DURATION_DAYS }}
          COURSE_FLAVOR: ${{ vars.COURSE_FLAVOR }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  check-course-instance-quota:
    needs: [check-course-team-membership]
    runs-on: ubuntu-latest
    if:
      ${{ contains(github.event.issue.labels.*.name,
      'request-type:course-instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    steps:
      - name: Check per-user course instance quota
        run: |
          MAX_COURSE_PER_USER="${MAX_COURSE_PER_USER:-1}"
          MAX_PER_USER="${MAX_PER_USER:-2}"
          # Admin bypass
          if echo ",$ADMINS," | grep -q ",$ISSUE_CREATOR,"; then
            echo "Admin $ISSUE_CREATOR — skipping quota check."
            exit 0
          fi

          # Count open course instance request issues, excluding the current one.
          COURSE_JSON=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:course-instance" \
            --state open \
            --limit 200 \
            --json number)
          EXISTING_COURSE=$(echo "$COURSE_JSON" | jq --argjson cur "$ISSUE_NUMBER" '[.[] | select(.number != $cur)]')
          COURSE_COUNT=$(echo "$EXISTING_COURSE" | jq 'length')
          echo "User $ISSUE_CREATOR already has $COURSE_COUNT open course instance request(s) (limit: $MAX_COURSE_PER_USER)."

          if [[ "$COURSE_COUNT" -ge "$MAX_COURSE_PER_USER" ]]; then
            ISSUE_LINKS=$(echo "$EXISTING_COURSE" | jq -r '[.[] | "#\(.number)"] | join(", ")')
            gh issue comment "$ISSUE_NUMBER" --body "### Course Instance Request Rejected ❌

          @${ISSUE_CREATOR} already has **${COURSE_COUNT}** open course instance request(s) (${ISSUE_LINKS}), which is the maximum of **${MAX_COURSE_PER_USER}**.

          You already have an open course request — please use that existing issue. If your instance resources have been deleted, you can run \`/create\` directly in the existing issue to get a new instance.

          > @MorphoCloud/morphocloud-admins — FYI, @${ISSUE_CREATOR} has reached the open course-issue limit ($COURSE_COUNT/$MAX_COURSE_PER_USER)."
            gh issue close "$ISSUE_NUMBER"
            echo "::error ::User $ISSUE_CREATOR has $COURSE_COUNT open course instance requests (limit: $MAX_COURSE_PER_USER)"
            exit 1
          fi

          # Global cap: count all open instance request issues (course + individual) against MAX_PER_USER.
          INDIV_JSON=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:instance" \
            --state open \
            --limit 200 \
            --json number)
          ALL_JSON=$(jq -n --argjson a "$COURSE_JSON" --argjson b "$INDIV_JSON" '$a + $b')
          EXISTING_ALL=$(echo "$ALL_JSON" | jq --argjson cur "$ISSUE_NUMBER" '[.[] | select(.number != $cur)]')
          TOTAL_COUNT=$(echo "$EXISTING_ALL" | jq 'length')
          echo "User $ISSUE_CREATOR already has $TOTAL_COUNT open instance request(s) across all types (global limit: $MAX_PER_USER)."

          if [[ "$TOTAL_COUNT" -ge "$MAX_PER_USER" ]]; then
            ISSUE_LINKS=$(echo "$EXISTING_ALL" | jq -r '[.[] | "#\(.number)"] | join(", ")')
            gh issue comment "$ISSUE_NUMBER" --body "### Course Instance Request Rejected ❌

          @${ISSUE_CREATOR} already has **${TOTAL_COUNT}** open instance request(s) across all types (${ISSUE_LINKS}), which is the global maximum of **${MAX_PER_USER}**.

          You already have open requests — please use one of those existing issues. If your instance resources have been deleted, you can run \`/create\` directly in an existing issue to get a new instance.

          > @MorphoCloud/morphocloud-admins — FYI, @${ISSUE_CREATOR} has reached the global open-issue limit ($TOTAL_COUNT/$MAX_PER_USER)."
            gh issue close "$ISSUE_NUMBER"
            echo "::error ::User $ISSUE_CREATOR has $TOTAL_COUNT open instance requests across all types (global limit: $MAX_PER_USER)"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          ADMINS: ${{ vars.MORPHOCLOUD_GITHUB_ADMINS }}
          MAX_COURSE_PER_USER:
            ${{ vars.MORPHOCLOUD_MAX_COURSE_INSTANCES_PER_USER }}
          MAX_PER_USER: ${{ vars.MORPHOCLOUD_MAX_INSTANCES_PER_USER }}

  call-validate-request-course:
    needs: [check-course-team-membership, check-course-instance-quota]
    if:
      ${{ contains(github.event.issue.labels.*.name,
      'request-type:course-instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/validate-request-course.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit

  call-request-initial-comments-course:
    needs: [check-course-team-membership, check-course-instance-quota]
    if:
      ${{ contains(github.event.issue.labels.*.name,
      'request-type:course-instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/request-initial-comments.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
      commands_md_path: "course-issue-commands.md"
    secrets: inherit

  rename-course-issue:
    needs: [check-course-team-membership, check-course-instance-quota]
    runs-on: ubuntu-latest
    if:
      ${{ contains(github.event.issue.labels.*.name,
      'request-type:course-instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    steps:
      - name: Extract course slug and rename issue
        run: |
          # Strip mc- prefix for readability (COURSE_TEAM_SLUG e.g. mc-uw-bio388l)
          short_slug="${COURSE_TEAM_SLUG#mc-}"
          gh issue edit "$ISSUE_NUMBER" --title "MC-Course-${short_slug}-${ISSUE_NUMBER}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COURSE_TEAM_SLUG: ${{ vars.COURSE_TEAM_SLUG }}
