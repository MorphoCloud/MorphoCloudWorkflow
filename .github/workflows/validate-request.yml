name: Validate Request

on:
  issues:
    types:
      - edited
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
        type: string

# Permissions needed for reacting to IssueOps commands on issues
permissions:
  issues: write
  checks: read
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Collect Inputs
        id: collect_inputs
        shell: bash
        run: |
          echo "EVENT_NAME [$EVENT_NAME]"
          if [[ "$EVENT_NAME" == "issues" ]]; then
            issue_number=${{ github.event.issue.number || inputs.issue_number }}
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            issue_number=${{ github.event.inputs.issue_number }}
          else
            echo "::error ::Unsupported EVENT_NAME [$EVENT_NAME]"
            exit 1
          fi
          if [[ -z "$issue_number" || "$issue_number" == "null" ]]; then
            echo "::error ::issue_number not provided"
            exit 1
          fi
          echo "issue_number=$issue_number" >> $GITHUB_OUTPUT
        env:
          EVENT_NAME: ${{ github.event_name }}

      - uses: actions/checkout@v6

      - name: Determine request type
        id: request_type
        run: |
          LABELS_JSON=$(gh issue view "$ISSUE_NUMBER" --json labels)
          is_workshop=$(echo "$LABELS_JSON" | jq -e '[.labels[].name] | index("request-type:workshop")' > /dev/null 2>&1 && echo "true" || echo "false")
          echo "is_workshop=$is_workshop" >> $GITHUB_OUTPUT
        env:
          ISSUE_NUMBER: ${{ steps.collect_inputs.outputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Extract fields
        id: extract
        uses: ./.github/actions/extract-issue-fields
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue_number: ${{ steps.collect_inputs.outputs.issue_number }}

      # --- Validation result comments ---

      - name: find command results comment
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ steps.collect_inputs.outputs.issue_number }}
          body-includes: "### Validation Results"

      - name: command results comment (instance - success)
        if: ${{ steps.request_type.outputs.is_workshop != 'true' && success() }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.collect_inputs.outputs.issue_number }}
          edit-mode: replace
          body: |
            ### Validation Results

            ✅ Instance request validated. You may now use `/create` to provision your instance.

      - name: command results comment (failure)
        if: ${{ failure() }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ steps.collect_inputs.outputs.issue_number }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            ### Validation Results

            The validation checks failed ❌.

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: command results comment (workshop - success)
        if: ${{ steps.request_type.outputs.is_workshop == 'true' && success() }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.collect_inputs.outputs.issue_number }}
          edit-mode: replace
          body: |
            ### Validation Results

            ✅ Workshop request validated. An administrator will review your request. You will **automatically receive an email** once it has been approved — no further action is needed until then.
