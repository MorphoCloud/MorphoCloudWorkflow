# =============================================================================
# enroll-students.yml — Enroll students into the course GitHub team
# =============================================================================
#
# Triggered by:
#   - Push to students.txt on main (automatic enrollment on file update)
#   - Manual workflow_dispatch (with usernames input or students.txt fallback)
#
# What it does for each username:
#   1. Verifies the GitHub user exists
#   2. Skips if already an active/pending member of this course team
#   3. Adds to the team via GitHub API — if the user is already in the org
#      they are added immediately (active); otherwise a pending org invitation
#      is sent and they are added to the team once they accept
#
# Prerequisites:
#   - COURSE_TEAM_SLUG repo variable must be set (e.g. mc-34m-bio-102)
#   - MORPHOCLOUD_WORKFLOW_APP_ID repo variable must be set
#   - MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY repo secret must be set
#   - The GitHub App must have "Members: Read & Write" org-level permission.
#     (GitHub → Org Settings → GitHub Apps → Configure → Permissions)
#
# =============================================================================

name: Enroll Students

on:
  push:
    branches: [main]
    paths: [students.txt]
  workflow_dispatch:
    inputs:
      usernames:
        description:
          "Comma-separated GitHub usernames to enroll (e.g. st1,st2,st3). If
          blank, falls back to students.txt."
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run — show what would happen without making changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  enroll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2.2.0
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Enroll students
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          TEAM_SLUG: ${{ vars.COURSE_TEAM_SLUG }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          USERNAMES_INPUT: ${{ inputs.usernames || '' }}
        run: |
          set -euo pipefail

          if [[ -z "$TEAM_SLUG" ]]; then
            echo "::error::COURSE_TEAM_SLUG repo variable is not set."
            exit 1
          fi

          # Build username list from input or students.txt
          if [[ -n "$USERNAMES_INPUT" ]]; then
            mapfile -t USERNAMES < <(echo "$USERNAMES_INPUT" | tr ',' '\n' | tr -d ' \r' | grep -v '^$')
          elif [[ -f students.txt ]]; then
            mapfile -t USERNAMES < <(grep -v '^\s*#' students.txt | grep -v '^\s*$' | tr -d ' \r')
          else
            echo "No usernames provided and students.txt not found — nothing to do."
            exit 0
          fi

          if [[ ${#USERNAMES[@]} -eq 0 ]]; then
            echo "No usernames found — nothing to do."
            exit 0
          fi

          echo "Processing ${#USERNAMES[@]} username(s) for team: $TEAM_SLUG"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::DRY RUN MODE — no changes made"
            printf '  %s\n' "${USERNAMES[@]}"
            exit 0
          fi

          ENROLLED=()
          INVITED=()
          ALREADY_MEMBER=()
          FAILED=()

          for USERNAME in "${USERNAMES[@]}"; do
            # Verify the GitHub user exists
            if ! gh api "users/$USERNAME" --silent 2>/dev/null; then
              echo "  ❌ $USERNAME — not found on GitHub"
              FAILED+=("$USERNAME")
              continue
            fi

            # Check current team membership (404 = not a member)
            MEMBERSHIP_STATE=$(gh api "orgs/$ORG/teams/$TEAM_SLUG/memberships/$USERNAME" \
              --jq '.state' 2>/dev/null || echo "none")
            if [[ "$MEMBERSHIP_STATE" == "active" || "$MEMBERSHIP_STATE" == "pending" ]]; then
              echo "  ⏭️  $USERNAME — already enrolled (state: $MEMBERSHIP_STATE)"
              ALREADY_MEMBER+=("$USERNAME")
              continue
            fi

            # Add to team; result is "active" (already in org) or "pending" (invitation sent)
            RESULT=$(gh api --method PUT "orgs/$ORG/teams/$TEAM_SLUG/memberships/$USERNAME" \
              --jq '.state' 2>/dev/null || echo "error")
            if [[ "$RESULT" == "active" ]]; then
              echo "  ✅ $USERNAME — enrolled"
              ENROLLED+=("$USERNAME")
            elif [[ "$RESULT" == "pending" ]]; then
              echo "  📨 $USERNAME — org invitation sent"
              INVITED+=("$USERNAME")
            else
              echo "  ❌ $USERNAME — failed to enroll"
              FAILED+=("$USERNAME")
            fi
          done

          # Write job summary
          {
            echo "## Enrollment Summary — $TEAM_SLUG"
            echo ""

            if [[ ${#ENROLLED[@]} -gt 0 ]]; then
              echo "### ✅ Enrolled (${#ENROLLED[@]})"
              echo "Added directly — students can open instance requests immediately."
              printf -- '- @%s\n' "${ENROLLED[@]}"
              echo ""
            fi

            if [[ ${#INVITED[@]} -gt 0 ]]; then
              echo "### 📨 Invitation sent (${#INVITED[@]})"
              echo "Students must **accept the GitHub org invitation** before they can open instance requests."
              printf -- '- @%s\n' "${INVITED[@]}"
              echo ""
            fi

            if [[ ${#ALREADY_MEMBER[@]} -gt 0 ]]; then
              echo "### ⏭️ Already enrolled (${#ALREADY_MEMBER[@]}) — skipped"
              printf -- '- @%s\n' "${ALREADY_MEMBER[@]}"
              echo ""
            fi

            if [[ ${#FAILED[@]} -gt 0 ]]; then
              echo "### ❌ Not found on GitHub (${#FAILED[@]}) — skipped"
              echo "Verify these usernames and re-run."
              printf -- '- %s\n' "${FAILED[@]}"
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ ${#FAILED[@]} -gt 0 ]]; then
            echo "::warning::${#FAILED[@]} username(s) could not be enrolled — check the job summary."
          fi
