# =============================================================================
# enroll-students.yml — Enroll students into the course GitHub team
# =============================================================================
#
# Triggered by:
#   - Push to students.txt on main (automatic enrollment on file update)
#   - Manual workflow_dispatch (with usernames input or students.txt fallback)
#
# What it does for each username:
#   1. Verifies the GitHub user exists
#   2. Skips if already an active/pending member of this course team
#   3. Adds to the team via the mc-course-intake.gs enrollment endpoint, which
#      holds the GitHub App credentials centrally (no per-repo secrets needed).
#      If the user is already in the org they are added immediately (active);
#      otherwise a pending org invitation is sent.
#
# Prerequisites:
#   - COURSE_TEAM_SLUG repo variable must be set (e.g. mc-34m-bio-102)
#   - MORPHOCLOUD_COURSE_INTAKE_URL repo variable must be set
#     (the mc-course-intake.gs /exec URL)
#   - ENROLLMENT_WEBHOOK_SECRET repo secret must be set
#     (generate with: openssl rand -hex 32; same value in Script Properties)
#
# NOTE: GitHub org-level secrets cannot be shared with private repos on the
# free GitHub plan. All MC-* repos are private. Therefore, GitHub App
# credentials are held centrally in mc-course-intake.gs (Apps Script) and
# accessed via the enrollment endpoint — NOT via actions/create-github-app-token.
#
# No per-repo secret is required. The Apps Script endpoint validates that
# team_slug starts with "mc-", is APPROVED in the spreadsheet, and exists
# in the org — sufficient authorization without a shared secret.
#
# =============================================================================

name: Enroll Students

on:
  push:
    branches: [main]
    paths: [students.txt]
  workflow_dispatch:
    inputs:
      usernames:
        description:
          "Comma-separated GitHub usernames to enroll (e.g. st1,st2,st3). If
          blank, falls back to students.txt."
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run — show what would happen without making changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  enroll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enroll students via Apps Script
        env:
          ENROLLMENT_URL: ${{ vars.MORPHOCLOUD_COURSE_INTAKE_URL }}
          TEAM_SLUG: ${{ vars.COURSE_TEAM_SLUG }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          USERNAMES_INPUT: ${{ inputs.usernames || '' }}
        run: |
          set -euo pipefail

          if [[ -z "$TEAM_SLUG" ]]; then
            echo "::error::COURSE_TEAM_SLUG repo variable is not set."
            exit 1
          fi
          if [[ -z "$ENROLLMENT_URL" ]]; then
            echo "::error::MORPHOCLOUD_COURSE_INTAKE_URL repo variable is not set."
            exit 1
          fi
          # Build username list from input or students.txt
          if [[ -n "$USERNAMES_INPUT" ]]; then
            mapfile -t USERNAMES < <(echo "$USERNAMES_INPUT" | tr ',' '\n' | tr -d ' \r' | grep -v '^$')
          elif [[ -f students.txt ]]; then
            mapfile -t USERNAMES < <(grep -v '^\s*#' students.txt | grep -v '^\s*$' | tr -d ' \r')
          else
            echo "No usernames provided and students.txt not found — nothing to do."
            exit 0
          fi

          if [[ ${#USERNAMES[@]} -eq 0 ]]; then
            echo "No usernames found — nothing to do."
            exit 0
          fi

          echo "Processing ${#USERNAMES[@]} username(s) for team: $TEAM_SLUG"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::DRY RUN MODE — no changes made"
            printf '  %s\n' "${USERNAMES[@]}"
            exit 0
          fi

          # Build JSON payload and POST to Apps Script enrollment endpoint.
          # -L follows the redirect Apps Script returns before the JSON response.
          USERNAMES_JSON=$(printf '%s\n' "${USERNAMES[@]}" | jq -R . | jq -sc .)
          PAYLOAD=$(jq -n \
            --arg team_slug "$TEAM_SLUG" \
            --argjson usernames "$USERNAMES_JSON" \
            '{team_slug: $team_slug, usernames: $usernames}')

          RESPONSE=$(curl -s -L -X POST \
            "${ENROLLMENT_URL}?action=enroll-course" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Response: $RESPONSE"

          ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')
          if [[ -n "$ERROR" ]]; then
            echo "::error::Enrollment failed: $ERROR"
            exit 1
          fi

          ENROLLED=$(echo "$RESPONSE"       | jq -r '.enrolled[]?'       | sort)
          INVITED=$(echo "$RESPONSE"        | jq -r '.invited[]?'        | sort)
          ALREADY_MEMBER=$(echo "$RESPONSE" | jq -r '.already_member[]?' | sort)
          FAILED=$(echo "$RESPONSE"         | jq -r '.failed[]?'         | sort)

          N_ENROLLED=$(echo "$RESPONSE"       | jq '.enrolled       | length')
          N_INVITED=$(echo "$RESPONSE"        | jq '.invited        | length')
          N_ALREADY=$(echo "$RESPONSE"        | jq '.already_member | length')
          N_FAILED=$(echo "$RESPONSE"         | jq '.failed         | length')

          {
            echo "## Enrollment Summary — $TEAM_SLUG"
            echo ""

            if [[ "$N_ENROLLED" -gt 0 ]]; then
              echo "### ✅ Enrolled ($N_ENROLLED)"
              echo "Added directly — students can open instance requests immediately."
              echo "$ENROLLED" | sed 's/^/- @/'
              echo ""
            fi

            if [[ "$N_INVITED" -gt 0 ]]; then
              echo "### 📨 Invitation sent ($N_INVITED)"
              echo "Students must **accept the GitHub org invitation** before they can open instance requests."
              echo "$INVITED" | sed 's/^/- @/'
              echo ""
            fi

            if [[ "$N_ALREADY" -gt 0 ]]; then
              echo "### ⏭️ Already enrolled ($N_ALREADY) — skipped"
              echo "$ALREADY_MEMBER" | sed 's/^/- @/'
              echo ""
            fi

            if [[ "$N_FAILED" -gt 0 ]]; then
              echo "### ❌ Not found on GitHub ($N_FAILED) — skipped"
              echo "Verify these usernames and re-run."
              echo "$FAILED" | sed 's/^/- /'
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$N_FAILED" -gt 0 ]]; then
            echo "::warning::$N_FAILED username(s) not found on GitHub — check the job summary."
          fi
