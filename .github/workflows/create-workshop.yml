name: Create Workshop Instances

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  create:
    runs-on: ubuntu-latest
    if:
      ${{ !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'request-type:workshop') &&
      contains(github.event.comment.body, '/create') }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: admin-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Resolve admins from morphocloud-admins team
        id: admins
        uses: ./.github/actions/resolve-team-members
        with:
          token: ${{ steps.admin-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: morphocloud-admins
      - name: create command
        id: create_command
        uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        with:
          command: "/create"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ steps.admins.outputs.members }},${{
            github.event.issue.user.login }}"

      - uses: actions/checkout@v7
        if: ${{ steps.create_command.outputs.continue == 'true' }}

      - name: Check workflow management approval
        id: check_approval
        uses: ./.github/actions/check-approval
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}

      - name: command results comment (Workflow management not approved)
        if: ${{ ! fromJSON(steps.check_approval.outputs.is_approved) }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### Command Results ❌

            `/create` command failed because management of **Workshop ${{ github.event.issue.number }}** has not been approved yet.

      - name: Workflow management not approved (failure)
        if: ${{ ! fromJSON(steps.check_approval.outputs.is_approved) }}
        shell: bash
        run: |
          echo "::error ::Workflow $ISSUE_NUMBER management not approved"
          exit 1
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Extract common fields
        id: extract
        if: ${{ steps.create_command.outputs.continue == 'true' }}
        uses: ./.github/actions/extract-issue-fields
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue_number: ${{ github.event.issue.number }}

      - name: Extract workshop fields
        id: extract_workshop
        if: ${{ steps.create_command.outputs.continue == 'true' }}
        uses: ./.github/actions/extract-workshop-fields
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue_number: ${{ github.event.issue.number }}

      - name: Resolve workshop schedule
        id: schedule
        if: ${{ steps.create_command.outputs.continue == 'true' }}
        uses: ./.github/actions/resolve-workshop-schedule
        with:
          start_date: ${{ steps.extract_workshop.outputs.start_date }}
          start_time: ${{ steps.extract_workshop.outputs.start_time }}
          timezone: ${{ steps.extract_workshop.outputs.timezone }}

      - name: Enforce 12-hour create window
        if: ${{ steps.create_command.outputs.continue == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VALID: ${{ steps.schedule.outputs.valid }}
          WINDOW_OPEN_EPOCH: ${{ steps.schedule.outputs.window_open_epoch }}
          WINDOW_OPEN_LABEL: ${{ steps.schedule.outputs.window_open_label }}
          START_LABEL: ${{ steps.schedule.outputs.start_label }}
        run: |
          if [[ "$VALID" != "true" ]]; then
            echo "::warning ::Could not resolve workshop schedule; skipping 12h gate (fail-open)."
            exit 0
          fi
          now=$(date +%s)
          if (( now < WINDOW_OPEN_EPOCH )); then
            gh issue comment "$ISSUE_NUMBER" --body "$(printf '### Too early to create ⛔\n\nThis workshop starts **%s**. Instances can be created no earlier than **%s** (12 hours before start). Please run `/create` again then.' "$START_LABEL" "$WINDOW_OPEN_LABEL")"
            echo "::error ::/create attempted before the 12h window opens (now=$now < open=$WINDOW_OPEN_EPOCH)"
            exit 1
          fi
          echo "Within create window (now=$now >= open=$WINDOW_OPEN_EPOCH)."

      - name: Update workshop labels
        if: ${{ steps.create_command.outputs.continue == 'true' }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "request:approved,workflow:creating-instances"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Look up organizer email
        id: lookup_organizer_email
        if: ${{ steps.create_command.outputs.continue == 'true' }}
        uses: ./.github/actions/lookup-email
        with:
          lookup_url: ${{ vars.MORPHOCLOUD_WORKSHOP_EMAIL_LOOKUP_URL }}
          api_key: ${{ secrets.MORPHOCLOUD_LOOKUP_API_KEY }}
          github_username: ${{ github.event.issue.user.login }}

      - name: Create instance issues
        if: ${{ steps.create_command.outputs.continue == 'true' }}
        run: |
          set -euo pipefail

          NUMBER_OF_INSTANCES=$(echo "$NUMBER_OF_INSTANCES" | tr -d '[:space:]')
          DURATION_DAYS=$(echo "$DURATION_DAYS" | tr -d '[:space:]')

          if ! [[ "$NUMBER_OF_INSTANCES" =~ ^[0-9]+$ ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "❌ \`/create\` failed: **Number of Instances** must be a whole number (got '$NUMBER_OF_INSTANCES'). Please open a new workshop request with a valid value."
            echo "::error ::Invalid number of instances [$NUMBER_OF_INSTANCES]"
            exit 1
          fi

          if ! [[ "$DURATION_DAYS" =~ ^[0-9]+$ ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "❌ \`/create\` failed: **Duration (days)** must be a whole number (got '$DURATION_DAYS'). Please open a new workshop request with a valid value."
            echo "::error ::Invalid duration (days) [$DURATION_DAYS]"
            exit 1
          fi

          # Phase 2: anchor shelve/delete to the workshop WINDOW, not create time.
          # workshop end = start + duration days; shelve 1h after end; delete 24h
          # after end. Per instance (created ~now): timeout = hours from now until
          # shelve_at, expiration = days from now until delete_at. So the initial
          # batch AND any later backfilled instances converge on the same end.
          now=$(date +%s)
          if [[ "$SCHED_VALID" == "true" && -n "$SCHED_START_EPOCH" ]]; then
            end=$(( SCHED_START_EPOCH + DURATION_DAYS * 86400 ))
            shelve_at=$(( end + 3600 ))    # 1h grace after end
            delete_at=$(( end + 86400 ))   # 24h retention after end
            secs_to_shelve=$(( shelve_at - now ))
            if (( secs_to_shelve < 3600 )); then secs_to_shelve=3600; fi
            timeout_hours=$(( (secs_to_shelve + 3599) / 3600 ))   # ceil to whole hours
            expiration_days=$(echo "scale=3; ($delete_at - $now)/86400" | bc)
            if [[ "$(echo "$expiration_days < 0.1" | bc)" == "1" ]]; then expiration_days="0.1"; fi
          else
            # fail-open fallback: anchor to create time (original behavior)
            timeout_hours=$(( DURATION_DAYS * 24 ))
            expiration_days=$(( DURATION_DAYS + 1 ))
          fi
          timeout_label="timeout:${timeout_hours}hrs"
          expiration_label="expiration:${expiration_days}d"

          declare -a requested_instance_issues=()

          # Trickle: dispatch only the first BATCH builds now; the backfill cron
          # brings up the rest a few at a time, keeping the shared acquire lane
          # free for individual-user commands (workshops have a 12h window, so
          # they can afford to fill gradually).
          BATCH="${WORKSHOP_BUILD_BATCH:-3}"
          dispatched=0

          gh label create "$timeout_label" --color "5319E7" --description "Instance shelves after ${timeout_hours}h uptime (workshop end + 1h)" --force >/dev/null 2>&1 || true
          gh label create "$expiration_label" --color "892368" --description "Instance deleted ${expiration_days}d after creation (workshop end + 24h)" --force >/dev/null 2>&1 || true

          for idx in $(seq 1 "$NUMBER_OF_INSTANCES"); do
            issue_title="Instance: Workshop ${ISSUE_NUMBER} - Participant ${idx} (${REQUEST_TITLE})"

            issue_body=$(python - <<'PY'
          import os, textwrap

          body = textwrap.dedent(f"""### Cloud Computing Instance Flavor

          {os.environ['INSTANCE_FLAVOR']}

          ### Description

          Workshop instance created for Workshop {os.environ['ISSUE_NUMBER']} ({os.environ['REQUEST_TITLE']}).

          {os.environ['REQUEST_DESCRIPTION']}

          ### ORCID

          0000-0000-0000-0000

          ### Email

          {os.environ['WORKSHOP_EMAIL']}

          ### Confirm Email

          {os.environ['WORKSHOP_CONFIRM_EMAIL']}
          """)

          print(body)
          PY
          )

            instance_issue_json=$(
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                "/repos/$GH_REPO/issues" \
                -f "title=$issue_title" \
                -f "body=$issue_body" \
                -f "labels[]=request-type:instance" \
                -f "labels[]=instance-request" \
                -f "labels[]=request-creator:workshop" \
                -f "labels[]=request:approved" \
                -f "labels[]=flavor:$INSTANCE_FLAVOR" \
                -f "labels[]=$timeout_label" \
                -f "labels[]=$expiration_label" \
                -f "assignees[]=$ORGANIZER_USERNAME"
            )

            instance_issue_number=$(echo "$instance_issue_json" | jq -r '.number')
            instance_issue_id=$(echo "$instance_issue_json" | jq -r '.id')

            # Rename sub-issue to canonical title: MC-Workshop-<parent>-<sub>
            gh issue edit "$instance_issue_number" --title "MC-Workshop-${ISSUE_NUMBER}-${instance_issue_number}"

            requested_instance_issues+=("$instance_issue_number")

            # Get current total before adding
            before_total="$(gh api "/repos/$GH_REPO/issues/$ISSUE_NUMBER" --jq '.sub_issues_summary.total // 0')"

            # Add the sub-issue and capture the full updated issue JSON
            issue_json="$(
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/$GH_REPO/issues/$ISSUE_NUMBER/sub_issues" \
                -F sub_issue_id=$instance_issue_id
            )"

            # Read the new total from the response
            after_total="$(jq -r '.sub_issues_summary.total // 0' <<<"$issue_json")"

            echo "Sub-issues total: before=$before_total after=$after_total"

            # Check it increased by exactly one
            #if [[ "$after_total" -ne $((before_total + 1)) ]]; then
            #  echo "::error ::Expected sub_issues_summary.total to increase by 1 (before=${before_total}, after=${after_total})"
            #  exit 1
            #fi

            # Trickle gate: only the first BATCH get a build now. The rest are
            # created as sub-issues (records) and the backfill cron brings them
            # up a few at a time, so a burst of workshop builds never floods the
            # acquire lane that individual-user /create /shelve /unshelve share.
            if (( dispatched < BATCH )); then
              set +e
              gh workflow run create-instance-from-workflow.yml \
                -f issue_number=$instance_issue_number \
                -f skip_preamble=true
              error_code=$?
              set -e
              if [[ $error_code -ne 0 ]]; then
                echo "::warning ::Failed to run workflow for creating instance $instance_issue_number"
                gh issue comment "$instance_issue_number" \
                  --body "❌ Failed to create instance $instance_issue_number. See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                continue
              fi
              dispatched=$((dispatched + 1))
            else
              echo "Trickle: deferring build for #$instance_issue_number to backfill (batch=$BATCH already dispatched)"
            fi

          done

          if [[ ${#requested_instance_issues[@]} -gt 0 ]]; then
            comment="Requested ${#requested_instance_issues[@]} workshop instance(s). Bringing them up **a few at a time** so regular users' commands stay responsive — the rest are topped off automatically as capacity frees (re-checked every ~10 min until the workshop starts/ends). Subject to live JetStream2 capacity."
            gh issue comment "$ISSUE_NUMBER" --body "$comment"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          # Trickle batch size (max workshop builds dispatched up front); backfill brings up the rest
          WORKSHOP_BUILD_BATCH: ${{ vars.MORPHOCLOUD_WORKSHOP_BUILD_BATCH }}
          # Common fields
          REQUEST_TITLE: ${{ steps.extract.outputs.title }}
          REQUEST_DESCRIPTION: ${{ steps.extract.outputs.description }}
          INSTANCE_FLAVOR: ${{ steps.extract.outputs.instance_flavor }}
          WORKSHOP_EMAIL: ${{ steps.lookup_organizer_email.outputs.email }}
          WORKSHOP_CONFIRM_EMAIL:
            ${{ steps.lookup_organizer_email.outputs.email }}
          # Workshop specific fields
          NUMBER_OF_INSTANCES:
            ${{ steps.extract_workshop.outputs.number_of_instances }}
          DURATION_DAYS: ${{ steps.extract_workshop.outputs.duration_days }}
          ORGANIZER_USERNAME: ${{ github.event.issue.user.login }}
          # Workshop schedule (for window-anchored lifecycle)
          SCHED_VALID: ${{ steps.schedule.outputs.valid }}
          SCHED_START_EPOCH: ${{ steps.schedule.outputs.start_epoch }}

      - name: Release creation lock
        if: ${{ always() && steps.create_command.outputs.continue == 'true' }}
        run: |
          # Hand off to the backfill watcher: clear the "creating-instances" lock
          # so workshop-backfill.yml can top off any sub-issues that couldn't be
          # provisioned now (capacity). Always runs after the create loop.
          gh issue edit "$ISSUE_NUMBER" --remove-label "workflow:creating-instances" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
