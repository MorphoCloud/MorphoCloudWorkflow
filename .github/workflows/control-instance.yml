name: Control Instance

on:
  issue_comment:
    types: [created]

# Permissions needed for reacting to IssueOps commands on issues
permissions:
  issues: write
  checks: read
  contents: read

# Two-job split (security review M3): authorization runs first on a
# GitHub-hosted runner; nothing executes on the self-hosted runner — no
# checkout, no privileged steps — until the command is authorized. This keeps
# unauthorized commenters from occupying the production runners.
jobs:
  authorize:
    runs-on: ubuntu-latest
    if:
      ${{ !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'instance-request') && (
      contains(github.event.comment.body, '/unshelve') ||
      contains(github.event.comment.body, '/shelve') ||
      contains(github.event.comment.body, '/delete_instance') ) }}
    outputs:
      continue: ${{ steps.command.outputs.continue }}
      command_name: ${{ steps.command.outputs.command_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Resolve admins from morphocloud-admins team
        id: admins
        uses: ./.github/actions/resolve-team-members
        with:
          token: ${{ steps.app-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: morphocloud-admins

      - name: unshelve command
        id: unshelve_command
        uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        with:
          command: "/unshelve"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ steps.admins.outputs.members }},${{
            vars.COURSE_INSTRUCTOR_GITHUB }},${{ github.event.issue.user.login
            }},${{ join(github.event.issue.assignees.*.login, ',') }}"

      - name: shelve command
        id: shelve_command
        uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        with:
          command: "/shelve"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ steps.admins.outputs.members }},${{
            vars.COURSE_INSTRUCTOR_GITHUB }},${{ github.event.issue.user.login
            }},${{ join(github.event.issue.assignees.*.login, ',') }}"

      - name: delete command
        id: delete_command
        uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        with:
          command: "/delete_instance"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ steps.admins.outputs.members }},${{
            vars.COURSE_INSTRUCTOR_GITHUB }},${{ github.event.issue.user.login
            }},${{ join(github.event.issue.assignees.*.login, ',') }}"

      # No if-guard: always runs so the job output is an explicit "false"
      # (a skipped step would yield "" — confusing, and an authorization
      # bypass if the downstream gate were ever relaxed to != 'false').
      - name: Set command metadata
        id: command
        run: |
          if [[ "$UNSHELVE_COMMAND_CONTINUE" == "true" ]]; then
            continue="$UNSHELVE_COMMAND_CONTINUE"
            command_name="unshelve"
          elif [[ "$SHELVE_COMMAND_CONTINUE" == "true" ]]; then
            continue="$SHELVE_COMMAND_CONTINUE"
            command_name="shelve"
          elif [[ "$DELETE_COMMAND_CONTINUE" == "true" ]]; then
            continue="$DELETE_COMMAND_CONTINUE"
            command_name="delete"
          else
            continue="false"
            command_name=""
          fi
          echo "continue=$continue" >> $GITHUB_OUTPUT
          echo "command_name=$command_name" >> $GITHUB_OUTPUT
        env:
          UNSHELVE_COMMAND_CONTINUE:
            ${{ steps.unshelve_command.outputs.continue }}
          SHELVE_COMMAND_CONTINUE: ${{ steps.shelve_command.outputs.continue }}
          DELETE_COMMAND_CONTINUE: ${{ steps.delete_command.outputs.continue }}

  control:
    runs-on: self-hosted
    needs: authorize
    if: ${{ needs.authorize.outputs.continue == 'true' }}
    # Serialize all state-mutating work per issue. The group is shared with
    # create-instance, send-email, delete-instance-and-volume and
    # control-instance-from-workflow: without it, rapid duplicate commands (or
    # a user command racing the auto-shelve cron) mutate the same OpenStack
    # resources concurrently — a redundant /unshelve once released the floating
    # IP of a running instance and left it unreachable (#166 postmortem).
    # Job-level (not workflow-level) so the authorize job still runs
    # immediately and the command reaction is not delayed.
    concurrency:
      group: morphocloud-instance-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Check JS2 status
        id: js2_status
        uses: ./.github/actions/check-js2-status
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}

      - name: Control instance
        id: control_instance
        uses: ./.github/actions/control-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ github.event.issue.number }}
          command_name: ${{ needs.authorize.outputs.command_name }}
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          token: ${{ secrets.GITHUB_TOKEN }}
          email_lookup_url: ${{ vars.MORPHOCLOUD_EMAIL_LOOKUP_URL }}
          email_lookup_api_key: ${{ secrets.MORPHOCLOUD_LOOKUP_API_KEY }}
          email_lookup_secret: ${{ secrets.ENROLLMENT_WEBHOOK_SECRET }}
          issue_creator: ${{ github.event.issue.user.login }}
          course_team_slug: ${{ vars.COURSE_TEAM_SLUG }}
          mail_server_username: ${{secrets.MAIL_USERNAME}}
          mail_server_password: ${{secrets.MAIL_PASSWORD}}

      # The 👍 added by github/command on the triggering comment means
      # "accepted", but users read it as "succeeded". On failure, contradict
      # it visibly on the same comment so the ack cannot be mistaken for a
      # result (Instances#168: two silent unshelve failures read as success).
      - name: React to command comment (failure)
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh api "repos/${{ github.repository }}/issues/comments/${{
          github.event.comment.id }}/reactions" -f content=confused
