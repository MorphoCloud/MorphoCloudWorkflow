name: Send Renewal Email

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number"
        required: true
      days_until_expiration:
        description: "Number of days before deletion"
        required: true

permissions:
  issues: write
  checks: read
  contents: read

jobs:
  send-renewal-email:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Skip if course instance
        id: skip_check
        shell: bash
        run: |
          IS_COURSE=$(gh issue view "$ISSUE_NUMBER" --json labels \
            --jq '[.labels[].name] | index("request-type:course-instance") != null')
          if [[ "$IS_COURSE" == "true" ]]; then
            echo "Course instances are not renewable. Skipping renewal email."
            echo "is_course=true" >> $GITHUB_OUTPUT
          else
            echo "is_course=false" >> $GITHUB_OUTPUT
          fi
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Define instance name
        id: define
        if: ${{ steps.skip_check.outputs.is_course != 'true' }}
        uses: ./.github/actions/define-instance-name
        with:
          prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          issue_number: ${{ inputs.issue_number }}

      - name: Check instance exists
        id: check_instance
        if: ${{ steps.skip_check.outputs.is_course != 'true' }}
        uses: ./.github/actions/check-instance-exists
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          instance_name: ${{ steps.define.outputs.instance_name }}

      - name: command results comment (Instance does not exist)
        if:
          ${{ steps.skip_check.outputs.is_course != 'true' &&
          steps.check_instance.outputs.exists == 'false' }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ inputs.issue_number }}
          body: |
            ❌ **Renewal email not sent**: Instance **${{ steps.define.outputs.instance_name }}** does not exist.

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Define volume name
        id: define_volume_name
        if: ${{ steps.skip_check.outputs.is_course != 'true' }}
        uses: ./.github/actions/define-volume-name
        with:
          issue_number: ${{ inputs.issue_number }}
          suffix: ${{ vars.VOLUME_NAME_SUFFIX }}

      - name: Get issue metadata
        id: issue_meta
        if: ${{ steps.skip_check.outputs.is_course != 'true' }}
        shell: bash
        run: |
          ISSUE_JSON=$(gh issue view "$ISSUE_NUMBER" --json labels,author)
          AUTHOR=$(echo "$ISSUE_JSON" | jq -r '.author.login')
          IS_WORKSHOP=$(echo "$ISSUE_JSON" | jq -e '[.labels[].name] | index("request-type:workshop")' > /dev/null 2>&1 && echo "true" || echo "false")
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "is_workshop=$IS_WORKSHOP" >> $GITHUB_OUTPUT
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      # --- Individual path: look up email from Apps Script ---
      - name: Look up email (individual)
        id: lookup_email
        if:
          ${{ steps.skip_check.outputs.is_course != 'true' &&
          steps.issue_meta.outputs.is_workshop != 'true' }}
        uses: ./.github/actions/lookup-email
        with:
          lookup_url: ${{ vars.MORPHOCLOUD_EMAIL_LOOKUP_URL }}
          github_username: ${{ steps.issue_meta.outputs.author }}

      # --- Workshop path: look up email from Apps Script ---
      - name: Look up email (workshop)
        id: lookup_email_workshop
        if:
          ${{ steps.skip_check.outputs.is_course != 'true' &&
          steps.issue_meta.outputs.is_workshop == 'true' }}
        uses: ./.github/actions/lookup-email
        with:
          lookup_url: ${{ vars.MORPHOCLOUD_WORKSHOP_EMAIL_LOOKUP_URL }}
          github_username: ${{ steps.issue_meta.outputs.author }}

      - name: Resolve email
        id: resolve_email
        if: ${{ steps.skip_check.outputs.is_course != 'true' }}
        shell: bash
        run: |
          if [[ "$IS_WORKSHOP" == "true" ]]; then
            echo "email=$WORKSHOP_EMAIL" >> $GITHUB_OUTPUT
          else
            echo "email=$INDIVIDUAL_EMAIL" >> $GITHUB_OUTPUT
          fi
        env:
          IS_WORKSHOP: ${{ steps.issue_meta.outputs.is_workshop }}
          WORKSHOP_EMAIL: ${{ steps.lookup_email_workshop.outputs.email }}
          INDIVIDUAL_EMAIL: ${{ steps.lookup_email.outputs.email }}

      - name: Check renewal availability
        id: check_renewal
        if: ${{ steps.skip_check.outputs.is_course != 'true' }}
        shell: bash
        run: |
          # Retrieve issue labels
          issue_json=$(gh issue view "$ISSUE_NUMBER" --json labels)
          labels=$(echo "$issue_json" | jq -r '.labels[].name')

          # Extract expiration labels (e.g., expiration:60d, expiration:120d)
          lifespan_list=$(echo "$labels" | grep -oP '(?<=expiration:)\d+(\.\d+)?' | sort -n)

          # Count available expiration labels
          expiration_count=$(echo "$lifespan_list" | wc -l)

          # Retrieve the highest existing renewal count (e.g., renewed:1, renewed:2)
          renewed_count=$(echo "$labels" | grep -oP '(?<=renewed:)\d+' | sort -nr | head -n1 || true)
          renewed_count=${renewed_count:-0}  # Default to 0 if not found

          echo "Expiration count: $expiration_count"
          echo "Renewed count: $renewed_count"

          # Check if renewal is still available
          # Renewal is available if renewed_count + 1 < expiration_count
          if [[ $((renewed_count + 1)) -lt $expiration_count ]]; then
            renewal_available="true"
          else
            renewal_available="false"
          fi

          echo "Renewal available: $renewal_available"
          echo "renewal_available=$renewal_available" >> $GITHUB_OUTPUT
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Send renewal email (renewal available)
        id: send_email_renewable
        if:
          ${{ steps.skip_check.outputs.is_course != 'true' &&
          steps.check_renewal.outputs.renewal_available == 'true' }}
        uses: dawidd6/action-send-mail@62a2d05b79935ad4fb90ce9079928099579c14ac # v9
        with:
          server_address: webhost.dynadot.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: MorphoCloudPortal <no-reply@morphocloud.org>
          to: ${{ steps.resolve_email.outputs.email }}
          subject:
            "[${{ github.event.repository.name }}] Instance ${{
            steps.define.outputs.instance_name }} and Volume ${{
            steps.define_volume_name.outputs.volume_name }} Scheduled for
            Deletion"
          convert_markdown: true
          html_body: |
            ## 🚨 Urgent: Your MorphoCloud Instance & Volume Will Be Deleted in ${{ inputs.days_until_expiration }} Days

            Your MorphoCloud instance **${{ steps.define.outputs.instance_name }}** and its associated volume **${{ steps.define_volume_name.outputs.volume_name }}** are scheduled for **permanent deletion** in **${{ inputs.days_until_expiration }}** days.

            **This action is irreversible.** If you need to retain your instance and volume, you **must renew before the deadline** by commenting `/renew` on [Issue #${{ inputs.issue_number }}](https://github.com/${{ github.repository }}/issues/${{ inputs.issue_number }}).

            ## 🔄 How to Renew
            1️⃣ Open [Issue #${{ inputs.issue_number }}](https://github.com/${{ github.repository }}/issues/${{ inputs.issue_number }})
            2️⃣ Add a new comment: **`/renew`**
            3️⃣ If additional lifespan is available, your instance will be extended.

            **🔴 If no renewal is requested, your instance and volume will be permanently deleted in ${{ inputs.days_until_expiration }} days.**

            ## ❓ Need Help?

            Contact us at [portal@morphocloud.org](mailto:portal@morphocloud.org) if you have any questions.

            **⏳ Time is running out! If you wish to keep your instance and volume, comment `/renew` now!**

      - name: Send final expiration email (no renewal available)
        id: send_email_final
        if:
          ${{ steps.skip_check.outputs.is_course != 'true' &&
          steps.check_renewal.outputs.renewal_available == 'false' }}
        uses: dawidd6/action-send-mail@62a2d05b79935ad4fb90ce9079928099579c14ac # v9
        with:
          server_address: webhost.dynadot.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: MorphoCloudPortal <no-reply@morphocloud.org>
          to: ${{ steps.resolve_email.outputs.email }}
          subject:
            "[${{ github.event.repository.name }}] FINAL NOTICE: Instance ${{
            steps.define.outputs.instance_name }} and Volume ${{
            steps.define_volume_name.outputs.volume_name }} Will Be Deleted"
          convert_markdown: true
          html_body: |
            ## 🚨 FINAL NOTICE: Your MorphoCloud Instance & Volume Will Be Permanently Deleted in ${{ inputs.days_until_expiration }} Days

            Your MorphoCloud instance **${{ steps.define.outputs.instance_name }}** and its associated volume **${{ steps.define_volume_name.outputs.volume_name }}** are scheduled for **permanent deletion** in **${{ inputs.days_until_expiration }}** days.

            **⚠️ IMPORTANT: This instance has already been renewed and NO FURTHER RENEWALS ARE POSSIBLE.**

            **This action is irreversible.** Please ensure you:
            1. **Back up all important data immediately** from your instance and volume
            2. Download any files or results you need to keep

            **🔴 Your instance and volume will be permanently deleted in ${{ inputs.days_until_expiration }} days. There is no way to extend this deadline.**

            ## 🆕 Need a New Instance?

            After your current instance is deleted, you can request a new instance by opening a new issue in this repository.

            ## ❓ Need Help?

            Contact us at [portal@morphocloud.org](mailto:portal@morphocloud.org) if you have any questions.

            **⏳ Time is running out! Back up your data now!**

      - name: command results comment (failed)
        if:
          ${{ steps.skip_check.outputs.is_course != 'true' &&
          (steps.send_email_renewable.outcome == 'failure' ||
          steps.send_email_final.outcome == 'failure') && failure() }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ inputs.issue_number }}
          body: |
            ❌ Failed to send renewal email for **${{ steps.define.outputs.instance_name }}**.

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: command results comment (success)
        if:
          ${{ steps.skip_check.outputs.is_course != 'true' &&
          (steps.send_email_renewable.outcome == 'success' ||
          steps.send_email_final.outcome == 'success') && success() }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ inputs.issue_number }}
          body: |
            ✅ Successfully sent ${{ steps.check_renewal.outputs.renewal_available == 'true' && 'renewal' || 'final expiration' }} email for **${{ steps.define.outputs.instance_name }}**.
