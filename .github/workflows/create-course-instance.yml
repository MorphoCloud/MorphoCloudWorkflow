name: Create Course Instance

on:
  issue_comment:
    types: [created]

jobs:
  create:
    runs-on: self-hosted
    if:
      ${{ !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'request-type:course-instance')
      && ( contains(github.event.comment.body, '/create') ) }}
    steps:
      - name: create command
        id: create_command
        uses: github/command@v2.0.2
        with:
          command: "/create"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ vars.MORPHOCLOUD_GITHUB_ADMINS }},${{
            vars.COURSE_INSTRUCTOR_GITHUB }},${{ github.event.issue.user.login
            }},${{ join(github.event.issue.assignees.*.login, ',') }}"

      - uses: actions/checkout@v6

      - name: Check course instance quota
        id: check_quota
        shell: bash
        run: |
          MAX_COURSE_PER_USER="${MAX_COURSE_PER_USER:-1}"
          MAX_TOTAL="${MAX_TOTAL:-90}"
          # Admin bypass
          if echo ",$ADMINS," | grep -q ",$ISSUE_CREATOR,"; then
            echo "Admin $ISSUE_CREATOR — skipping quota check."
            exit 0
          fi

          source ~/venv/bin/activate

          # Fetch all OpenStack instances in one call
          SERVERS_JSON=$(openstack server list -f json)
          TOTAL_COUNT=$(echo "$SERVERS_JSON" | jq 'length')
          OS_NAMES=$(echo "$SERVERS_JSON" | jq -r '.[].Name')

          echo "Total instances in OpenStack: $TOTAL_COUNT (system limit: $MAX_TOTAL)"

          # Global capacity check
          if [[ "$TOTAL_COUNT" -ge "$MAX_TOTAL" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          The system has reached its capacity limit of **${MAX_TOTAL}** instances. No new instances can be provisioned at this time.

          Please try again later or contact @${COURSE_INSTRUCTOR} for assistance.

          > @${COURSE_INSTRUCTOR} — ⚠️ System capacity limit reached ($TOTAL_COUNT/$MAX_TOTAL). @${ISSUE_CREATOR} is waiting."
            gh issue edit "$ISSUE_NUMBER" --add-label "error:system-capacity"
            echo "::error ::System capacity: $TOTAL_COUNT/$MAX_TOTAL"
            exit 1
          fi

          # Per-user check: count user's course issue numbers (open AND closed) that have a live OpenStack
          # instance or volume — catches manually-closed issues with orphaned resources.
          INSTANCE_PREFIX="${INSTANCE_NAME_PREFIX:+${INSTANCE_NAME_PREFIX}_}"
          OS_VOLUME_NAMES=$(openstack volume list -f json | jq -r '.[].Name')
          COURSE_NUMS=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:course-instance" \
            --state all \
            --limit 200 \
            --json number \
            --jq '.[].number' | grep -v "^${ISSUE_NUMBER}$" || true)

          COURSE_COUNT=0
          OCCUPIED_COURSE_ISSUES=""
          while IFS= read -r NUM; do
            [[ -z "$NUM" ]] && continue
            INSTANCE_NAME="${INSTANCE_PREFIX}instance-${NUM}"
            VOLUME_NAME="My-Data-${NUM}"
            if echo "$OS_NAMES" | grep -qx "$INSTANCE_NAME" || \
               echo "$OS_VOLUME_NAMES" | grep -qE "^${VOLUME_NAME}(-.*)?$"; then
              ((COURSE_COUNT++))
              OCCUPIED_COURSE_ISSUES="${OCCUPIED_COURSE_ISSUES} #${NUM}"
            fi
          done <<< "$COURSE_NUMS"
          OCCUPIED_COURSE_ISSUES=$(echo "$OCCUPIED_COURSE_ISSUES" | xargs | tr ' ' ', ')

          echo "User $ISSUE_CREATOR has $COURSE_COUNT active course OpenStack instance(s) (limit: $MAX_COURSE_PER_USER)"

          if [[ "$COURSE_COUNT" -ge "$MAX_COURSE_PER_USER" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          @${ISSUE_CREATOR} already has **${COURSE_COUNT}** active course instance(s), which is at the per-user limit of **${MAX_COURSE_PER_USER}**.

          Existing course instance(s) found in OpenStack: ${OCCUPIED_COURSE_ISSUES}

          Go to that issue and type \`/delete_all\` to free your quota, or contact your instructor.

          > @${COURSE_INSTRUCTOR} — FYI, @${ISSUE_CREATOR} has reached the per-user course instance limit ($COURSE_COUNT/$MAX_COURSE_PER_USER)."
            echo "::error ::User $ISSUE_CREATOR has $COURSE_COUNT/$MAX_COURSE_PER_USER course instances"
            exit 1
          fi

          # Global cap: also count individual instances (open AND closed) — no user may exceed MAX_PER_USER total.
          INDIV_NUMS=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:instance" \
            --state all \
            --limit 200 \
            --json number \
            --jq '.[].number' | grep -v "^${ISSUE_NUMBER}$" || true)
          ALL_NUMS=$(printf "%s\n%s" "$COURSE_NUMS" "$INDIV_NUMS" | grep -v '^$' || true)

          USER_COUNT=0
          OCCUPIED_ALL_ISSUES=""
          while IFS= read -r NUM; do
            [[ -z "$NUM" ]] && continue
            INSTANCE_NAME="${INSTANCE_PREFIX}instance-${NUM}"
            VOLUME_NAME="My-Data-${NUM}"
            if echo "$OS_NAMES" | grep -qx "$INSTANCE_NAME" || \
               echo "$OS_VOLUME_NAMES" | grep -qE "^${VOLUME_NAME}(-.*)?$"; then
              (( ++USER_COUNT ))
              OCCUPIED_ALL_ISSUES="${OCCUPIED_ALL_ISSUES} #${NUM}"
            fi
          done <<< "$ALL_NUMS"
          OCCUPIED_ALL_ISSUES=$(echo "$OCCUPIED_ALL_ISSUES" | xargs | tr ' ' ', ')

          echo "User $ISSUE_CREATOR has $USER_COUNT active OpenStack instance(s) across all types (global limit: $MAX_PER_USER)"

          if [[ "$USER_COUNT" -ge "$MAX_PER_USER" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          @${ISSUE_CREATOR} has **${USER_COUNT}** active instance(s) across all types, which is at the global per-user limit of **${MAX_PER_USER}**.

          Existing instance(s) found in OpenStack: ${OCCUPIED_ALL_ISSUES}

          Go to one of those issues and type \`/delete_all\` to free your quota before creating a new one.

          > @${COURSE_INSTRUCTOR} — FYI, @${ISSUE_CREATOR} has reached the global per-user instance limit ($USER_COUNT/$MAX_PER_USER)."
            echo "::error ::User $ISSUE_CREATOR has $USER_COUNT/$MAX_PER_USER instances across all types"
            exit 1
          fi
        env:
          OS_CLOUD: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          INSTANCE_NAME_PREFIX: ${{ vars.INSTANCE_NAME_PREFIX }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ADMINS: ${{ vars.MORPHOCLOUD_GITHUB_ADMINS }}
          COURSE_INSTRUCTOR: ${{ vars.COURSE_INSTRUCTOR_GITHUB }}
          MAX_COURSE_PER_USER:
            ${{ vars.MORPHOCLOUD_MAX_COURSE_INSTANCES_PER_USER }}
          MAX_PER_USER: ${{ vars.MORPHOCLOUD_MAX_INSTANCES_PER_USER }}
          MAX_TOTAL: ${{ vars.MORPHOCLOUD_MAX_TOTAL_INSTANCES }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Check JS2 status
        id: js2_status
        uses: ./.github/actions/check-js2-status
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}

      - name: Create instance
        id: provision
        uses: ./.github/actions/create-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ github.event.issue.number }}
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          volume_name_suffix: ${{ vars.VOLUME_NAME_SUFFIX }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send course email
        id: send_email
        if: ${{ steps.provision.outputs.setup_status == 'complete' }}
        uses: ./.github/actions/course-send-email
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          token: ${{ secrets.GITHUB_TOKEN }}
          email_lookup_url: ${{ vars.MORPHOCLOUD_EMAIL_LOOKUP_URL }}
          issue_creator: ${{ github.event.issue.user.login }}
          mail_server_username: ${{ secrets.MAIL_USERNAME }}
          mail_server_password: ${{ secrets.MAIL_PASSWORD }}
          instance_name: ${{ steps.provision.outputs.instance_name }}
          instance_issue_number: ${{ github.event.issue.number }}

      - name: comment (failed to send email)
        if: ${{ steps.send_email.outcome == 'failure' && failure() }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### Instance Creation Results ❌

            Failed to send connection email for instance **${{ steps.provision.outputs.instance_name }}**. ${{ steps.send_email.outputs.error_message }}

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: comment (progress)
        if: ${{ steps.send_email.outcome == 'success' }}
        uses: ./.github/actions/comment-progress
        with:
          comment-id: ${{ steps.provision.outputs.progress_comment_id }}
          create_ip: ✅
          create_volume: ✅
          create_instance: ✅
          associate_ip: ✅
          setup_instance: ✅
          attach_volume: ✅
          send_email: ✅
