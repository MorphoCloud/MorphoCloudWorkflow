name: Create Course Instance

on:
  issue_comment:
    types: [created]

jobs:
  create:
    runs-on: self-hosted
    if:
      ${{ !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'request-type:course-instance') && (
      contains(github.event.comment.body, '/create') ) }}
    steps:
      - name: create command
        id: create_command
        uses: github/command@v2.0.2
        with:
          command: "/create"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ vars.MORPHOCLOUD_GITHUB_ADMINS }},${{
            github.event.issue.user.login }},${{
            join(github.event.issue.assignees.*.login, ',') }}"

      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v2.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Extract course team slug
        id: course_meta
        shell: bash
        run: |
          body=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          team_slug=$(printf '%s\n' "$body" | \
            awk '/^### Course Team Slug/{found=1; next} found && /[^[:space:]]/{print; found=0}' | \
            xargs)
          if [[ -z "$team_slug" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          Failed to extract course team slug from the issue body. Please ensure the **Course Team Slug** field is filled in."
            echo "::error ::Could not extract course team slug from issue body"
            exit 1
          fi
          echo "team_slug=$team_slug" >> $GITHUB_OUTPUT
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Check authorization (course team membership)
        id: check_auth
        shell: bash
        run: |
          ENCODED_CREATOR=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$ISSUE_CREATOR'))")
          HTTP_CODE=$(curl -s -o /tmp/membership_response.json -w "%{http_code}" \
            -H "Authorization: Bearer $APP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/$ORG/teams/$TEAM_SLUG/memberships/$ENCODED_CREATOR") || true

          authorized="false"
          if [[ "$HTTP_CODE" == "200" ]]; then
            STATE=$(jq -r '.state' /tmp/membership_response.json)
            if [[ "$STATE" == "active" ]]; then
              authorized="true"
            fi
          fi
          rm -f /tmp/membership_response.json

          if [[ "$authorized" != "true" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          \`/create\` command failed because @${ISSUE_CREATOR} is not an active member of the **${TEAM_SLUG}** course team."
            echo "::error ::User $ISSUE_CREATOR is not a member of course team $TEAM_SLUG"
            exit 1
          fi
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          TEAM_SLUG: ${{ steps.course_meta.outputs.team_slug }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create instance
        id: provision
        uses: ./.github/actions/create-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ github.event.issue.number }}
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          volume_name_suffix: ${{ vars.VOLUME_NAME_SUFFIX }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send course email
        id: send_email
        if: ${{ steps.provision.outputs.setup_status == 'complete' }}
        uses: ./.github/actions/course-send-email
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_creator: ${{ github.event.issue.user.login }}
          mail_server_username: ${{ secrets.MAIL_USERNAME }}
          mail_server_password: ${{ secrets.MAIL_PASSWORD }}
          instance_name: ${{ steps.provision.outputs.instance_name }}
          instance_issue_number: ${{ github.event.issue.number }}

      - name: comment (failed to send email)
        if: ${{ steps.send_email.outcome == 'failure' && failure() }}
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### Instance Creation Results ❌

            Failed to send connection email for instance **${{ steps.provision.outputs.instance_name }}**. ${{ steps.send_email.outputs.error_message }}

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: comment (progress)
        if: ${{ steps.send_email.outcome == 'success' }}
        uses: ./.github/actions/comment-progress
        with:
          comment-id: ${{ steps.provision.outputs.progress_comment_id }}
          create_ip: ✅
          create_volume: ✅
          create_instance: ✅
          associate_ip: ✅
          setup_instance: ✅
          attach_volume: ✅
          send_email: ✅
