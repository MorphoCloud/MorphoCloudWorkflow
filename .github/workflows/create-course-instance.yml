name: Create Course Instance

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  checks: read
  contents: read

# Two-job split (security review M3/M7): authorization runs first on a
# GitHub-hosted runner; the self-hosted runner is only occupied — and nothing
# is checked out or provisioned — once /create is authorized. The job-level
# gate also closes the fall-through where a comment merely mentioning
# "/create" mid-sentence (strict prefix match fails -> continue=false)
# proceeded to provisioning.
jobs:
  authorize:
    runs-on: ubuntu-latest
    if:
      ${{ !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'request-type:course-instance')
      && ( contains(github.event.comment.body, '/create') ) }}
    outputs:
      continue: ${{ steps.create_command.outputs.continue }}
      admins: ${{ steps.admins.outputs.members }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: admin-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Resolve admins from morphocloud-admins team
        id: admins
        uses: ./.github/actions/resolve-team-members
        with:
          token: ${{ steps.admin-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: morphocloud-admins

      - name: create command
        id: create_command
        uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        with:
          command: "/create"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ steps.admins.outputs.members }},${{
            vars.COURSE_INSTRUCTOR_GITHUB }},${{ github.event.issue.user.login
            }},${{ join(github.event.issue.assignees.*.login, ',') }}"

  create:
    runs-on: ${{ vars.MORPHOCLOUD_ACQUIRE_RUNNER || 'self-hosted' }}
    needs: authorize
    if: ${{ needs.authorize.outputs.continue == 'true' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Check authorization
        id: check_auth
        shell: bash
        run: |
          # An admin running the command is always authorized.
          if echo ",$ADMINS," | grep -q ",$COMMENT_AUTHOR,"; then
            echo "Admin $COMMENT_AUTHOR — authorized."
            exit 0
          fi

          # The instructor self-tests /create before the roster/team is
          # populated, so they are authorized on their own issue by identity.
          if [[ -n "$COURSE_INSTRUCTOR" && "$ISSUE_CREATOR" == "$COURSE_INSTRUCTOR" ]]; then
            echo "Issue creator is the course instructor — authorized."
            exit 0
          fi

          if [[ -z "$COURSE_TEAM_SLUG" ]]; then
            echo "::error ::COURSE_TEAM_SLUG is not configured for this repo"
            exit 1
          fi

          ENCODED_SUBJECT=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$ISSUE_CREATOR")
          HTTP_CODE=$(curl -s --retry 3 --retry-delay 5 --retry-all-errors -o /tmp/membership_response.json -w "%{http_code}" \
            -H "Authorization: Bearer $APP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/$ORG/teams/$COURSE_TEAM_SLUG/memberships/$ENCODED_SUBJECT") || true

          authorized="false"
          if [[ "$HTTP_CODE" == "200" ]]; then
            STATE=$(jq -r '.state' /tmp/membership_response.json)
            if [[ "$STATE" == "active" ]]; then
              authorized="true"
            fi
          fi
          rm -f /tmp/membership_response.json

          if [[ "$authorized" != "true" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          @${ISSUE_CREATOR} is not an enrolled member of this course's team (\`${COURSE_TEAM_SLUG}\`), so \`/create\` cannot proceed. Please contact your instructor."
            echo "::error ::User $ISSUE_CREATOR is not an active member of $COURSE_TEAM_SLUG"
            exit 1
          fi
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          COURSE_TEAM_SLUG: ${{ vars.COURSE_TEAM_SLUG }}
          COURSE_INSTRUCTOR: ${{ vars.COURSE_INSTRUCTOR_GITHUB }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ADMINS: ${{ needs.authorize.outputs.admins }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Check course instance quota
        id: check_quota
        shell: bash
        run: |
          MAX_COURSE_PER_USER="${MAX_COURSE_PER_USER:-1}"
          MAX_TOTAL="${MAX_TOTAL:-90}"
          # Admin bypass — keyed on whoever ran /create (an admin acting on a
          # user's issue overrides the quota), not the issue creator
          if echo ",$ADMINS," | grep -q ",$COMMENT_AUTHOR,"; then
            echo "Admin $COMMENT_AUTHOR — skipping quota check."
            exit 0
          fi

          source ~/venv/bin/activate

          # Fetch all OpenStack instances in one call
          SERVERS_JSON=$(openstack server list -f json)
          TOTAL_COUNT=$(echo "$SERVERS_JSON" | jq 'length')
          OS_NAMES=$(echo "$SERVERS_JSON" | jq -r '.[].Name')

          echo "Total instances in OpenStack: $TOTAL_COUNT (system limit: $MAX_TOTAL)"

          # Global capacity check
          if [[ "$TOTAL_COUNT" -ge "$MAX_TOTAL" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          The system has reached its capacity limit of **${MAX_TOTAL}** instances. No new instances can be provisioned at this time.

          Please try again later or contact @${COURSE_INSTRUCTOR} for assistance.

          > @${COURSE_INSTRUCTOR} — ⚠️ System capacity limit reached ($TOTAL_COUNT/$MAX_TOTAL). @${ISSUE_CREATOR} is waiting."
            gh issue edit "$ISSUE_NUMBER" --add-label "error:system-capacity"
            echo "::error ::System capacity: $TOTAL_COUNT/$MAX_TOTAL"
            exit 1
          fi

          # Per-user check: count user's course issue numbers (open AND closed) that have a live OpenStack
          # instance or volume — catches manually-closed issues with orphaned resources.
          INSTANCE_PREFIX="${INSTANCE_NAME_PREFIX:+${INSTANCE_NAME_PREFIX}_}"
          OS_VOLUME_NAMES=$(openstack volume list -f json | jq -r '.[].Name')
          COURSE_NUMS=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:course-instance" \
            --state all \
            --limit 200 \
            --json number \
            --jq '.[].number' | grep -v "^${ISSUE_NUMBER}$" || true)

          COURSE_COUNT=0
          OCCUPIED_COURSE_ISSUES=""
          while IFS= read -r NUM; do
            [[ -z "$NUM" ]] && continue
            INSTANCE_NAME="${INSTANCE_PREFIX}instance-${NUM}"
            VOLUME_NAME="My-Data-${NUM}"
            if echo "$OS_NAMES" | grep -qx "$INSTANCE_NAME" || \
               echo "$OS_VOLUME_NAMES" | grep -qE "^${VOLUME_NAME}(-.*)?$"; then
              ((COURSE_COUNT++))
              OCCUPIED_COURSE_ISSUES="${OCCUPIED_COURSE_ISSUES} #${NUM}"
            fi
          done <<< "$COURSE_NUMS"
          OCCUPIED_COURSE_ISSUES=$(echo "$OCCUPIED_COURSE_ISSUES" | xargs | tr ' ' ', ')

          echo "User $ISSUE_CREATOR has $COURSE_COUNT active course OpenStack instance(s) (limit: $MAX_COURSE_PER_USER)"

          if [[ "$COURSE_COUNT" -ge "$MAX_COURSE_PER_USER" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          Only **${MAX_COURSE_PER_USER}** course instance request(s) per user may hold resources at a time, and @${ISSUE_CREATOR} already has **${COURSE_COUNT}** — see ${OCCUPIED_COURSE_ISSUES}.

          Comment \`/delete_all\` on that issue to release it, then open a new request — or contact your instructor.

          > @${COURSE_INSTRUCTOR} — FYI, @${ISSUE_CREATOR} has reached the per-user course instance limit ($COURSE_COUNT/$MAX_COURSE_PER_USER)."
            gh issue close "$ISSUE_NUMBER"
            echo "::error ::User $ISSUE_CREATOR has $COURSE_COUNT/$MAX_COURSE_PER_USER course instances"
            exit 1
          fi

          # Global cap: also count individual instances (open AND closed) — no user may exceed MAX_PER_USER total.
          INDIV_NUMS=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:instance" \
            --state all \
            --limit 200 \
            --json number \
            --jq '.[].number' | grep -v "^${ISSUE_NUMBER}$" || true)
          ALL_NUMS=$(printf "%s\n%s" "$COURSE_NUMS" "$INDIV_NUMS" | grep -v '^$' || true)

          USER_COUNT=0
          OCCUPIED_ALL_ISSUES=""
          while IFS= read -r NUM; do
            [[ -z "$NUM" ]] && continue
            INSTANCE_NAME="${INSTANCE_PREFIX}instance-${NUM}"
            VOLUME_NAME="My-Data-${NUM}"
            if echo "$OS_NAMES" | grep -qx "$INSTANCE_NAME" || \
               echo "$OS_VOLUME_NAMES" | grep -qE "^${VOLUME_NAME}(-.*)?$"; then
              (( ++USER_COUNT ))
              OCCUPIED_ALL_ISSUES="${OCCUPIED_ALL_ISSUES} #${NUM}"
            fi
          done <<< "$ALL_NUMS"
          OCCUPIED_ALL_ISSUES=$(echo "$OCCUPIED_ALL_ISSUES" | xargs | tr ' ' ', ')

          echo "User $ISSUE_CREATOR has $USER_COUNT active OpenStack instance(s) across all types (global limit: $MAX_PER_USER)"

          if [[ "$USER_COUNT" -ge "$MAX_PER_USER" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          Only **${MAX_PER_USER}** instance requests per user may hold resources at a time (all types combined), and @${ISSUE_CREATOR} already has **${USER_COUNT}** — see ${OCCUPIED_ALL_ISSUES}.

          Comment \`/delete_all\` on one of those issues to release it, then open a new request.

          > @${COURSE_INSTRUCTOR} — FYI, @${ISSUE_CREATOR} has reached the global per-user instance limit ($USER_COUNT/$MAX_PER_USER)."
            gh issue close "$ISSUE_NUMBER"
            echo "::error ::User $ISSUE_CREATOR has $USER_COUNT/$MAX_PER_USER instances across all types"
            exit 1
          fi
        env:
          OS_CLOUD: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          INSTANCE_NAME_PREFIX: ${{ vars.INSTANCE_NAME_PREFIX }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ADMINS: ${{ needs.authorize.outputs.admins }}
          COURSE_INSTRUCTOR: ${{ vars.COURSE_INSTRUCTOR_GITHUB }}
          MAX_COURSE_PER_USER:
            ${{ vars.MORPHOCLOUD_MAX_COURSE_INSTANCES_PER_USER }}
          MAX_PER_USER: ${{ vars.MORPHOCLOUD_MAX_INSTANCES_PER_USER }}
          MAX_TOTAL: ${{ vars.MORPHOCLOUD_MAX_TOTAL_INSTANCES }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Check JS2 status
        id: js2_status
        uses: ./.github/actions/check-js2-status
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}

      # Course software customization (#194): optional per-course repo variable
      # MORPHOCLOUD_EXOSPHERE_REF = full commit SHA on MorphoCloud/exosphere
      # (normally the HEAD of the course's course/<slug> branch). Absent
      # variable = the standard vendorized pin. The committed cloud-config
      # stays generic and the variable survives vendorize.
      - name: Apply custom exosphere ref
        id: custom_ref
        shell: bash
        run: |
          if [[ -z "$EXOSPHERE_REF" ]]; then
            echo "MORPHOCLOUD_EXOSPHERE_REF not set — standard image."
            exit 0
          fi

          # The regex — not the API call, which also resolves branch names and
          # short SHAs — is what enforces the full-immutable-SHA rule; it also
          # makes the sed below injection-proof.
          if ! [[ "$EXOSPHERE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          \`MORPHOCLOUD_EXOSPHERE_REF\` is set but is not a full 40-character lowercase commit SHA. No instance was created. Please tag @MorphoCloud/morphocloud-admins."
            echo "::error ::MORPHOCLOUD_EXOSPHERE_REF is not a full commit SHA"
            exit 1
          fi

          if ! gh api "repos/${EXOSPHERE_REPO}/commits/${EXOSPHERE_REF}" --jq .sha > /dev/null 2>&1; then
            gh issue comment "$ISSUE_NUMBER" --body "### Command Results ❌

          \`MORPHOCLOUD_EXOSPHERE_REF\` points to a commit that does not exist in \`${EXOSPHERE_REPO}\`. No instance was created. Please tag @MorphoCloud/morphocloud-admins."
            echo "::error ::Commit $EXOSPHERE_REF not found in $EXOSPHERE_REPO"
            exit 1
          fi

          sed -i "s|^exosphere_sha=.*|exosphere_sha=\"${EXOSPHERE_REF}\" # MORPHOCLOUD_EXOSPHERE_REF (custom course image)|" ./cloud-config
          if ! grep -q "^exosphere_sha=\"${EXOSPHERE_REF}\"" ./cloud-config; then
            echo "::error ::Failed to apply MORPHOCLOUD_EXOSPHERE_REF to cloud-config"
            exit 1
          fi

          gh issue comment "$ISSUE_NUMBER" --body "🔧 Custom course image: this instance will boot \`${EXOSPHERE_REPO}\` commit \`${EXOSPHERE_REF}\` (from \`MORPHOCLOUD_EXOSPHERE_REF\`)."
          echo "Applied custom exosphere ref $EXOSPHERE_REF"
        env:
          EXOSPHERE_REF: ${{ vars.MORPHOCLOUD_EXOSPHERE_REF || '' }}
          EXOSPHERE_REPO: MorphoCloud/exosphere
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create instance (acquire)
        id: provision
        uses: ./.github/actions/create-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ github.event.issue.number }}
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          volume_name_suffix: ${{ vars.VOLUME_NAME_SUFFIX }}
          volume_size_gb: ${{ vars.VOLUME_SIZE_GB || '100' }}
          default_session_timeout_hrs: ${{ vars.INSTANCE_SHELVING_TIMEOUT_HRS }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # Course creates stay one job (acquire + setup back-to-back on the same
      # runner) — unchanged behaviour; course repos with a single runner just
      # fall back to 'self-hosted' for both lanes via the runs-on default.
      - name: Setup instance
        id: setup
        uses: ./.github/actions/setup-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ github.event.issue.number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          instance_name: ${{ steps.provision.outputs.instance_name }}
          volume_name: ${{ steps.provision.outputs.volume_name }}
          instance_ip: ${{ steps.provision.outputs.floating_ip_address }}
          progress_comment_id:
            ${{ steps.provision.outputs.progress_comment_id }}

      - name: Send course email
        id: send_email
        if: ${{ steps.setup.outputs.setup_status == 'complete' }}
        uses: ./.github/actions/course-send-email
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          token: ${{ secrets.GITHUB_TOKEN }}
          email_lookup_url: ${{ vars.MORPHOCLOUD_EMAIL_LOOKUP_URL }}
          email_lookup_secret: ${{ secrets.ENROLLMENT_WEBHOOK_SECRET }}
          issue_creator: ${{ github.event.issue.user.login }}
          mail_server_username: ${{ secrets.MAIL_USERNAME }}
          mail_server_password: ${{ secrets.MAIL_PASSWORD }}
          instance_name: ${{ steps.provision.outputs.instance_name }}
          instance_issue_number: ${{ github.event.issue.number }}
          course_team_slug: ${{ vars.COURSE_TEAM_SLUG }}

      - name: comment (failed to send email)
        if: ${{ steps.send_email.outcome == 'failure' && failure() }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### Instance Creation Results ❌

            Failed to send connection email for instance **${{ steps.provision.outputs.instance_name }}**. ${{ steps.send_email.outputs.error_message }}

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: comment (progress)
        if: ${{ steps.send_email.outcome == 'success' }}
        uses: ./.github/actions/comment-progress
        with:
          comment-id: ${{ steps.provision.outputs.progress_comment_id }}
          create_ip: ✅
          create_volume: ✅
          create_instance: ✅
          associate_ip: ✅
          setup_instance: ✅
          attach_volume: ✅
          send_email: ✅
