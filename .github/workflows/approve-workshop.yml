name: Approve Workshop Management

on:
  issue_comment:
    types: [created]

jobs:
  approve:
    runs-on: ubuntu-latest
    if:
      ${{ !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'request-type:workshop') && (
      contains(github.event.comment.body, '/approve') ||
      contains(github.event.comment.body, '/unapprove')) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: admin-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Resolve admins from morphocloud-admins team
        id: admins
        uses: ./.github/actions/resolve-team-members
        with:
          token: ${{ steps.admin-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: morphocloud-admins
      - name: approve command
        id: approve_command
        uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        with:
          command: "/approve"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "write,maintain,admin"
          allowlist: "${{ steps.admins.outputs.members }}"

      - name: unapprove command
        id: unapprove_command
        uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        with:
          command: "/unapprove"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "write,maintain,admin"
          allowlist: "${{ steps.admins.outputs.members }}"

      - name: Set command metadata
        id: command
        if:
          ${{ steps.approve_command.outputs.continue == 'true' ||
          steps.unapprove_command.outputs.continue == 'true' }}
        run: |
          if [[ "$APPROVE_COMMAND_CONTINUE" == "true" ]]; then
            continue="$APPROVE_COMMAND_CONTINUE"
            command_name="approve"
            comment_id="${{ steps.approve_command.outputs.comment_id }}"
          elif [[ "$UNAPPROVE_COMMAND_CONTINUE" == "true" ]]; then
            continue="$UNAPPROVE_COMMAND_CONTINUE"
            command_name="unapprove"
            comment_id="${{ steps.unapprove_command.outputs.comment_id }}"
          else
            continue="false"
            command_name=""
            comment_id=""
          fi
          echo "continue=$continue" >> $GITHUB_OUTPUT
          echo "command_name=$command_name" >> $GITHUB_OUTPUT
          echo "comment_id=$comment_id" >> $GITHUB_OUTPUT
        env:
          APPROVE_COMMAND_CONTINUE:
            ${{ steps.approve_command.outputs.continue }}
          UNAPPROVE_COMMAND_CONTINUE:
            ${{ steps.unapprove_command.outputs.continue }}

      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' }}
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Check workshop organizer team membership
        id: check_membership
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' }}
        uses: ./.github/actions/check-team-membership
        with:
          token: ${{ steps.app-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: ${{ vars.MORPHOCLOUD_WORKSHOP_ORGANIZERS_TEAM_SLUG }}
          username: ${{ github.event.issue.user.login }}

      - name: Fail if workshop organizer is not a team member
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' &&
          steps.check_membership.outputs.is_member != 'true' }}
        run: |
          echo "::error ::User ${{ github.event.issue.user.login }} is not a member of ${{ vars.MORPHOCLOUD_WORKSHOP_ORGANIZERS_TEAM_SLUG }}"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Remove "request:approved" label
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'unapprove' }}
        shell: bash
        run: |
          gh issue edit $ISSUE_NUMBER --remove-label "request:approved"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Block approval if request needs fixing
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' &&
          contains(github.event.issue.labels.*.name, 'needs-fix') }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "⚠️ This request still has the **needs-fix** label — please correct the issues noted above and reopen before approving."
          echo "::error ::Cannot approve: request has needs-fix label"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Add "request:approved" label
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' }}
        shell: bash
        run: |
          gh issue edit $ISSUE_NUMBER --add-label "request:approved"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Extract workshop fields
        id: fields
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' }}
        uses: ./.github/actions/extract-workshop-fields
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.repository }}
          issue_number: ${{ github.event.issue.number }}

      - name: Resolve schedule
        id: schedule
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' }}
        uses: ./.github/actions/resolve-workshop-schedule
        with:
          start_date: ${{ steps.fields.outputs.start_date }}
          start_time: ${{ steps.fields.outputs.start_time }}
          timezone: ${{ steps.fields.outputs.timezone }}

      - name: Send approval mail
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' }}
        id: send_email
        uses: ./.github/actions/send-workshop-email-approval
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          email_lookup_url: ${{ vars.MORPHOCLOUD_WORKSHOP_EMAIL_LOOKUP_URL }}
          email_lookup_api_key: ${{ secrets.MORPHOCLOUD_LOOKUP_API_KEY }}
          mail_server_username: ${{secrets.MAIL_USERNAME}}
          mail_server_password: ${{secrets.MAIL_PASSWORD}}
          workshop_issue_number: ${{ github.event.issue.number }}

      - name: Comment (approval confirmation)
        if:
          ${{ steps.command.outputs.continue == 'true' &&
          steps.command.outputs.command_name == 'approve' }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ **Workshop approved** by **${{ github.event.comment.user.login }}**.

            @${{ github.event.issue.user.login }} — you may run `/create` no earlier than **${{ steps.schedule.outputs.window_open_label }}** (12 h before your workshop starts). Running it earlier will be rejected.

            **How creation works:** when you run `/create`, we start as many of your **${{ steps.fields.outputs.number_of_instances }}** instances as JetStream2 has free at that moment. **There's no guarantee all are available** — instance capacity is shared and fluctuates. If there aren't enough, we create what we can and then **keep trying automatically**, adding the rest as capacity frees up, until your target is met or the workshop ends. You'll get a comment whenever the count changes — **no need to re-run `/create` yourself.**

            For each instance provisioned successfully, you will receive an email with the access credentials. It is your responsibility to distribute these to your participants. Instances will remain online until the end of your workshop window, and will shutdown automatically.

      - name: command results comment (failure)
        if: ${{ failure() }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### Command Results ❌

            `/${{ steps.command.outputs.command_name }}` command failed to be applied to this issue.

            See details at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
