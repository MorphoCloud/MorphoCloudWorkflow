name: Delete Instance and Volume

on:
  issue_comment:
    types: [created]

jobs:
  delete_instance_and_volume:
    runs-on: self-hosted
    if:
      ${{ !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'instance-request') && (
      contains(github.event.comment.body, '/delete_all') ) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v2.2.0
        id: admin-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Resolve admins from morphocloud-admins team
        id: admins
        uses: ./.github/actions/resolve-team-members
        with:
          token: ${{ steps.admin-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: morphocloud-admins
      - name: delete_instance_and_volume command
        id: delete_instance_and_volume_command
        uses: github/command@v2.0.3
        with:
          command: "/delete_all"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "read,triage,write,maintain,admin"
          allowlist:
            "${{ steps.admins.outputs.members }},${{
            vars.COURSE_INSTRUCTOR_GITHUB }},${{ github.event.issue.user.login
            }},${{ join(github.event.issue.assignees.*.login, ',') }}"

      - uses: actions/checkout@v6

      - name: Delete volume
        id: delete_volume
        if:
          ${{ steps.delete_instance_and_volume_command.outputs.continue ==
          'true' }}
        uses: ./.github/actions/delete-volume
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          volume_name_suffix: ${{ vars.VOLUME_NAME_SUFFIX }}

      - name: Delete instance
        id: delete_instance
        if:
          ${{ steps.delete_instance_and_volume_command.outputs.continue ==
          'true' }}
        uses: ./.github/actions/control-instance
        with:
          os_cloud: ${{ vars.MORPHOCLOUD_OS_CLOUD }}
          issue_number: ${{ github.event.issue.number }}
          command_name: "delete"
          instance_name_prefix: ${{ vars.INSTANCE_NAME_PREFIX }}
          token: ${{ secrets.GITHUB_TOKEN }}
          email_lookup_url: ${{ vars.MORPHOCLOUD_EMAIL_LOOKUP_URL }}
          mail_server_username: ${{secrets.MAIL_USERNAME}}
          mail_server_password: ${{secrets.MAIL_PASSWORD}}
