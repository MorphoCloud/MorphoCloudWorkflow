name: "Notify Admins of Team Mention in Comment"
on:
  issue_comment:
    types:
      - created

permissions:
  contents: read

jobs:
  notify-on-mention:
    runs-on: ubuntu-latest
    # Author-association gate: every MorphoCloud user is an org member, so
    # this keeps the alert working for real users while stopping arbitrary
    # accounts from pushing attacker-authored content into admin inboxes
    # from the trusted sender (security review L1).
    if: >-
      contains(github.event.comment.body, '@MorphoCloud/morphocloud-admins') &&
      github.event.comment.user.type != 'Bot' && contains(fromJSON('["OWNER",
      "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    steps:
      - name: Send mail (admin team mentioned)
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: webhost.dynadot.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: MorphoCloudPortal <no-reply@morphocloud.org>
          to: ${{ vars.MORPHOCLOUD_GITHUB_ADMIN_EMAILS }}
          subject:
            "[${{ github.event.repository.name }}]
            @MorphoCloud/morphocloud-admins mentioned by @${{
            github.event.comment.user.login }} in issue #${{
            github.event.issue.number }}"
          body: |
            @${{ github.event.comment.user.login }} mentioned @MorphoCloud/morphocloud-admins in issue #${{ github.event.issue.number }}.

            Comment:
            ${{ github.event.comment.body }}

            See: ${{ github.event.comment.html_url }}
