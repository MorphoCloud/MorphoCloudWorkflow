name: "Instance/Workshop Request Handler"
on:
  issues:
    types:
      - opened

permissions:
  issues: write
  contents: read
  checks: read

jobs:
  check-instance-team-membership:
    runs-on: ubuntu-latest
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Check MorphoCloudUsers team membership
        id: check_membership
        uses: ./.github/actions/check-team-membership
        with:
          token: ${{ steps.app-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: ${{ vars.MORPHOCLOUD_USERS_TEAM_SLUG }}
          username: ${{ github.event.issue.user.login }}

      - name: Reject non-member
        if: ${{ steps.check_membership.outputs.is_member != 'true' }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "### Authorization Failed ❌

          @$ISSUE_CREATOR is not a member of the **$TEAM_SLUG** team.

          To request an instance, please complete the [MorphoCloud intake form](https://forms.gle/morphocloud-intake) first and accept the GitHub organization invitation.

          This issue will be closed."

          gh issue close "$ISSUE_NUMBER"
          gh issue edit "$ISSUE_NUMBER" --add-label "error:not-authorized"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          TEAM_SLUG: ${{ vars.MORPHOCLOUD_USERS_TEAM_SLUG }}

      - name: Fail if not authorized
        if: ${{ steps.check_membership.outputs.is_member != 'true' }}
        run: |
          echo "::error ::User ${{ github.event.issue.user.login }} is not a member of ${{ vars.MORPHOCLOUD_USERS_TEAM_SLUG }}"
          exit 1

  check-instance-quota:
    needs: [check-instance-team-membership]
    runs-on: ubuntu-latest
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: admin-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Resolve admins from morphocloud-admins team
        id: admins
        uses: ./.github/actions/resolve-team-members
        with:
          token: ${{ steps.admin-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: morphocloud-admins

      - name: Check per-user instance quota
        run: |
          MAX_PER_USER="${MAX_PER_USER:-2}"
          # Admin bypass
          if echo ",$ADMINS," | grep -q ",$ISSUE_CREATOR,"; then
            echo "Admin $ISSUE_CREATOR — skipping quota check."
            exit 0
          fi

          # Count open instance request issues for this user (individual + course), excluding the current one.
          # Simple open-issue count: if the user already has MAX_PER_USER open requests, reject immediately.
          # No OpenStack access needed — Layer 2 (at /create time) does the authoritative resource check.
          INDIV_JSON=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:instance" \
            --state open \
            --limit 200 \
            --json number)
          COURSE_JSON=$(gh issue list \
            --author "$ISSUE_CREATOR" \
            --label "request-type:course-instance" \
            --state open \
            --limit 200 \
            --json number)
          ALL_JSON=$(jq -n --argjson a "$INDIV_JSON" --argjson b "$COURSE_JSON" '$a + $b')

          # Exclude the current issue (just opened, already in the list)
          EXISTING=$(echo "$ALL_JSON" | jq --argjson cur "$ISSUE_NUMBER" '[.[] | select(.number != $cur)]')
          USER_COUNT=$(echo "$EXISTING" | jq 'length')
          echo "User $ISSUE_CREATOR already has $USER_COUNT open instance request(s) (limit: $MAX_PER_USER)."

          if [[ "$USER_COUNT" -ge "$MAX_PER_USER" ]]; then
            ISSUE_LINKS=$(echo "$EXISTING" | jq -r '[.[] | "#\(.number)"] | join(", ")')
            gh issue comment "$ISSUE_NUMBER" --body "### Instance Request Rejected ❌

          @${ISSUE_CREATOR} already has **${USER_COUNT}** open instance request(s) (${ISSUE_LINKS}), which is the maximum of **${MAX_PER_USER}**.

          You already have open requests — please use one of those existing issues. If your instance resources have been deleted, you can run \`/create\` directly in an existing issue to get a new instance.

          > @MorphoCloud/morphocloud-admins — FYI, @${ISSUE_CREATOR} has reached the open-issue limit ($USER_COUNT/$MAX_PER_USER)."
            gh issue close "$ISSUE_NUMBER"
            echo "::error ::User $ISSUE_CREATOR has $USER_COUNT open instance requests (limit: $MAX_PER_USER)"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          ADMINS: ${{ steps.admins.outputs.members }}
          MAX_PER_USER: ${{ vars.MORPHOCLOUD_MAX_INSTANCES_PER_USER }}

  call-validate-request:
    needs: [check-instance-team-membership, check-instance-quota]
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/validate-request.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit

  check-workshop-organizer-membership:
    runs-on: ubuntu-latest
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:workshop') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Check MorphoCloudWorkshopOrganizers team membership
        id: check_membership
        uses: ./.github/actions/check-team-membership
        with:
          token: ${{ steps.app-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: ${{ vars.MORPHOCLOUD_WORKSHOP_ORGANIZERS_TEAM_SLUG }}
          username: ${{ github.event.issue.user.login }}

      - name: Reject non-member
        if: ${{ steps.check_membership.outputs.is_member != 'true' }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "### Authorization Failed ❌

          @$ISSUE_CREATOR is not a member of the **$TEAM_SLUG** team.

          To request a workshop, please start at [morphocloud.org](https://morphocloud.org) and use the workshop intake there first, then accept the GitHub organization invitation.

          This issue will be closed."

          gh issue close "$ISSUE_NUMBER"
          gh issue edit "$ISSUE_NUMBER" --add-label "error:not-authorized"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}
          TEAM_SLUG: ${{ vars.MORPHOCLOUD_WORKSHOP_ORGANIZERS_TEAM_SLUG }}

      - name: Fail if not authorized
        if: ${{ steps.check_membership.outputs.is_member != 'true' }}
        run: |
          echo "::error ::User ${{ github.event.issue.user.login }} is not a member of ${{ vars.MORPHOCLOUD_WORKSHOP_ORGANIZERS_TEAM_SLUG }}"
          exit 1

      # A workshop organizer must also be a registered MorphoCloud user, because
      # they manage (and run /create on) the per-participant instance sub-issues,
      # which are gated on MorphoCloudUsers membership. Enforce it here at request
      # time — where the issue creator IS the organizer — so they are bounced
      # early with onboarding instructions rather than discovering it on workshop
      # day.
      - name: Check MorphoCloudUsers team membership
        id: check_user_membership
        if: ${{ steps.check_membership.outputs.is_member == 'true' }}
        uses: ./.github/actions/check-team-membership
        with:
          token: ${{ steps.app-token.outputs.token }}
          org: ${{ github.repository_owner }}
          team_slug: ${{ vars.MORPHOCLOUD_USERS_TEAM_SLUG }}
          username: ${{ github.event.issue.user.login }}

      - name: Reject organizer who is not a registered user
        if:
          ${{ steps.check_membership.outputs.is_member == 'true' &&
          steps.check_user_membership.outputs.is_member != 'true' }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "### Authorization Failed ❌

          @$ISSUE_CREATOR is a workshop organizer but is not yet a registered MorphoCloud user.

          You have to onboard yourself with MorphoCloud as a regular user first. Please go to [join.morphocloud.org](https://join.morphocloud.org), submit your intake form, and accept the GitHub organization invitation. Then open your workshop request again.

          This issue will be closed."

          gh issue close "$ISSUE_NUMBER"
          gh issue edit "$ISSUE_NUMBER" --add-label "error:not-authorized"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATOR: ${{ github.event.issue.user.login }}

      - name: Fail if organizer is not a registered user
        if:
          ${{ steps.check_membership.outputs.is_member == 'true' &&
          steps.check_user_membership.outputs.is_member != 'true' }}
        run: |
          echo "::error ::Workshop organizer ${{ github.event.issue.user.login }} is not a member of ${{ vars.MORPHOCLOUD_USERS_TEAM_SLUG }}"
          exit 1

  validate-workshop-schedule:
    needs: [check-workshop-organizer-membership]
    runs-on: ubuntu-latest
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:workshop') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MORPHOCLOUD_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.MORPHOCLOUD_WORKFLOW_APP_PRIVATE_KEY }}

      - name: Extract workshop fields
        id: fields
        uses: ./.github/actions/extract-workshop-fields
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.repository }}
          issue_number: ${{ github.event.issue.number }}

      - name: Resolve schedule
        id: schedule
        uses: ./.github/actions/resolve-workshop-schedule
        with:
          start_date: ${{ steps.fields.outputs.start_date }}
          start_time: ${{ steps.fields.outputs.start_time }}
          timezone: ${{ steps.fields.outputs.timezone }}

      - name: Validate count and duration
        id: count
        shell: bash
        env:
          N: ${{ steps.fields.outputs.number_of_instances }}
          D: ${{ steps.fields.outputs.duration_days }}
          MAX_DAYS: "5"
        run: |
          cok=false; dok=false; drange=false
          [[ "$N" =~ ^[1-9][0-9]*$ ]] && cok=true
          [[ "$D" =~ ^[1-9][0-9]*$ ]] && dok=true
          if [[ "$dok" == true ]] && (( D <= MAX_DAYS )); then drange=true; fi
          echo "count_valid=$cok" >> "$GITHUB_OUTPUT"
          echo "duration_valid=$dok" >> "$GITHUB_OUTPUT"
          echo "duration_in_range=$drange" >> "$GITHUB_OUTPUT"
          echo "max_days=$MAX_DAYS" >> "$GITHUB_OUTPUT"
          if [[ "$cok" == true && "$dok" == true && "$drange" == true ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reject invalid request
        if:
          ${{ steps.schedule.outputs.valid != 'true' ||
          steps.schedule.outputs.in_past == 'true' || steps.count.outputs.valid
          != 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SCHED_VALID: ${{ steps.schedule.outputs.valid }}
          SCHED_ERROR: ${{ steps.schedule.outputs.error }}
          IN_PAST: ${{ steps.schedule.outputs.in_past }}
          COUNT_VALID: ${{ steps.count.outputs.count_valid }}
          DURATION_VALID: ${{ steps.count.outputs.duration_valid }}
          DURATION_IN_RANGE: ${{ steps.count.outputs.duration_in_range }}
          MAX_DAYS: ${{ steps.count.outputs.max_days }}
          NUM: ${{ steps.fields.outputs.number_of_instances }}
          DUR: ${{ steps.fields.outputs.duration_days }}
        run: |
          reasons=""
          if [[ "$SCHED_VALID" != "true" ]]; then
            reasons+="- ${SCHED_ERROR}"$'\n'
          elif [[ "$IN_PAST" == "true" ]]; then
            reasons+="- The workshop start time is in the past."$'\n'
          fi
          if [[ "$COUNT_VALID" != "true" ]]; then
            reasons+="- Number of Instances must be a whole number (got '${NUM}')."$'\n'
          fi
          if [[ "$DURATION_VALID" != "true" ]]; then
            reasons+="- Duration (days) must be a whole number (got '${DUR}')."$'\n'
          fi
          if [[ "$DURATION_VALID" == "true" && "$DURATION_IN_RANGE" != "true" ]]; then
            reasons+="- Workshop duration must be at most ${MAX_DAYS} days (got '${DUR}')."$'\n'
          fi

          gh label create "needs-fix" --color "B60205" \
            --description "Request needs correction before approval" --force >/dev/null 2>&1 || true
          gh issue edit "$ISSUE_NUMBER" --add-label "needs-fix"
          gh issue comment "$ISSUE_NUMBER" --body "$(printf '### Workshop request closed — needs fixing ❌\n\n%s\nThis request has been **closed**. Please fix the issue(s) above and open a **new** Workshop Request. Reminder: dates are `YYYY-MM-DD`, times are 24-hour `HH:MM` (e.g. `2026-06-08` / `09:00`), and workshops may run at most %s days.' "$reasons" "$MAX_DAYS")"
          gh issue close "$ISSUE_NUMBER"
          echo "::error ::Workshop request validation failed; issue closed"
          exit 1

      - name: Store canonical schedule labels
        if:
          ${{ steps.schedule.outputs.valid == 'true' &&
          steps.schedule.outputs.in_past != 'true' && steps.count.outputs.valid
          == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          START_EPOCH: ${{ steps.schedule.outputs.start_epoch }}
          TARGET: ${{ steps.fields.outputs.number_of_instances }}
          START_HUMAN: ${{ steps.schedule.outputs.start_label }}
          DURATION: ${{ steps.fields.outputs.duration_days }}
        run: |
          start_label="start:${START_EPOCH}"
          target_label="workshop-target:${TARGET}"
          end_epoch=$(( START_EPOCH + DURATION * 86400 ))
          end_label="workshop-end:${end_epoch}"
          gh label create "$start_label" --color "0E8A16" \
            --description "Workshop start (UTC epoch)" --force >/dev/null 2>&1 || true
          gh label create "$target_label" --color "0E8A16" \
            --description "Target workshop instance count" --force >/dev/null 2>&1 || true
          gh label create "$end_label" --color "0E8A16" \
            --description "Workshop end (UTC epoch = start + duration days)" --force >/dev/null 2>&1 || true
          gh issue edit "$ISSUE_NUMBER" --add-label "$start_label" --add-label "$target_label" --add-label "$end_label"
          echo "Validated start ${START_HUMAN} (epoch ${START_EPOCH}); target ${TARGET}; end ${end_epoch}"

  call-validate-request-workshop:
    needs: [check-workshop-organizer-membership, validate-workshop-schedule]
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:workshop') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/validate-request.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit

  call-request-notify-admin-workshop:
    needs: [check-workshop-organizer-membership, validate-workshop-schedule]
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:workshop') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/request-notify-admin-workshop.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit

  call-request-labeler:
    needs: [check-instance-team-membership, check-instance-quota]
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/request-labeler.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit

  call-request-initial-comments:
    needs: [check-instance-team-membership, check-instance-quota]
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    uses: ./.github/workflows/request-initial-comments.yml
    with:
      issue_number: "${{ github.event.issue.number }}"
    secrets: inherit

  rename-instance-issue:
    needs: [check-instance-team-membership, check-instance-quota]
    runs-on: ubuntu-latest
    if:
      ${{ contains(github.event.issue.labels.*.name, 'request-type:instance') &&
      contains(github.event.issue.labels.*.name, 'request-creator:user') }}
    steps:
      - name: Rename issue to canonical title
        run: |
          gh issue edit "$ISSUE_NUMBER" --title "MC-Individual-${ISSUE_NUMBER}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
